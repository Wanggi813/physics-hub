<!doctype html>
<html lang="ko">
<head>

  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https: wss:; media-src 'self' https: blob: data:; worker-src 'self' blob:; frame-src 'self' https:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self';">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>렌즈와 수차</title>
  <meta name="description" content="렌즈가 빛을 한 점에 모으지 못할 때 생기는 번짐, 색 번짐, 가장자리 흐림, 왜곡을 비교하는 시뮬레이션입니다." />
  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");

    :root {
      --bg: #07111f;
      --panel: rgba(15, 23, 42, 0.84);
      --line: rgba(148, 163, 184, 0.28);
      --text: #e5edf7;
      --muted: #96a7bd;
      --cyan: #38bdf8;
      --amber: #fbbf24;
      --green: #34d399;
      --red: #fb7185;
      --violet: #a78bfa;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0; width: 100%; height: 100%; overflow: hidden;
      background: radial-gradient(circle at 55% 35%, #12233a 0%, var(--bg) 62%);
      color: var(--text);
      font-family: Pretendard, system-ui, -apple-system, Segoe UI, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    canvas {
      position: fixed; inset: 0; width: 100vw; height: 100vh;
      display: block;
    }

    header {
      position: fixed; top: 0; left: 0; right: 0; height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 18px; z-index: 12; pointer-events: none;
    }
    .brand { font-weight: 900; letter-spacing: 0; font-size: 18px; }
    .brand span { color: var(--cyan); }
    .status {
      padding: 7px 14px; border: 1px solid var(--line); border-radius: 999px;
      background: rgba(15, 23, 42, 0.72); color: #cbd5e1;
      font-size: 12px; font-weight: 800;
      backdrop-filter: blur(10px);
    }

    .panel {
      position: fixed; z-index: 10;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(12px);
    }

    #controls {
      left: 14px; top: 62px; width: 286px;
      padding: 14px;
    }
    .panel-title {
      color: var(--muted);
      font-size: 10px; font-weight: 900;
      letter-spacing: .08em; text-transform: uppercase;
      margin-bottom: 12px;
    }
    .control { margin-bottom: 12px; }
    .control:last-child { margin-bottom: 0; }
    .label {
      display: flex; justify-content: space-between; align-items: baseline;
      color: var(--muted);
      font-size: 12px; font-weight: 700;
      margin-bottom: 5px;
    }
    .label output {
      color: var(--cyan); font-family: ui-monospace, Consolas, monospace;
      font-weight: 900;
    }
    input[type="range"] {
      width: 100%; height: 4px; border-radius: 999px;
      accent-color: var(--cyan); cursor: pointer;
    }
    .checks {
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 7px;
      margin-top: 8px;
    }
    .check {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 8px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.38);
      color: #cbd5e1;
      font-size: 11px; font-weight: 800;
      cursor: pointer;
    }
    .check input { margin: 0; accent-color: var(--cyan); }

    #readout {
      right: 14px; top: 62px; width: 292px;
      padding: 14px;
    }
    .metric {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(148, 163, 184, 0.18);
      font-size: 12px;
    }
    .metric:last-child { border-bottom: 0; }
    .metric span { color: var(--muted); font-weight: 800; }
    .metric b {
      font-family: ui-monospace, Consolas, monospace;
      color: #e0f2fe;
    }
    .bar {
      height: 8px; border-radius: 999px; overflow: hidden;
      background: rgba(15,23,42,0.92);
      border: 1px solid rgba(148,163,184,0.22);
      margin: 8px 0 3px;
    }
    .bar i {
      display: block; width: 0%; height: 100%;
      background: linear-gradient(90deg, var(--green), var(--amber), var(--red));
      box-shadow: 0 0 14px rgba(251, 191, 36, 0.4);
    }
    .mini-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }
    .mini-note b {
      color: #e2e8f0;
      font-weight: 900;
    }
    .aber-tag {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 900;
    }
    .aber-tag.active {
      background: rgba(251,191,36,0.15);
      border: 1px solid rgba(251,191,36,0.45);
      color: #fbbf24;
    }
    .aber-tag.inactive {
      background: rgba(148,163,184,0.08);
      border: 1px solid rgba(148,163,184,0.18);
      color: #475569;
    }

    #legend {
      left: 14px; bottom: 16px; width: min(560px, calc(100vw - 28px));
      padding: 10px 12px;
      color: #cbd5e1; font-size: 12px;
      display: flex; flex-wrap: wrap; gap: 8px 14px;
      align-items: center;
    }
    .chip { display: inline-flex; align-items: center; gap: 6px; }
    .swatch {
      width: 26px; height: 3px; border-radius: 999px; background: var(--cyan);
      box-shadow: 0 0 10px currentColor;
    }

    /* ── 튜토리얼 ── */
    #tutOverlay {
      position: fixed; inset: 0; z-index: 40;
      background: rgba(7,17,31,0.72);
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(2px);
    }
    #tutCard {
      background: rgba(15,23,42,0.97);
      border: 1px solid rgba(148,163,184,0.28);
      border-radius: 20px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      padding: 36px 40px 28px;
      max-width: 480px; width: calc(100vw - 40px);
    }
    .tut-step {
      font-size: 11px; font-weight: 900; letter-spacing: .1em;
      color: var(--cyan); text-transform: uppercase; margin-bottom: 8px;
    }
    .tut-title {
      font-size: 22px; font-weight: 900; color: #f1f5f9;
      margin-bottom: 12px; line-height: 1.25;
    }
    .tut-body {
      font-size: 14px; line-height: 1.65; color: #94a3b8;
      margin-bottom: 10px;
    }
    .tut-task {
      background: rgba(56,189,248,0.10);
      border: 1px solid rgba(56,189,248,0.25);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px; color: #7dd3fc;
      margin-bottom: 24px; line-height: 1.5;
    }
    .tut-task::before { content: '👉 '; }
    .tut-nav {
      display: flex; align-items: center; justify-content: space-between;
    }
    .tut-dots {
      display: flex; gap: 6px;
    }
    .tut-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(148,163,184,0.3);
      transition: background .2s;
    }
    .tut-dot.active { background: var(--cyan); }
    .tut-btn {
      padding: 10px 22px; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 900; cursor: pointer;
      transition: opacity .15s;
    }
    .tut-btn:hover { opacity: .85; }
    .tut-btn.primary { background: var(--cyan); color: #07111f; }
    .tut-btn.skip { background: transparent; color: #64748b; font-size: 12px; padding: 10px 8px; }
    #tutBar {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      z-index: 30; display: none;
      background: rgba(15,23,42,0.95);
      border: 1px solid rgba(148,163,184,0.22);
      border-radius: 14px;
      padding: 14px 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      max-width: 520px; width: calc(100vw - 32px);
    }
    .tutbar-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .tutbar-step { font-size: 10px; font-weight: 900; color: var(--cyan); letter-spacing: .08em; text-transform: uppercase; }
    .tutbar-title { font-size: 15px; font-weight: 900; color: #f1f5f9; }
    .tutbar-task { font-size: 12px; color: #7dd3fc; margin-top: 4px; }
    .tutbar-task::before { content: '👉 '; }
    .tutbar-nav { display: flex; gap: 8px; align-items: center; }
    .tutbar-btn {
      padding: 7px 16px; border-radius: 8px; border: none;
      font-size: 13px; font-weight: 900; cursor: pointer;
    }
    .tutbar-btn.primary { background: var(--cyan); color: #07111f; }
    .tutbar-btn.exit { background: transparent; color: #64748b; font-size: 12px; }

    @media (max-width: 820px) {
      header { height: 44px; padding: 0 12px; }
      .brand { font-size: 15px; }
      .status { display: none; }
      #controls {
        left: 10px; right: 10px; top: 52px; width: auto;
        padding: 10px;
      }
      #readout {
        left: 10px; right: 10px; top: auto; bottom: 74px; width: auto;
        padding: 10px;
        display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0 12px;
      }
      #readout .panel-title, #readout .bar, #readout .mini-note {
        grid-column: 1 / -1;
      }
      .checks { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .control { margin-bottom: 8px; }
      #legend { display: none; }
    }
  </style>
</head>
<body>
  <canvas id="sim"></canvas>

  <header>
    <div class="brand">🔭 렌즈와 <span>수차</span></div>
    <div class="status" id="status">광선, 스폿, 격자를 함께 보며 상이 흐려지는 까닭을 비교하세요</div>
  </header>

  <section class="panel" id="controls">
    <div class="panel-title">실험 조건</div>
    <div class="control">
      <div class="label"><span>조리개 지름</span><output id="vAperture">74%</output></div>
      <input id="aperture" type="range" min="1" max="100" value="74" />
    </div>
    <div class="control">
      <div class="label"><span>물체 위치</span><output id="vField">0°</output></div>
      <input id="field" type="range" min="-30" max="30" value="0" />
    </div>
    <div class="control">
      <div class="label"><span>색 분산</span><output id="vDispersion">55%</output></div>
      <input id="dispersion" type="range" min="0" max="100" value="55" />
    </div>
    <div class="control">
      <div class="label"><span>렌즈 보정 정도</span><output id="vCorrection">28%</output></div>
      <input id="correction" type="range" min="0" max="100" value="28" />
    </div>
    <div class="control">
      <div class="label"><span>스크린 위치</span><output id="vFocus">0 px</output></div>
      <input id="focus" type="range" min="-160" max="160" value="0" />
    </div>

    <div class="panel-title" style="margin-top:14px;">비교할 현상</div>
    <div class="checks">
      <label class="check"><input id="spherical" type="checkbox" checked />구면수차</label>
      <label class="check"><input id="chromatic" type="checkbox" checked />색수차</label>
      <label class="check"><input id="edgeBlur" type="checkbox" checked />코마/비점수차</label>
    </div>
  </section>

  <section class="panel" id="readout">
    <div class="panel-title">현재 상태</div>
    <div id="aberrationTags" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:28px;"></div>
    <div class="mini-note" id="explain"></div>
  </section>

  <section class="panel" id="legend">
    <span class="chip"><i class="swatch" style="background:#ef4444"></i>빨강</span>
    <span class="chip"><i class="swatch" style="background:#22c55e"></i>초록</span>
    <span class="chip"><i class="swatch" style="background:#3b82f6"></i>파랑</span>
    <span class="chip"><i class="swatch" style="background:#fbbf24"></i>주변부 광선</span>
    <span class="chip">오른쪽: 스크린에 맺힌 상</span>
  </section>

  <!-- 튜토리얼 시작 오버레이 -->
  <div id="tutOverlay">
    <div id="tutCard">
      <div class="tut-step" id="tutStepLabel">시작</div>
      <div class="tut-title" id="tutTitle">렌즈와 수차 시뮬레이션</div>
      <div class="tut-body" id="tutBody"></div>
      <div class="tut-task" id="tutTask"></div>
      <div class="tut-nav">
        <div class="tut-dots" id="tutDots"></div>
        <div style="display:flex;gap:10px;align-items:center;">
          <button class="tut-btn skip" id="tutSkip">건너뛰기</button>
          <button class="tut-btn primary" id="tutNext">다음 →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 튜토리얼 진행 중 하단 바 -->
  <div id="tutBar">
    <div class="tutbar-top">
      <div>
        <div class="tutbar-step" id="tutBarStep"></div>
        <div class="tutbar-title" id="tutBarTitle"></div>
        <div class="tutbar-task" id="tutBarTask"></div>
      </div>
      <div class="tutbar-nav">
        <button class="tutbar-btn exit" id="tutExit">✕ 종료</button>
        <button class="tutbar-btn primary" id="tutBarNext">다음 →</button>
      </div>
    </div>
    <div class="tut-dots" id="tutBarDots" style="margin-top:10px;"></div>
  </div>

  <script>
  (() => {
    const canvas = document.getElementById('sim');
    const ctx = canvas.getContext('2d');
    const DPR = Math.min(2, window.devicePixelRatio || 1);

    const el = id => document.getElementById(id);
    const controls = {
      aperture: el('aperture'),
      field: el('field'),
      dispersion: el('dispersion'),
      correction: el('correction'),
      focus: el('focus'),
      spherical: el('spherical'),
      chromatic: el('chromatic'),
      edgeBlur: el('edgeBlur'),
    };
    const out = {
      aperture: el('vAperture'),
      field: el('vField'),
      dispersion: el('vDispersion'),
      correction: el('vCorrection'),
      focus: el('vFocus'),
      explain: el('explain'),
    };

    Object.values(controls).forEach(control => control.addEventListener('input', draw));

    function resize() {
      canvas.width = Math.floor(innerWidth * DPR);
      canvas.height = Math.floor(innerHeight * DPR);
      canvas.style.width = innerWidth + 'px';
      canvas.style.height = innerHeight + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      draw();
    }
    addEventListener('resize', resize);

    function state() {
      const aperture = +controls.aperture.value / 100;
      const fieldDeg = +controls.field.value; // -30 ~ +30
      const dispersion = +controls.dispersion.value / 100;
      const correction = +controls.correction.value / 100;
      const focusShift = +controls.focus.value;
      return {
        aperture, fieldDeg, field: fieldDeg * Math.PI / 180,
        dispersion, correction, focusShift,
        spherical: controls.spherical.checked,
        chromatic: controls.chromatic.checked,
        coma: controls.edgeBlur.checked,
        astigmatism: controls.edgeBlur.checked,
        fieldCurve: controls.edgeBlur.checked,
      };
    }

    function layout() {
      const W = innerWidth, H = innerHeight;
      const compact = W < 820;
      const miniPanelW = Math.max(150, (W - 34) / 2);
      const miniPanelY = Math.max(420, H - 414);
      // readout 패널 바로 아래에 캔버스 패널 배치
      const readoutEl = document.getElementById('readout');
      const readoutBottom = readoutEl
        ? readoutEl.getBoundingClientRect().bottom + 12
        : 320;
      const panelW = 270;
      const panelX = W - panelW - 14;
      const spotH  = Math.max(220, H - readoutBottom - 20);
      return {
        W, H, compact,
        benchTop: compact ? 235 : 92,
        benchBottom: compact ? H - 250 : H - 98,
        lensX: compact ? W * 0.42 : W * 0.45,
        sourceX: compact ? 36 : 335,
        sensorX: compact ? W - 52 : W - 360,
        topPanel: { x: panelX, y: readoutBottom, w: panelW, h: spotH },
        compactSpotPanel: { x: 12, y: miniPanelY, w: miniPanelW, h: 220 },
      };
    }

    const wavelengths = [
      { name: 'R', color: '#ef4444', offset: 1 },
      { name: 'G', color: '#22c55e', offset: 0 },
      { name: 'B', color: '#3b82f6', offset: -1 },
    ];

    function lensScale(L) {
      const h = Math.max(160, L.benchBottom - L.benchTop);
      return {
        cy: (L.benchTop + L.benchBottom) / 2,
        lensR: Math.min(155, h * 0.36),
        focal: Math.max(170, (L.sensorX - L.lensX) * 0.72),
      };
    }

    function sensorPlaneX(s, L, S = lensScale(L)) {
      return L.lensX + S.focal + s.focusShift;
    }

    function rayAtSensor(s, L, ray, wave) {
      const S = lensScale(L);
      const hNorm = ray.hNorm;
      const fieldNorm = Math.abs(s.fieldDeg) / 30;
      const apertureTerm = s.aperture;
      let fEff = S.focal;

      if (s.chromatic) {
        // 색수차: 아크로매트 설계로 80%까지 감소 가능
        fEff += wave.offset * s.dispersion * 18 * (1 - s.correction * 0.80);
      }
      if (s.spherical) {
        // 구면수차: 비구면 렌즈로 85%까지 감소 가능
        fEff -= Math.abs(hNorm) ** 2 * apertureTerm * 28 * (1 - s.correction * 0.85);
      }
      if (s.fieldCurve) {
        // 상면만곡: 렌즈 설계로 75%까지 감소
        fEff -= fieldNorm * fieldNorm * 26 * (1 - s.correction * 0.75);
      }

      const idealY = S.cy + Math.tan(s.field) * S.focal * 0.62;
      let focusY = idealY;
      if (s.coma) {
        // 코마: 화각 의존성 강해 70%까지 감소
        focusY += fieldNorm * hNorm * hNorm * Math.sign(hNorm || 1) * 28 * apertureTerm * (1 - s.correction * 0.70);
      }
      if (s.astigmatism) {
        // 비점수차: 화각 의존성 강해 65%까지 감소
        focusY += ray.family * fieldNorm * Math.abs(hNorm) * 16 * (1 - s.correction * 0.65);
      }

      const lensY = S.cy + hNorm * S.lensR * s.aperture;
      const focusX = L.lensX + fEff;
      const sensorX = sensorPlaneX(s, L, S);
      const t = (sensorX - L.lensX) / Math.max(1, focusX - L.lensX);
      let sensorY = lensY + (focusY - lensY) * t;
      if (s.astigmatism) {
        sensorY += ray.family * fieldNorm * 8 * (1 - t) * (1 - s.correction * 0.65);
      }
      return { lensY, focusX, focusY, sensorX, sensorY, idealY };
    }

    const OBJ_HEIGHT = 60;
    const OBJECT_POINTS = [
      { vNorm: 1,   color: '#fbbf24' },
      { vNorm: 0.5, color: '#a78bfa' },
      { vNorm: 0,   color: '#38bdf8' },
    ];

    function buildRays(s, L) {
      const S = lensScale(L);
      const rays = [];
      const samples = 9;
      // 물체 중앙이 광축(S.cy)에 올 때가 0°, 화각 슬라이더로 중앙 위치를 이동
      const objCenterY = S.cy - Math.tan(s.field) * 180;
      const objBaseY   = objCenterY + OBJ_HEIGHT / 2;  // 기저 (아래)
      const objTipY    = objCenterY - OBJ_HEIGHT / 2;  // 끝 (위)

      OBJECT_POINTS.forEach(obj => {
        // vNorm=0: 기저, vNorm=1: 끝
        const ptY = objBaseY - OBJ_HEIGHT * obj.vNorm;
        const ptAngle = Math.atan2(S.cy - ptY, L.lensX - L.sourceX);
        const sAdj = {
          ...s,
          field: ptAngle,
          fieldDeg: ptAngle * 180 / Math.PI,
        };
        for (let i = 0; i < samples; i++) {
          const hNorm = -1 + (2 * i) / (samples - 1);
          if (Math.abs(hNorm) > 1) continue;
          const family = i % 2 ? 1 : -1;
          wavelengths.forEach(wave => {
            if (!s.chromatic && wave.name !== 'G') return;
            const info = rayAtSensor(sAdj, L, { hNorm, family }, wave);
            rays.push({ hNorm, family, wave, obj, srcY: ptY, ...info });
          });
        }
      });
      return rays;
    }

    function background(W, H, cy) {
      ctx.clearRect(0, 0, W, H);
      const g = ctx.createRadialGradient(W * 0.50, H * 0.42, 0, W * 0.50, H * 0.42, Math.max(W, H) * 0.72);
      g.addColorStop(0, '#12233a');
      g.addColorStop(0.55, '#07111f');
      g.addColorStop(1, '#030712');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = 'rgba(56,189,248,0.10)';
      ctx.lineWidth = 1;
      const step = 42;
      const originY = cy !== undefined ? cy % step : 0;
      for (let x = 0; x < W; x += step) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let y = originY; y < H; y += step) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
      // 광축에 맞는 수평선은 약간 더 밝게
      if (cy !== undefined) {
        ctx.strokeStyle = 'rgba(56,189,248,0.22)';
        ctx.beginPath();
        ctx.moveTo(0, cy);
        ctx.lineTo(W, cy);
        ctx.stroke();
      }
    }

    function line(x1, y1, x2, y2, color, width = 1, alpha = 1) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.restore();
    }

    function drawLens(s, L) {
      const S = lensScale(L);
      const h = S.lensR * 2.1;
      const x = L.lensX;
      const top = S.cy - h / 2;
      const bottom = S.cy + h / 2;
      const c = s.correction; // 0~1

      // 렌즈 보정에 따른 모양 변화:
      // 0%  → 평볼록 (plano-convex): 오른쪽 평평, 왼쪽 볼록
      // 50% → 이중볼록 (biconvex): 양쪽 볼록
      // 100%→ 비구면 보정 (한쪽 오목): 오른쪽이 오목하게 들어가 수차 보정
      const bulgeL = 20 + c * 24;          // 왼쪽 볼록량 (커질수록 더 볼록)
      const bulgeR = c < 0.5
        ? c * 2 * 44                        // 0→50%: 0(평평)→44(볼록)
        : 44 - (c - 0.5) * 2 * 68;         // 50→100%: 44(볼록)→-24(오목)

      ctx.save();
      const gradW = Math.max(20, bulgeL + Math.abs(bulgeR)) + 10;
      const grad = ctx.createLinearGradient(x - gradW, 0, x + gradW, 0);
      grad.addColorStop(0, 'rgba(125,211,252,0.10)');
      grad.addColorStop(0.5, 'rgba(224,242,254,0.56)');
      grad.addColorStop(1, 'rgba(125,211,252,0.10)');
      ctx.fillStyle = grad;
      ctx.strokeStyle = 'rgba(186,230,253,0.88)';
      ctx.lineWidth = 2;

      // 왼쪽 곡면: 항상 볼록 (물체 쪽)
      // 오른쪽 곡면: 보정에 따라 평평→볼록→오목
      ctx.beginPath();
      ctx.moveTo(x, top);
      // 왼쪽 볼록 곡면 (위→아래)
      ctx.bezierCurveTo(x - bulgeL, top + h * 0.22, x - bulgeL, bottom - h * 0.22, x, bottom);
      // 오른쪽 곡면 (아래→위)
      ctx.bezierCurveTo(x + bulgeR, bottom - h * 0.22, x + bulgeR, top + h * 0.22, x, top);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // 렌즈 종류 레이블
      const lensLabel = c < 0.15 ? '평볼록 렌즈' : c < 0.823 ? '이중볼록 렌즈' : '비구면 렌즈';
      ctx.fillStyle = 'rgba(148,163,184,0.75)';
      ctx.font = '10px Pretendard, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(lensLabel, x, top - 4);

      ctx.setLineDash([4, 7]);
      line(0, S.cy, L.W, S.cy, 'rgba(148,163,184,0.35)', 1, 1);
      ctx.setLineDash([]);

      const apertureY = S.lensR * s.aperture;
      ctx.strokeStyle = 'rgba(251,191,36,0.9)';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(x - 50, S.cy - apertureY);
      ctx.lineTo(x - 50, S.cy - S.lensR - 24);
      ctx.moveTo(x - 50, S.cy + apertureY);
      ctx.lineTo(x - 50, S.cy + S.lensR + 24);
      ctx.stroke();

      ctx.restore();
    }

    function drawObject(s, L, S) {
      const x = L.sourceX;
      const centerY = S.cy - Math.tan(s.field) * 180;
      const baseY = centerY + OBJ_HEIGHT / 2;
      const tipY  = centerY - OBJ_HEIGHT / 2;
      const bodyH = OBJ_HEIGHT;
      const headH = bodyH * 0.22;
      const bodyW = 7;
      const headW = 13;

      ctx.save();
      const grad = ctx.createLinearGradient(x, tipY, x, baseY);
      grad.addColorStop(0,   '#fbbf24');
      grad.addColorStop(0.5, '#a78bfa');
      grad.addColorStop(1,   '#38bdf8');

      const bodyBottom = tipY + headH;
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.rect(x - bodyW, bodyBottom, bodyW * 2, baseY - bodyBottom);
      ctx.fill();

      ctx.fillStyle = '#fbbf24';
      ctx.beginPath();
      ctx.moveTo(x,         tipY);
      ctx.lineTo(x - headW, bodyBottom);
      ctx.lineTo(x + headW, bodyBottom);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = 'rgba(255,255,255,0.18)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.rect(x - bodyW, bodyBottom, bodyW * 2, baseY - bodyBottom);
      ctx.stroke();

      ctx.fillStyle = '#e2e8f0';
      ctx.font = '700 12px Pretendard, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('물체', x, tipY - 10);
      ctx.restore();
    }

    function drawRays(s, L, rays) {
      const S = lensScale(L);

      rays.forEach(ray => {
        const rayColor = s.chromatic ? ray.wave.color : ray.obj.color;
        const alpha = s.chromatic ? 0.32 : 0.45;
        const thick = Math.abs(ray.hNorm) > 0.78 ? 1.5 : 0.9;
        line(L.sourceX, ray.srcY, L.lensX, ray.lensY, rayColor, thick, alpha);
        line(L.lensX, ray.lensY, ray.sensorX, ray.sensorY, rayColor, thick, alpha);
      });

      // 이상적 주광선 점선 (화살 끝 기준) — 0.62는 화면 레이아웃 스케일 보정값
      const idealY = S.cy + Math.tan(s.field) * S.focal * 0.62;
      ctx.save();
      ctx.strokeStyle = 'rgba(52,211,153,0.55)';
      ctx.setLineDash([6, 8]);
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(L.lensX, S.cy);
      ctx.lineTo(L.lensX + S.focal, idealY);
      ctx.stroke();
      ctx.restore();

      drawObject(s, L, S);

      const sensorX = sensorPlaneX(s, L, S);
      line(sensorX, L.benchTop - 16, sensorX, L.benchBottom + 16, 'rgba(248,250,252,0.66)', 2, 1);
      ctx.fillStyle = '#e2e8f0';
      ctx.font = '700 12px Pretendard, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('스크린', sensorX, L.benchTop - 28);
    }

    function drawSpotPanel(s, L, rays) {
      const panel = L.compact ? L.compactSpotPanel : L.topPanel;
      drawPanelShell(panel, '스크린에 맺힌 상');

      const top  = panel.y + 34;
      const bot  = panel.y + panel.h - 24;
      const imgH = bot - top;
      const cx   = panel.x + panel.w / 2;

      ctx.save();
      ctx.beginPath();
      ctx.rect(panel.x + 4, top - 2, panel.w - 8, imgH + 4);
      ctx.clip();
      // 패널 내부 불투명 배경 (광선이 비치지 않도록)
      ctx.fillStyle = 'rgba(15,23,42,0.96)';
      ctx.fillRect(panel.x + 4, top - 2, panel.w - 8, imgH + 4);

      const meanOf = ys => ys.reduce((a, b) => a + b, 0) / ys.length;
      const rmsOf  = (ys, m) => Math.sqrt(ys.reduce((a, y) => a + (y - m) ** 2, 0) / ys.length);

      // ── 물체점별·파장별 sensorY 통계 수집 ──
      const waveList = s.chromatic ? wavelengths : [wavelengths[1]];
      // ptData[vNorm][waveName] = { mean, rms, min, max }
      const ptData = {};
      OBJECT_POINTS.forEach(obj => {
        ptData[obj.vNorm] = {};
        waveList.forEach(wave => {
          const ys = rays.filter(r => r.obj === obj && r.wave.name === wave.name).map(r => r.sensorY);
          if (!ys.length) return;
          const mean = meanOf(ys);
          ptData[obj.vNorm][wave.name] = {
            mean, rms: rmsOf(ys, mean),
            min: Math.min(...ys), max: Math.max(...ys)
          };
        });
      });

      // ── G 파장 기준 스케일 ──
      const refW = s.chromatic ? 'G' : wavelengths[1].name;
      const d0 = ptData[0][refW] || ptData[0][Object.keys(ptData[0])[0]];
      const d1 = ptData[1][refW] || ptData[1][Object.keys(ptData[1])[0]];
      if (!d0 || !d1) { ctx.restore(); return; }

      // 스크린이 정확한 초점면에서 벗어난 만큼 추가 blur (defocus)
      // focusShift=0 → 추가 없음, ±160px → 최대 blur
      const defocusBlur = Math.abs(s.focusShift) * 0.30 * s.aperture;

      // 도립: 물체 끝(vNorm=1) → 패널 위, 기저(vNorm=0) → 패널 아래
      // sensorY 기저가 끝보다 크다고 가정 (보통 필드>0일 때)
      const sensorSpan = Math.abs(d0.mean - d1.mean) || 40;
      const displayH   = imgH * 0.72;
      const yscale     = displayH / sensorSpan;
      const sensorCY   = (d0.mean + d1.mean) / 2;
      const panelCY    = (top + bot) / 2;
      // 도립: 기저(큰 Y) → 아래, 끝(작은 Y) → 위  → 부호 +
      const toY = sY => panelCY + (sY - sensorCY) * yscale;

      const wavesToDraw = s.chromatic ? wavelengths : [{ name: refW, color: null }];

      wavesToDraw.forEach(wave => {
        const wn = wave.name;
        const ctrlPts = OBJECT_POINTS.map(obj => {
          const d = ptData[obj.vNorm][wn];
          if (!d) return null;
          return { vNorm: obj.vNorm, objColor: obj.color, mean: d.mean, spread: d.max - d.min };
        }).filter(Boolean).sort((a, b) => b.vNorm - a.vNorm);
        if (ctrlPts.length < 2) return;

        const interpAt = (vNorm) => {
          if (ctrlPts.length === 3) {
            const [p0, p1, p2] = ctrlPts;
            const t0 = p0.vNorm, t1 = p1.vNorm, t2 = p2.vNorm, v = vNorm;
            const w0 = (v-t1)*(v-t2)/((t0-t1)*(t0-t2));
            const w1 = (v-t0)*(v-t2)/((t1-t0)*(t1-t2));
            const w2 = (v-t0)*(v-t1)/((t2-t0)*(t2-t1));
            return {
              mean:   p0.mean*w0   + p1.mean*w1   + p2.mean*w2,
              spread: Math.max(0, p0.spread*w0 + p1.spread*w1 + p2.spread*w2),
              color:  v > 0.67 ? p0.objColor : v > 0.33 ? p1.objColor : p2.objColor,
            };
          }
          const [p0, p1] = ctrlPts;
          const t = (vNorm - p0.vNorm) / (p1.vNorm - p0.vNorm);
          return {
            mean:   p0.mean + (p1.mean - p0.mean) * t,
            spread: Math.max(0, p0.spread + (p1.spread - p0.spread) * t),
            color:  t < 0.5 ? p0.objColor : p1.objColor,
          };
        };

        const panelTip  = toY(d1.mean);
        const panelBase = toY(d0.mean);
        const arrowH    = Math.abs(panelBase - panelTip);
        const headH     = Math.max(8, Math.min(18, arrowH * 0.14));
        const bodyW = 7;
        const headW = 13;
        // 색수차 모드: R/G/B가 겹쳐 그려지므로 반투명하게 → 겹치는 부분이 섞여 보임
        const coreAlpha = s.chromatic
          ? Math.max(0.10, 0.45 - defocusBlur * 0.015)
          : Math.max(0.15, 0.90 - defocusBlur * 0.025);

        const SLICES = 80;
        for (let i = 0; i < SLICES; i++) {
          const v0 = i / SLICES, v1 = (i+1) / SLICES;
          const { mean: m0, spread: sp0, color: col0 } = interpAt(v0);
          const { mean: m1, spread: sp1 }               = interpAt(v1);
          const py0 = toY(m0), py1 = toY(m1);
          if (Math.max(py0, py1) > panelTip - headH * 0.5) continue;
          const sliceH = Math.abs(py1 - py0);
          if (sliceH < 0.3) continue;
          const sliceColor = s.chromatic ? wave.color : col0;
          const rawSpread = (sp0+sp1)*0.5*yscale*1.4 + defocusBlur;
          const hw = Math.min(bodyW + rawSpread, panel.w * 0.48);
          if (rawSpread > 0.5) {
            const haloHW = Math.min(hw + 8, panel.w * 0.50);
            const grd = ctx.createLinearGradient(cx - haloHW, 0, cx + haloHW, 0);
            grd.addColorStop(0,   hexAlpha(sliceColor, 0));
            grd.addColorStop(0.4, hexAlpha(sliceColor, s.chromatic ? 0.12 : 0.22));
            grd.addColorStop(0.5, hexAlpha(sliceColor, s.chromatic ? 0.20 : 0.35));
            grd.addColorStop(0.6, hexAlpha(sliceColor, s.chromatic ? 0.12 : 0.22));
            grd.addColorStop(1,   hexAlpha(sliceColor, 0));
            ctx.fillStyle = grd;
            ctx.fillRect(cx - haloHW, Math.min(py0,py1) - 0.5, haloHW*2, sliceH+1);
          }
          ctx.fillStyle = hexAlpha(sliceColor, coreAlpha);
          ctx.fillRect(cx - hw, Math.min(py0,py1), hw*2, sliceH+0.5);
        }

        const tipStat      = interpAt(1);
        const tipColor     = s.chromatic ? wave.color : '#fbbf24';
        const tipRawSpread = tipStat.spread * yscale * 1.4 + defocusBlur;
        const tipHW        = Math.min(headW + tipRawSpread, panel.w * 0.48);
        if (tipRawSpread > 0.5) {
          const haloW = Math.min(tipHW + 10, panel.w * 0.52);
          const grd = ctx.createLinearGradient(cx - haloW, 0, cx + haloW, 0);
          grd.addColorStop(0,   hexAlpha(tipColor, 0));
          grd.addColorStop(0.4, hexAlpha(tipColor, s.chromatic ? 0.12 : 0.22));
          grd.addColorStop(0.5, hexAlpha(tipColor, s.chromatic ? 0.20 : 0.38));
          grd.addColorStop(0.6, hexAlpha(tipColor, s.chromatic ? 0.12 : 0.22));
          grd.addColorStop(1,   hexAlpha(tipColor, 0));
          ctx.fillStyle = grd;
          ctx.fillRect(cx - haloW, panelTip - headH, haloW*2, headH+4);
        }
        ctx.fillStyle = hexAlpha(tipColor, coreAlpha);
        ctx.beginPath();
        ctx.moveTo(cx,         panelTip);
        ctx.lineTo(cx - tipHW, panelTip - headH);
        ctx.lineTo(cx + tipHW, panelTip - headH);
        ctx.closePath();
        ctx.fill();
      });

      ctx.globalAlpha = 1;
      ctx.fillStyle = '#64748b';
      ctx.font = `11px Pretendard, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('번짐이 클수록 상이 흐려짐', cx, panel.y + panel.h - 7);
      ctx.restore();
    }

    function hexAlpha(hex, a) {
      if (!hex) return `rgba(167,139,250,${a})`;
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${a})`;
    }


    function drawPanelShell(panel, title) {
      ctx.save();
      ctx.fillStyle = 'rgba(15,23,42,0.72)';
      ctx.strokeStyle = 'rgba(148,163,184,0.22)';
      roundRect(panel.x, panel.y, panel.w, panel.h, 12);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#cbd5e1';
      ctx.font = '800 12px Pretendard, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(title, panel.x + 14, panel.y + 22);
      ctx.restore();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

function updateReadout(s) {
      // ── 수차 태그 ──
      const tagsEl = document.getElementById('aberrationTags');
      const aberrations = [
        {
          key: 'spherical', label: '구면수차',
          on: s.spherical,
          desc: s.spherical && s.aperture > 0.5
            ? (STEPS && tutStep === STEPS.length - 1
                ? '구면수차 — <b>조리개가 클수록</b> 상이 번집니다.'
                : '<b>가장자리 빛일수록 굴절이 강해</b> 중앙 빛과 다른 곳에 초점이 맺힙니다. 조리개가 클수록 이 빛이 더 많이 들어와 <b>상이 번집니다.</b>')
            : s.spherical ? '조리개를 키우면 <b>가장자리 빛이 늘어나</b> 구면수차를 확인할 수 있습니다.' : null,
        },
        {
          key: 'chromatic', label: '색수차',
          on: s.chromatic,
          desc: s.chromatic && s.dispersion > 0.2
            ? (STEPS && tutStep === STEPS.length - 1
                ? '색수차 — <b>파장마다 초점이 달라</b> 색이 번집니다.'
                : '<b>파란빛은 가까이, 빨간빛은 멀리</b> 초점이 맺혀 스크린에서 색이 번집니다. 스크린을 움직이면 <b>어떤 색이 선명해지는지</b> 확인해보세요.')
            : s.chromatic ? '색 분산을 높이면 <b>R·G·B 초점이 갈라지는</b> 색수차를 확인할 수 있습니다.' : null,
        },
        {
          key: 'edgeBlur', label: '코마/비점수차',
          on: s.coma,
          desc: s.coma && Math.abs(s.fieldDeg) > 10
            ? (STEPS && tutStep === STEPS.length - 1
                ? '코마/비점수차 — <b>광축에서 멀수록</b> 상이 흐려집니다.'
                : '빛이 렌즈를 <b>비스듬히 통과</b>하면서 한쪽으로 치우쳐 맺히고(코마), 수평·수직 초점이 달라져(비점수차) <b>상이 흐려집니다.</b> 광축에서 멀수록 심해집니다.')
            : s.coma ? '물체 위치를 <b>광축(0°)에서 벗어나게</b> 하면 코마와 비점수차를 확인할 수 있습니다.' : null,
        },
      ];

      tagsEl.innerHTML = '';
      aberrations.forEach(a => {
        const tag = document.createElement('span');
        tag.className = 'aber-tag ' + (a.on ? 'active' : 'inactive');
        tag.textContent = (a.on ? '● ' : '○ ') + a.label;
        tagsEl.appendChild(tag);
      });

      // ── 설명 문장 ──
      const activeDescs = aberrations.filter(a => a.on && a.desc).map(a => a.desc);
      if (activeDescs.length) {
        out.explain.innerHTML = activeDescs.join('<br>');
      } else if (!aberrations.some(a => a.on)) {
        out.explain.innerHTML = '수차가 모두 꺼져 있어 <b>이상적인 상</b>이 맺힙니다. 체크박스를 켜서 각 수차를 관찰해보세요.';
      } else {
        out.explain.innerHTML = s.aperture < 0.05
          ? '<b>조리개가 매우 작아</b> 중심부 빛만 통과하므로 수차가 거의 없고 선명한 상이 맺힙니다.'
          : '슬라이더를 조작해 수차 현상을 만들어보세요.';
      }
    }

    function draw() {
      const s = state();
      const L = layout();
      const S0 = lensScale(L);
      background(L.W, L.H, S0.cy);
      const rays = buildRays(s, L);
      drawLens(s, L);
      drawRays(s, L, rays);
      drawSpotPanel(s, L, rays);
      updateReadout(s);

      // 슬라이더 출력값 갱신
      out.aperture.textContent   = controls.aperture.value + '%';
      out.field.textContent      = controls.field.value + '°';
      out.dispersion.textContent = controls.dispersion.value + '%';
      out.correction.textContent = controls.correction.value + '%';
      out.focus.textContent      = controls.focus.value + ' px';
    }

    resize();

    // ── 튜토리얼 ──
    var STEPS = [
      {
        title: '구면수차 — 렌즈 가장자리의 빛',
        body: '렌즈 가장자리를 통과한 빛은 중앙을 통과한 빛보다 더 앞쪽에 초점이 맺힙니다. 조리개를 키울수록 가장자리 빛이 더 많이 들어와 상이 흐려집니다.',
        task: '조리개 지름을 키워보며 상이 흐려지는 것을 관찰하세요.',
        show: { controls: ['aperture', 'focus'], checks: ['spherical'] },
        set: { aperture:30, field:0, dispersion:0, correction:80, focus:0,
               spherical:true, chromatic:false, edgeBlur:false },
      },
      {
        title: '색수차 — 색깔마다 다른 초점',
        body: '렌즈는 빛의 파장(색)마다 굴절률이 다릅니다. 빨간빛은 멀리, 파란빛은 가까이 초점이 맺혀 상의 가장자리에 색 번짐이 생깁니다.',
        task: '색 분산 슬라이더를 올려보며 R/G/B 초점이 갈라지는 것을 관찰하세요.',
        show: { controls: ['dispersion', 'focus'], checks: ['chromatic'] },
        set: { aperture:60, field:0, dispersion:30, correction:80, focus:0,
               spherical:false, chromatic:true, edgeBlur:false },
      },
      {
        title: '코마/비점수차 — 가장자리로 갈수록',
        body: '물체가 광축에서 벗어날수록 상이 한쪽으로 늘어지거나(코마) 두 방향의 초점이 달라져(비점수차) 상이 흐려집니다. 화각이 클수록 심해집니다.',
        task: '물체 위치 슬라이더를 ±30° 끝까지 움직여 상의 변화를 관찰하세요.',
        show: { controls: ['field', 'aperture', 'focus'], checks: ['edgeBlur'] },
        set: { aperture:70, field:0, dispersion:0, correction:80, focus:0,
               spherical:false, chromatic:false, edgeBlur:true },
      },
      {
        title: '자유 탐구',
        body: '지금까지 배운 세 가지 수차를 동시에 켜고 끄며 비교해보세요. 렌즈 보정 정도를 높이면 수차가 줄어드는 것도 확인할 수 있습니다.',
        task: '슬라이더와 체크박스를 자유롭게 조작해보세요.',
        show: { controls: ['aperture','field','dispersion','correction','focus'], checks: ['spherical','chromatic','edgeBlur'] },
        set: { aperture:74, field:15, dispersion:55, correction:28, focus:0,
               spherical:true, chromatic:true, edgeBlur:true },
      },
    ];

    // 각 컨트롤의 부모 .control div (숨김 대상)
    const controlWrap = {
      aperture:   controls.aperture.closest('.control'),
      field:      controls.field.closest('.control'),
      dispersion: controls.dispersion.closest('.control'),
      correction: controls.correction.closest('.control'),
      focus:      controls.focus.closest('.control'),
    };
    const checkWrap = {
      spherical: controls.spherical.closest('label'),
      chromatic: controls.chromatic.closest('label'),
      edgeBlur:  controls.edgeBlur.closest('label'),
    };

    var tutStep = -1; // -1 = 오버레이 표시 중

    function applyStep(idx) {
      const step = STEPS[idx];

      // 슬라이더 값 설정
      if (step.set.aperture   !== undefined) { controls.aperture.value   = step.set.aperture; }
      if (step.set.field      !== undefined) { controls.field.value      = step.set.field; }
      if (step.set.dispersion !== undefined) { controls.dispersion.value = step.set.dispersion; }
      if (step.set.correction !== undefined) { controls.correction.value = step.set.correction; }
      if (step.set.focus      !== undefined) { controls.focus.value      = step.set.focus; }
      controls.spherical.checked = !!step.set.spherical;
      controls.chromatic.checked = !!step.set.chromatic;
      controls.edgeBlur.checked  = !!step.set.edgeBlur;

      // 컨트롤 표시/숨김
      Object.entries(controlWrap).forEach(([key, el]) => {
        if (el) el.style.display = step.show.controls.includes(key) ? '' : 'none';
      });
      Object.entries(checkWrap).forEach(([key, el]) => {
        if (el) el.style.display = step.show.checks.includes(key) ? '' : 'none';
      });
      // 체크박스 섹션 타이틀: 체크가 하나라도 있으면 표시
      const checksTitleEl2 = document.querySelector('#controls .panel-title[style]');
      if (checksTitleEl2) checksTitleEl2.style.display = step.show.checks.length ? '' : 'none';
      const checksDiv = document.querySelector('#controls .checks');
      if (checksDiv) checksDiv.style.display = step.show.checks.length ? '' : 'none';

      draw();
      updateDots(idx);
      updateBar(idx);
    }

    function updateDots(idx) {
      ['tutDots','tutBarDots'].forEach(id => {
        const el2 = document.getElementById(id);
        if (!el2) return;
        el2.innerHTML = '';
        STEPS.forEach((_, i) => {
          const d = document.createElement('div');
          d.className = 'tut-dot' + (i === idx ? ' active' : '');
          el2.appendChild(d);
        });
      });
    }

    function updateBar(idx) {
      const step = STEPS[idx];
      const bar = document.getElementById('tutBar');
      bar.style.display = 'block';
      document.getElementById('tutBarStep').textContent = `${idx + 1} / ${STEPS.length}`;
      document.getElementById('tutBarTitle').textContent = step.title;
      document.getElementById('tutBarTask').textContent = step.task;
      const btn = document.getElementById('tutBarNext');
      btn.textContent = idx < STEPS.length - 1 ? '다음 →' : '완료';
    }

    function showOverlay(idx) {
      const step = STEPS[idx];
      const overlay = document.getElementById('tutOverlay');
      overlay.style.display = 'flex';
      document.getElementById('tutStepLabel').textContent =
        idx === 0 ? '환영합니다' : `${idx} / ${STEPS.length - 1}단계`;
      document.getElementById('tutTitle').textContent = step.title;
      document.getElementById('tutBody').textContent  = step.body;
      document.getElementById('tutTask').textContent  = step.task;
      document.getElementById('tutNext').textContent  = idx === 0 ? '시작하기 →' : '직접 해보기 →';
      updateDots(idx);
    }

    function dismissOverlay() {
      // 카드만 닫고 탐구 시작 — 오버레이 배경 제거
      document.getElementById('tutOverlay').style.display = 'none';
    }

    function goBarNext() {
      tutStep++;
      if (tutStep >= STEPS.length) { endTutorial(); return; }
      applyStep(tutStep);
      showOverlay(tutStep); // 새 단계 카드 표시 (닫으면 탐구 가능)
    }

    function endTutorial() {
      document.getElementById('tutOverlay').style.display = 'none';
      document.getElementById('tutBar').style.display = 'none';
      // 모든 컨트롤 다시 보이기
      Object.values(controlWrap).forEach(el => { if (el) el.style.display = ''; });
      Object.values(checkWrap).forEach(el => { if (el) el.style.display = ''; });
      const checksTitleEl3 = document.querySelector('#controls .panel-title[style]');
      if (checksTitleEl3) checksTitleEl3.style.display = '';
      const checksDiv2 = document.querySelector('#controls .checks');
      if (checksDiv2) checksDiv2.style.display = '';
    }

    // 버튼 이벤트
    document.getElementById('tutNext').addEventListener('click', dismissOverlay);
    document.getElementById('tutSkip').addEventListener('click', endTutorial);
    document.getElementById('tutExit').addEventListener('click', endTutorial);
    document.getElementById('tutBarNext').addEventListener('click', () => {
      if (tutStep < STEPS.length - 1) {
        goBarNext();
      } else {
        endTutorial();
      }
    });

    // 시작: 0단계 적용 후 카드 표시
    tutStep = 0;
    applyStep(0);
    showOverlay(0);

  })();
  </script>
</body>
</html>
