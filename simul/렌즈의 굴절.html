<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https: wss:; media-src 'self' https: blob: data:; worker-src 'self' blob:; frame-src 'self' https:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self';">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>렌즈의 굴절</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <style>
    :root {
      --bg1: #f7fbff;
      --bg2: #eef6ff;
      --ink: #0f172a;
      --sub: #546076;
      --axis: #2563eb;
      --accent: #2563eb;
      --good: #16a34a;
      --warn: #f59e0b;
      --bad: #ef4444;
      --panel: #ffffff;
      --line: #e6eef9;
      --shadow: 0 12px 36px rgba(15, 23, 42, .12);
      --radius: 14px;
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      height: 100%
    }

    body {
      margin: 0;
      color: var(--ink);
      background: radial-gradient(1200px 800px at 10% -10%, var(--bg2) 0%, var(--bg1) 60%);
      font: 16px/1.7 system-ui, -apple-system, Segoe UI, Roboto, Pretendard, 'Noto Sans KR', sans-serif;
    }

    #sketch {
      position: fixed;
      inset: 0
    }

    .overlay {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 10;
      width: min(380px, 92vw);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px 14px 12px;
    }

    .overlay h2 {
      margin: 0 0 8px;
      font-size: 17px
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0
    }

    label {
      font-size: 14.5px;
      color: var(--sub)
    }

    select,
    input[type="range"] {
      width: 100%;
      accent-color: var(--accent)
    }

    .kv {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 14px;
      margin-top: 10px
    }

    .kv div {
      background: #f7fafc;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 15px
    }

    .kv b {
      display: block;
      font-weight: 700;
      color: #65748b;
      margin-bottom: 3px;
      font-size: 14px
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 13px;
      margin-right: 6px
    }

    .real {
      background: #e8f7ee;
      border: 1px solid #b7ebc3;
      color: #065f46
    }

    .virtual {
      background: #ffecec;
      border: 1px solid #ffc6c6;
      color: #7f1d1d
    }

    .note {
      color: #65748b;
      font-size: 14px;
      margin-top: 8px
    }

    .hint {
      position: fixed;
      left: 14px;
      bottom: 14px;
      background: #ffffffcc;
      backdrop-filter: blur(4px);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 9px 12px;
      box-shadow: var(--shadow);
      font-size: 14px
    }

    .hidden {
      display: none
    }

    canvas {
      display: block
    }

    /* === 도전 박스 (렌즈 게임용, 왼쪽 위) - 밝은 색 테마 === */
    .challenge-box {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 15;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 10px 12px;
      min-width: 230px;
      color: #0f172a;
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 28px rgba(148, 163, 184, 0.55);
      font-size: 13px;
    }

    .cb-title {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      color: #2563eb;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .cb-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }

    .cb-label {
      font-size: 12px;
      color: #64748b;
    }

    .cb-value {
      font-size: 16px;
      font-weight: 800;
      min-width: 60px;
      text-align: right;
      color: #0f172a;
    }

    .cb-best .cb-value {
      color: #f59e0b;
      text-shadow: 0 0 5px rgba(245, 158, 11, 0.6);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
    }

    .cb-best .trophy {
      font-size: 18px;
    }

    .cb-btn {
      margin-top: 6px;
      width: 100%;
      border-radius: 999px;
      border: 1px solid #bfdbfe;
      background: linear-gradient(135deg, #2563eb, #38bdf8);
      color: #f9fafb;
      font-size: 13px;
      font-weight: 700;
      padding: 6px 0;
      cursor: pointer;
    }

    .cb-btn:hover {
      filter: brightness(1.05);
    }

    .cb-btn-secondary {
      margin-top: 4px;
      background: #e5e7eb;
      border-color: #cbd5e1;
      color: #111827;
      font-size: 12px;
      padding: 5px 0;
    }

    .cb-btn-secondary:hover {
      background: #d1d5db;
    }

    .cb-msg {
      margin-top: 6px;
      font-size: 11.5px;
      line-height: 1.5;
      color: #4b5563;
      min-height: 40px;
    }

    .cb-msg small {
      display: block;
      color: #9ca3af;
      margin-top: 2px;
    }

    .cb-section {
      margin-top: 6px;
    }

    .cb-subtitle {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 4px;
    }

    .cb-choice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 4px;
    }

    .cb-choice-grid.cb-size-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .cb-opt {
      border-radius: 999px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      color: #374151;
      padding: 4px 6px;
      font-size: 11px;
      cursor: pointer;
      text-align: center;
      white-space: nowrap;
    }

    .cb-opt:hover {
      background: #e5f0ff;
      border-color: #93c5fd;
    }

    .cb-opt.selected {
      border-color: #2563eb;
      background: radial-gradient(circle at 0% 0%, #bfdbfe, #3b82f6);
      color: #f9fafb;
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.4);
    }

    .cb-size-section {
      margin-top: 4px;
    }

    .cb-property-section {
      margin-top: 6px;
    }

    .cb-property-grid {
      grid-template-columns: 1fr;
    }

    .cb-opt-property {
      border-radius: 10px;
      padding: 6px 8px;
      text-align: left;
      white-space: normal;
      line-height: 1.35;
    }

    /* 최고점수 팝 애니메이션 */
    @keyframes bestPop {
      0% {
        transform: scale(1);
      }

      30% {
        transform: scale(1.25);
      }

      60% {
        transform: scale(0.92);
      }

      100% {
        transform: scale(1);
      }
    }

    #lens-challenge .best-badge {
      animation: none;
    }

    #lens-challenge .best-badge.best-bump {
      animation: bestPop .6s ease-out;
    }

    /* === 스크린 패널 (우측 하단) === */
    .screen-panel {
      position: fixed;
      bottom: 14px;
      right: 14px;
      z-index: 10;
      background: #111827;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 8px 10px;
      text-align: center;
      pointer-events: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }
    .screen-panel-title {
      color: #9ca3af;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: .05em;
    }
    .screen-status {
      margin-top: 6px;
      font-size: 12px;
      color: #9ca3af;
    }
    .screen-status.good { color: #34d399; font-weight: 700; }
    .screen-status.warn { color: #fbbf24; }
    .screen-status.bad  { color: #f87171; }
  </style>
</head>

<body>
  <div id="sketch"></div>

  <!-- 오른쪽 설정 패널 (원래 UI 그대로) -->
  <div class="overlay">
    <h2>설정</h2>
    <div class="row">
      <label for="lensType">렌즈 종류</label>
      <select id="lensType">
        <option value="convex">볼록렌즈 (수렴, f &gt; 0)</option>
        <option value="concave">오목렌즈 (발산, f &lt; 0)</option>
      </select>
    </div>
    <div class="row">
      <label for="focal" style="min-width:110px">초점거리 |f| (px)</label>
      <input id="focal" type="range" min="40" max="300" value="160" />
    </div>
    <div class="row" style="gap:14px; flex-wrap:wrap">
      <label><input type="checkbox" id="showRays" checked /> 주광선</label>
      <label><input type="checkbox" id="showGrid" checked /> 격자</label>
      <label><input type="checkbox" id="showInfo" /> 값 표시</label>
      <label><input type="checkbox" id="showGuide" checked /> a,b & 허상 보조선</label>
    </div>

    <!-- ▼ 값 섹션 전체를 래핑: 토글로 통째로 숨김 -->
    <div id="kvSection">
      <h2>실시간 값</h2>
      <div class="kv" id="kv">
        <div><b>초점거리 f</b><span id="kv_f">—</span></div>
        <div><b>물체거리 d<sub>o</sub> (= a)</b><span id="kv_do">—</span></div>
        <div><b>상거리 d<sub>i</sub> (= b)</b><span id="kv_di">—</span></div>
        <div><b>배율 m</b><span id="kv_m">—</span></div>
        <div style="grid-column:1 / -1"><b>상의 성격</b><span id="kv_kind">—</span></div>
      </div>
      <p class="note">공식: <em>1/f = 1/a + 1/b, &nbsp; m = -b/a</em> (표준부호: a&gt;0, b&gt;0(실상)/b&lt;0(허상))</p>
    </div>
    <!-- ▲ 값 섹션 -->

    <!-- 심화탐구 섹션 -->
    <div style="margin-top:10px;border-top:1px solid #e6eef9;padding-top:10px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="font-size:14.5px;font-weight:700;color:#1e40af;">심화탐구</span>
        <button id="toggleAdv" style="font-size:12px;padding:2px 10px;border:1px solid #bfdbfe;border-radius:999px;background:#eff6ff;color:#1d4ed8;cursor:pointer;">펼치기</button>
      </div>
      <div id="advSection" style="display:none;">
        <div class="row">
          <label style="min-width:90px">렌즈 직경</label>
          <input id="lensDiam" type="range" min="50" max="600" value="480" />
        </div>
        <div class="row">
          <label style="min-width:90px">추가 광선</label>
          <input id="extraRaysSlider" type="range" min="0" max="20" value="0" />
        </div>
        <div style="margin:6px 0 4px;">
          <label style="font-size:14.5px;color:#546076;font-weight:600;">가림막 (%)</label>
          <div style="display:flex;gap:10px;margin-top:4px;">
            <div style="flex:1;">
              <label style="font-size:13px;color:#6b7280;">위쪽</label>
              <input id="blockTop" type="range" min="0" max="100" value="0" style="width:100%;display:block;"/>
            </div>
            <div style="flex:1;">
              <label style="font-size:13px;color:#6b7280;">아래쪽</label>
              <input id="blockBottom" type="range" min="0" max="100" value="0" style="width:100%;display:block;"/>
            </div>
          </div>
        </div>
        <div class="row">
          <label style="min-width:90px">매질</label>
          <select id="medium">
            <option value="air">공기 (n=1.0)</option>
            <option value="hotAir">가열된 공기 (n≈1.1)</option>
            <option value="water">물 (n=1.33)</option>
            <option value="glass">동일 유리 (n=1.5)</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- 왼쪽 아래 힌트 (기존 그대로) -->
  <div class="hint">드래그: 렌즈 세로선, 스크린 세로선, 물체 밑점 ●, 화살촉 ●</div>

  <!-- 왼쪽 위 렌즈 도전 박스 -->
  <div class="challenge-box" id="lens-challenge">
    <div class="cb-title">렌즈 도전</div>
    <div class="cb-row">
      <div class="cb-label">라운드</div>
      <div class="cb-value" id="lens-round">-</div>
    </div>
    <div class="cb-row">
      <div class="cb-label">점수</div>
      <div class="cb-value" id="lens-score">0</div>
    </div>
    <div class="cb-row cb-best">
      <div class="cb-label">최고점수</div>
      <div class="cb-value best-badge">
        <span class="trophy">🏆</span>
        <span id="lens-best">0</span>
      </div>
    </div>
    <button id="lens-start" class="cb-btn">도전</button>
    <!-- 정답제출 버튼은 더 이상 쓰지 않으므로 숨김 -->
    <button id="lens-submit" class="cb-btn cb-btn-secondary" style="display:none;">정답 제출</button>

    <div class="cb-section cb-kind-section">
      <div class="cb-subtitle">상의 종류</div>
      <div class="cb-choice-grid">
        <button class="cb-opt cb-opt-kind" data-kind="도립실상">도립 실상</button>
        <button class="cb-opt cb-opt-kind" data-kind="정립실상">정립 실상</button>
        <button class="cb-opt cb-opt-kind" data-kind="도립허상">도립 허상</button>
        <button class="cb-opt cb-opt-kind" data-kind="정립허상">정립 허상</button>
      </div>
    </div>

    <div class="cb-section cb-size-section">
      <div class="cb-subtitle">크기 (4~10라운드에서 사용)</div>
      <div class="cb-choice-grid cb-size-grid">
        <button class="cb-opt cb-opt-size" data-size="확대">확대</button>
        <button class="cb-opt cb-opt-size" data-size="동일">동일</button>
        <button class="cb-opt cb-opt-size" data-size="축소">축소</button>
      </div>
    </div>

    <div class="cb-section cb-property-section" style="display:none;">
      <div class="cb-subtitle">물리적 성질</div>
      <div class="cb-choice-grid cb-property-grid">
        <button class="cb-opt cb-opt-property"></button>
        <button class="cb-opt cb-opt-property"></button>
        <button class="cb-opt cb-opt-property"></button>
      </div>
    </div>

    <div class="cb-msg" id="lens-msg">
      도전 버튼을 눌러<br>렌즈 도전 게임을 시작하세요.
      <small>1~5단계 기본 압축 · 6~10단계 심화탐구</small>
    </div>
  </div>

  <script>
    /* ===== Fullscreen Lens Simulator (값 박스 토글) ===== */
    let W, H, axisY;
    let lensX;
    let objectX, objectH;
    let dragging = null;
    let dragOffsetX = 0, dragOffsetY = 0;
    let screenX;

    let ui = {};
    const EPS = 1e-4;
    const GRID = 72;

    /* 게임 상태를 p5 쪽에서도 알 수 있게 전역으로 둠 */
    let lensGameOn = false;
    let lensGameRound = 0;
    let lensRoundLocked = false;  // 한 라운드에서 중복 클릭 방지

    function setup() {
      pixelDensity(1);
      createCanvas(windowWidth, windowHeight).parent('sketch');
      const c = document.querySelector('#sketch canvas');
      initLayout();

      ui.lensType = document.getElementById('lensType');
      ui.focal = document.getElementById('focal');
      ui.showRays = document.getElementById('showRays');
      ui.showGrid = document.getElementById('showGrid');
      ui.showInfo = document.getElementById('showInfo');
      ui.showGuide = document.getElementById('showGuide');
      ui.kvSection = document.getElementById('kvSection');
      ui.lensDiam = document.getElementById('lensDiam');
      ui.extraRaysSlider = document.getElementById('extraRaysSlider');
      ui.blockTop = document.getElementById('blockTop');
      ui.blockBottom = document.getElementById('blockBottom');
      ui.medium = document.getElementById('medium');

      const toggleAdv = document.getElementById('toggleAdv');
      const advSection = document.getElementById('advSection');
      if (toggleAdv && advSection) {
        toggleAdv.addEventListener('click', () => {
          const open = advSection.style.display !== 'none';
          advSection.style.display = open ? 'none' : 'block';
          toggleAdv.textContent = open ? '펼치기' : '접기';
          if (open) {
            // 접을 때 심화 설정 초기화
            if (ui.lensDiam)         ui.lensDiam.value = 480;
            if (ui.extraRaysSlider)  ui.extraRaysSlider.value = 0;
            if (ui.blockTop)         ui.blockTop.value = 0;
            if (ui.blockBottom)      ui.blockBottom.value = 0;
            if (ui.medium)           ui.medium.value = 'air';
          }
        });
      }
      ui.kv = {
        f: document.getElementById('kv_f'),
        do: document.getElementById('kv_do'),
        di: document.getElementById('kv_di'),
        m: document.getElementById('kv_m'),
        kind: document.getElementById('kv_kind'),
      };

      const applyKvVisibility = () => {
        if (ui.showInfo.checked) ui.kvSection.classList.remove('hidden');
        else ui.kvSection.classList.add('hidden');
      };
      ui.showInfo.addEventListener('change', applyKvVisibility);
      applyKvVisibility(); // 초기 적용
    }

    function initLayout() {
      W = windowWidth; H = windowHeight;
      const rawAxis = H * 0.58;
      axisY = Math.round(rawAxis / GRID) * GRID;
      lensX = W * 0.5;
      objectX = W * 0.25;
      objectH = 120;
      screenX = W * 0.5 + 200;
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      W = windowWidth; H = windowHeight;
      const rawAxis = H * 0.58;
      axisY = Math.round(rawAxis / GRID) * GRID;
      lensX = constrain(lensX, 40, W - 40);
      objectX = constrain(objectX, 20, W - 20);
      screenX = constrain(screenX, 40, W - 20);
    }

    function draw() {
      const type = ui.lensType.value;
      const fmag = parseFloat(ui.focal.value);

      // 매질에 따른 유효 초점거리
      const medium = ui.medium ? ui.medium.value : 'air';
      const n_m = { water: 1.33, hotAir: 1.1, glass: 1.5, air: 1.0 }[medium] || 1.0;
      let fmag_eff = fmag;
      if (n_m > 1.0 && n_m < 1.5) fmag_eff = fmag * (0.5 / (1.5 / n_m - 1));
      const f = (type === 'convex') ? +fmag_eff : -fmag_eff;

      // 렌즈 직경 & 가림막 계산
      const lensDiam = ui.lensDiam ? parseFloat(ui.lensDiam.value) : 480;
      const blockTopPct = ui.blockTop ? parseFloat(ui.blockTop.value) : 0;
      const blockBotPct = ui.blockBottom ? parseFloat(ui.blockBottom.value) : 0;
      const lensR = lensDiam / 2;
      const btAmt = lensDiam * blockTopPct / 100;
      const bbAmt = lensDiam * blockBotPct / 100;
      const lensTopY = axisY - lensR;
      const lensBotY = axisY + lensR;
      const openTopY = lensTopY + btAmt;
      const openBotY = lensBotY - bbAmt;
      const effectiveR = Math.max(0, openBotY - openTopY) / 2;

      // 배경색 (매질별)
      const bgFill = medium === 'water'  ? [240, 249, 255, 230] :
                     medium === 'hotAir' ? [255, 241, 242, 230] :
                     medium === 'glass'  ? [243, 244, 246, 230] : [255, 255, 255, 230];

      clear();
      noStroke(); fill(...bgFill); rect(0, 0, width, height);

      if (ui.showGrid.checked) drawGrid();

      stroke('#2563eb'); strokeWeight(2.2);
      line(0, axisY, width, axisY);

      drawLensSilhouette(lensX, fmag, type, lensR);

      const objTip = { x: objectX, y: axisY - objectH };
      drawArrow(objectX, axisY, objTip.x, objTip.y, color(37, 99, 235), true);

      const incomingLeft = objectX < lensX;
      const a = Math.abs(lensX - objectX);
      const denom = (1 / f) - (1 / a);
      let atInfinity = false, b, m;

      if (Math.abs(denom) < EPS) { atInfinity = true; b = Infinity; m = NaN; }
      else { b = 1 / denom; m = -b / a; }
      if (medium === 'glass') { atInfinity = true; b = Infinity; m = NaN; }

      const imgX = atInfinity ? (incomingLeft ? width - 10 : 10)
        : (incomingLeft ? lensX + b : lensX - b);
      const imgH = atInfinity ? 0 : objectH * m;
      const imgTip = { x: imgX, y: axisY - imgH };
      const isReal = !atInfinity && (b > 0);

      // 가림막 그리기
      push(); fill('#1f2937'); noStroke();
      if (blockTopPct > 0) rect(lensX - 18, lensTopY, 36, btAmt);
      if (blockBotPct > 0) rect(lensX - 18, lensBotY - bbAmt, 36, bbAmt);
      pop();

      if (ui.showRays.checked) {
        if (medium === 'glass') {
          drawGlassRays({ objTip, lensX, axisY, f, type, incomingLeft });
        } else {
          drawPrincipalRays({ objTip, lensX, axisY, f, type, incomingLeft });
        }
      }

      // 추가 광선 (심화)
      const numExtra = ui.extraRaysSlider ? parseInt(ui.extraRaysSlider.value) : 0;
      if (numExtra > 0 && openBotY > openTopY) {
        const step = (openBotY - openTopY) / (numExtra + 1);
        push(); strokeWeight(1.2);
        for (let ri = 1; ri <= numExtra; ri++) {
          const ry = openTopY + ri * step;
          stroke(253, 224, 71, 150);
          line(objTip.x, objTip.y, lensX, ry);
          if (atInfinity) {
            if (medium === 'glass') {
              // 굴절 없음: 입사 방향 그대로 직진
              const dx = lensX - objTip.x, dy = ry - objTip.y;
              const scale = Math.abs(dx) < 0.01 ? 1000
                : (incomingLeft ? width - lensX : lensX) / Math.abs(dx);
              line(lensX, ry, lensX + dx * scale, ry + dy * scale);
            } else {
              line(lensX, ry, incomingLeft ? width : 0, ry);
            }
          } else if (isReal) {
            const sl = (imgTip.y - ry) / (imgTip.x - lensX);
            const dx = incomingLeft ? width - lensX : -lensX;
            line(lensX, ry, lensX + dx, ry + sl * dx);
          } else {
            const dirX = lensX - imgTip.x, dirY = ry - imgTip.y;
            const t = Math.abs(dirX) > 0.01 ? (incomingLeft ? width - lensX : lensX) / Math.abs(dirX) : 0;
            const signX = incomingLeft ? 1 : -1;
            line(lensX, ry, lensX + dirX * t * signX, ry + dirY * t * signX);
            drawingContext.setLineDash([4, 5]);
            stroke(253, 224, 71, 70);
            line(lensX, ry, imgTip.x, imgTip.y);
            drawingContext.setLineDash([]);
          }
        }
        pop();
      }

      if (!atInfinity) {
        const clr = isReal ? color(22, 163, 74) : color(239, 68, 68);
        drawArrow(imgX, axisY, imgTip.x, imgTip.y, clr, isReal, !isReal);
      } else {
        push(); noStroke(); fill('#f59e0b'); textAlign(CENTER, BOTTOM); textSize(16);
        const infMsg = (medium === 'glass')
          ? '동일 매질: 굴절 없음  (빛이 직진)'
          : 'a ≈ f  →  상이 무한 원거리(평행광)';
        text(infMsg, width * 0.5, 26); pop();
      }

      // 허상 보조선: 9~10라운드에는 난이도 상승을 위해 숨김
      if (ui.showGuide.checked && !atInfinity && !isReal && !(lensGameOn && lensGameRound >= 9)) {
        const F_in_ref = incomingLeft
          ? { x: lensX - Math.abs(f), y: axisY }
          : { x: lensX + Math.abs(f), y: axisY };
        const hit2 = lineIntersectionWithX(objTip, F_in_ref, lensX);

        push();
        drawingContext.setLineDash([7, 7]);

        // 노란 광선 보조선: 렌즈(objTip.y 높이) → 허상
        stroke(255, 193, 7, 200); strokeWeight(2);
        line(lensX, objTip.y, imgTip.x, imgTip.y);

        // 청색 광선 보조선: 렌즈 중심 → 허상
        stroke(56, 189, 248, 200); strokeWeight(2);
        line(lensX, axisY, imgTip.x, imgTip.y);

        // 보라색 광선 보조선: hit2 → 허상
        if (hit2) {
          stroke(168, 85, 247, 200); strokeWeight(2);
          line(hit2.x, hit2.y, imgTip.x, imgTip.y);
        }

        drawingContext.setLineDash([]);
        noStroke(); fill(100, 116, 139);
        circle(imgTip.x, imgTip.y, 8);
        pop();
      }

      drawFoci(lensX, axisY, f);

      // a, b 보조선: 9~10라운드에는 숨김
      if (ui.showGuide.checked && !(lensGameOn && lensGameRound >= 9)) {
        drawMeasureAB({ a, b, lensX, objectX, imgX, axisY, showB: !atInfinity });
      }

      drawHandles();

      if (ui.showInfo.checked) {
        updateKV(f, a, b, m, atInfinity, incomingLeft, medium);
      }

      // === 스크린 그리기 & 미니 캔버스 업데이트 ===
      {
        const screenPx = Math.max(1, screenX - lensX);
        push();
        stroke(156, 163, 175); strokeWeight(5);
        line(screenX, 0, screenX, height);
        noStroke(); fill(75, 85, 99); textAlign(LEFT, TOP); textSize(13);
        textStyle(BOLD);
        text('스크린', screenX + 7, 22);
        textStyle(NORMAL);
        pop();
        updateScreenCanvas(a, b, atInfinity, isReal, screenPx, objectH, effectiveR);
      }

      // 도전 라운드 중 추론형 문제에서는 렌즈 오른쪽을 가림
      if (
        lensGameOn &&
        typeof window.shouldHideLensChallengeRightSide === 'function' &&
        window.shouldHideLensChallengeRightSide()
      ) {
        push();
        noStroke();
        fill(255);               // 완전 불투명
        rect(lensX, 0, width - lensX, height);
        pop();
      }
    }

    function drawGrid() {
      push();
      stroke('#e6eef9'); strokeWeight(1.2);
      for (let x = 0; x <= width; x += GRID) line(x, 0, x, height);
      for (let y = axisY; y <= height; y += GRID) line(0, y, width, y);
      for (let y = axisY - GRID; y >= 0; y -= GRID) line(0, y, width, y);
      pop();
    }

    /* ===== 렌즈 실루엣 ===== */
    function drawLensSilhouette(x, f, type, limitR) {
      const top = (limitR != null) ? Math.max(24, axisY - limitR) : 24;
      const bot = (limitR != null) ? Math.min(height - 24, axisY + limitR) : height - 24;
      const h = bot - top;
      const semiAp = h / 2;
      const leftPts = [], rightPts = [];
      const steps = 64;

      // 사기타 공식으로 초점거리에 따른 렌즈 두께 계산
      // sagitta ≈ semiAp² / (2R), 볼록렌즈 R ≈ f (n=1.5 가정)
      const fAbs = Math.max(10, Math.abs(f));
      const sagitta = Math.min(38, semiAp * semiAp / fAbs * 0.04);
      let centerHalf, edgeHalf;
      if (type === 'convex') {
        centerHalf = Math.max(4, sagitta);  // 중앙이 두꺼움
        edgeHalf = 2;
      } else {
        edgeHalf = Math.max(7, sagitta + 4);  // 가장자리가 두꺼움
        centerHalf = 2;
      }

      for (let i = 0; i <= steps; i++) {
        const t = i / steps, y = top + t * h, s = Math.sin(t * Math.PI);
        const half = edgeHalf + (centerHalf - edgeHalf) * s;
        leftPts.push({ x: x - half, y }); rightPts.push({ x: x + half, y });
      }

      push();
      noStroke(); fill(37, 99, 235, 40);
      beginShape();
      for (const p of leftPts) vertex(p.x, p.y);
      for (let i = rightPts.length - 1; i >= 0; i--) vertex(rightPts[i].x, rightPts[i].y);
      endShape(CLOSE);

      stroke('#2563eb'); strokeWeight(2.2); noFill();
      beginShape(); for (const p of leftPts) vertex(p.x, p.y); endShape();
      beginShape(); for (const p of rightPts) vertex(p.x, p.y); endShape();

      stroke('#60a5fa'); strokeWeight(1.6);
      line(x, top, x, bot);

      // 라벨: 렌즈 아래
      noStroke(); fill('#475569'); textAlign(CENTER, TOP); textSize(15);
      text((type === 'convex') ? '볼록렌즈' : '오목렌즈', x, bot + 5);
      pop();
    }

    function drawFoci(x, y, f) {
      push();
      stroke('#93c5fd'); strokeWeight(2);
      line(x + f, y - 8, x + f, y + 8);
      line(x - f, y - 8, x - f, y + 8);
      noStroke(); fill('#64748b'); textAlign(CENTER, BOTTOM); textSize(16);
      text('F', x + f, y - 10); text('F', x - f, y - 10);
      pop();
    }

    function drawArrow(baseX, baseY, tipX, tipY, clr, solid = true, dashed = false) {
      push();
      stroke(clr); strokeWeight(3);
      drawingContext.setLineDash(dashed ? [8, 7] : []);
      line(baseX, baseY, tipX, tipY);
      const ang = Math.atan2(tipY - baseY, tipX - baseX);
      const ah = 13, a1 = ang + Math.PI * 0.9, a2 = ang - Math.PI * 0.9;
      line(tipX, tipY, tipX + ah * Math.cos(a1), tipY + ah * Math.sin(a1));
      line(tipX, tipY, tipX + ah * Math.cos(a2), tipY + ah * Math.sin(a2));
      pop();
    }

    function drawPrincipalRays({ objTip, lensX, axisY, f, type, incomingLeft }) {
      const F_left = { x: lensX - Math.abs(f), y: axisY };
      const F_right = { x: lensX + Math.abs(f), y: axisY };
      const F_in = incomingLeft ? F_left : F_right;
      const F_out = incomingLeft ? F_right : F_left;
      const center = { x: lensX, y: axisY };

      push();
      stroke(255, 193, 7, 230); strokeWeight(2.4);
      line(objTip.x, objTip.y, lensX, objTip.y);
      if (type === 'convex') {
        extendFromThrough({ x: lensX, y: objTip.y }, F_out, incomingLeft ? +1 : -1);
      } else {
        const dir = { x: lensX - F_in.x, y: objTip.y - F_in.y };
        extendFromDir({ x: lensX, y: objTip.y }, dir, incomingLeft ? +1 : -1);
      }
      pop();

      push();
      stroke(56, 189, 248, 230); strokeWeight(2.4);
      line(objTip.x, objTip.y, center.x, center.y);
      const dirC = { x: center.x - objTip.x, y: center.y - objTip.y };
      extendFromDir(center, dirC, incomingLeft ? +1 : -1);
      pop();

      push();
      stroke(168, 85, 247, 230); strokeWeight(2.4);
      const hit2 = lineIntersectionWithX(objTip, F_in, lensX);
      if (hit2) { line(objTip.x, objTip.y, hit2.x, hit2.y); extendHorizontal(hit2, incomingLeft ? +1 : -1); }
      pop();
    }

    function drawGlassRays({ objTip, lensX, axisY, f, type, incomingLeft }) {
      const sideSign = incomingLeft ? +1 : -1;
      const F_in = incomingLeft
        ? { x: lensX - Math.abs(f), y: axisY }
        : { x: lensX + Math.abs(f), y: axisY };

      // 황색: 수평 입사 → 그대로 직진
      push(); stroke(255, 193, 7, 230); strokeWeight(2.4);
      line(objTip.x, objTip.y, lensX, objTip.y);
      extendFromDir({ x: lensX, y: objTip.y }, { x: sideSign, y: 0 }, sideSign);
      pop();

      // 청색: 중심 통과 → 그대로 직진
      push(); stroke(56, 189, 248, 230); strokeWeight(2.4);
      line(objTip.x, objTip.y, lensX, axisY);
      extendFromDir({ x: lensX, y: axisY }, { x: lensX - objTip.x, y: axisY - objTip.y }, sideSign);
      pop();

      // 보라: F_in 향하던 선 → 그대로 직진
      const hit2 = lineIntersectionWithX(objTip, F_in, lensX);
      if (hit2) {
        push(); stroke(168, 85, 247, 230); strokeWeight(2.4);
        line(objTip.x, objTip.y, hit2.x, hit2.y);
        extendFromDir(hit2, { x: hit2.x - objTip.x, y: hit2.y - objTip.y }, sideSign);
        pop();
      }
    }

    function extendFromThrough(P, Q, sideSign) { const dir = { x: Q.x - P.x, y: Q.y - P.y }; extendFromDir(P, dir, sideSign); }
    function extendFromDir(P, dir, sideSign) {
      let t;
      if (sideSign > 0) {
        if (Math.abs(dir.x) < 1e-6) { line(P.x, P.y, width, P.y); return; }
        t = (width - P.x) / dir.x; line(P.x, P.y, width, P.y + dir.y * t);
      } else {
        if (Math.abs(dir.x) < 1e-6) { line(P.x, P.y, 0, P.y); return; }
        t = (0 - P.x) / dir.x; line(P.x, P.y, 0, P.y + dir.y * t);
      }
    }
    function extendHorizontal(P, sideSign) { if (sideSign > 0) line(P.x, P.y, width, P.y); else line(P.x, P.y, 0, P.y); }
    function lineIntersectionWithX(A, B, xLine) {
      const dx = B.x - A.x; if (Math.abs(dx) < 1e-6) return null;
      const t = (xLine - A.x) / dx; return { x: xLine, y: A.y + (B.y - A.y) * t };
    }

    /* ===== 측정 화살표 a, b ===== */
    function drawMeasureAB({ a, b, lensX, objectX, imgX, axisY, showB }) {
      const yA = axisY + 30, yB = axisY + 58;
      drawDoubleArrow(min(lensX, objectX), max(lensX, objectX), yA, '#64748b', 'a');
      if (showB) drawDoubleArrow(min(lensX, imgX), max(lensX, imgX), yB, (b > 0 ? '#16a34a' : '#ef4444'), 'b');
    }
    function drawDoubleArrow(x1, x2, y, colorHex, label) {
      push();
      stroke(colorHex); strokeWeight(2.2);
      line(x1, y, x2, y);
      drawHead(x1, y, -1, colorHex); drawHead(x2, y, +1, colorHex);
      noStroke(); fill(colorHex); textAlign(CENTER, BOTTOM); textSize(16);
      text(label, (x1 + x2) / 2, y - 4);
      pop();
    }
    function drawHead(x, y, dir, colorHex) {
      const ah = 11; push(); stroke(colorHex); strokeWeight(2.2);
      line(x, y, x + dir * ah, y - ah * 0.6);
      line(x, y, x + dir * ah, y + ah * 0.6); pop();
    }

    function updateKV(f, a, b, m, atInf, incomingLeft, medium) {
      const fmt = (v) => (Number.isFinite(v) ? (Math.abs(v) > 9999 ? v.toExponential(2) : v.toFixed(2)) : '—');
      const sideIn = incomingLeft ? '입사측(좌)' : '입사측(우)';
      const sideOut = incomingLeft ? '출사측(우)' : '출사측(좌)';

      ui.kv.f.textContent = `${fmt(f)} px  ${f > 0 ? '(볼록)' : '(오목)'}`;
      ui.kv.do.textContent = `${fmt(a)} px ${sideIn}  ≡  a`;
      if (medium === 'glass') {
        ui.kv.di.textContent = '— (굴절 없음)';
        ui.kv.m.textContent = '—';
        ui.kv.kind.innerHTML = `<span class="badge" style="background:#fef3c7;border:1px solid #fcd34d;color:#92400e">동일 매질 — 직진</span>`;
      } else if (atInf) {
        ui.kv.di.textContent = '∞ (평행)  ≡  b';
        ui.kv.m.textContent = '—';
        ui.kv.kind.innerHTML = `a ≈ f  →  <span class="badge real">상이 무한 원거리</span>`;
      } else {
        const real = b > 0;
        ui.kv.di.textContent = `${fmt(b)} px ${real ? sideOut : sideIn}  ≡  b`;
        ui.kv.m.textContent = `${fmt(m)} ${m > 0 ? '(정립)' : '(도치)'}`;
        const mag = Math.abs(m) > 1 ? '확대' : (Math.abs(m) < 1 ? '축소' : '동일');
        ui.kv.kind.innerHTML =
          `<span class="badge ${real ? 'real' : 'virtual'}">${real ? '실상' : '허상'}</span>` +
          `<span class="badge" style="background:#e8efff;border:1px solid #c7d7ff;color:#1e40af">` + (m > 0 ? '정립' : '도치') + `</span>` +
          `<span class="badge" style="background:#f1f5f9;border:1px solid #e2e8f0;color:#334155">${mag}</span>`;
      }
    }

    function drawHandles() {
      push();
      noStroke();
      fill('#2563eb');
      circle(objectX, axisY, 11);
      circle(objectX, axisY - objectH, 11);
      fill('#4ade80');
      rect(screenX - 4, 18, 8, 22, 3);
      pop();
    }

    /* ===== 드래그 ===== */
    function pointerPressed(px, py) {
      // 도전 게임 중에는 드래그로 값 변경 불가
      if (lensGameOn) return;

      if (px < 0 || px > width || py < 0 || py > height) return;

      if (Math.abs(px - screenX) < 10) {
        dragging = 'screen'; return;
      }
      if (Math.abs(px - lensX) < 10) {
        dragging = 'lens'; dragOffsetX = px - lensX; return;
      }
      if (dist(px, py, objectX, axisY) < 12) {
        dragging = 'obj-base'; dragOffsetX = px - objectX; return;
      }
      if (dist(px, py, objectX, axisY - objectH) < 12) {
        dragging = 'obj-tip'; dragOffsetX = px - objectX; dragOffsetY = py - (axisY - objectH); return;
      }
    }

    function pointerDragged(px, py) {
      if (!dragging) return;

      if (dragging === 'screen') {
        screenX = constrain(px, lensX + 5, width - 20);
      } else if (dragging === 'lens') {
        lensX = constrain(px - dragOffsetX, 40, width - 40);
        if (Math.abs(lensX - objectX) < 10) lensX = (lensX > objectX) ? objectX + 10 : objectX - 10;
        screenX = Math.max(screenX, lensX + 5);
      } else if (dragging === 'obj-base') {
        objectX = constrain(px - dragOffsetX, 20, width - 20);
        if (Math.abs(lensX - objectX) < 10) objectX = (objectX < lensX) ? lensX - 10 : lensX + 10;
      } else if (dragging === 'obj-tip') {
        objectX = constrain(px - dragOffsetX, 20, width - 20);
        if (Math.abs(lensX - objectX) < 10) objectX = (objectX < lensX) ? lensX - 10 : lensX + 10;

        const tipY = py - dragOffsetY;
        const maxH = 240;
        objectH = constrain(axisY - tipY, -maxH, maxH);
      }
    }

    function pointerReleased() {
      dragging = null;
    }

    /* --- 마우스 이벤트 --- */
    function mousePressed() { pointerPressed(mouseX, mouseY); }
    function mouseDragged() { pointerDragged(mouseX, mouseY); }
    function mouseReleased() { pointerReleased(); }

    /* --- 터치 이벤트 --- */
    function isTouchOnUI(e) {
      if (!e || !e.target) return false;

      // 오른쪽 설정 패널(.overlay), 도전패널(#lens-challenge), 힌트(.hint) 위에서는
      // 브라우저가 기본적으로 "탭=클릭/셀렉트"를 처리하도록 맡긴다.
      return !!(
        e.target.closest('.overlay') ||
        e.target.closest('#lens-challenge') ||
        e.target.closest('.hint')
      );
    }

    /* --- 터치 이벤트 --- */
    function touchStarted(e) {
      if (isTouchOnUI(e)) return true; // ✅ UI 터치는 p5가 가로채지 않음

      if (touches && touches.length) {
        pointerPressed(touches[0].x, touches[0].y);
      }
      return false; // ✅ 캔버스 조작일 때만 스크롤 방지
    }

    function touchMoved(e) {
      if (isTouchOnUI(e)) return true; // ✅ UI에서 스와이프/탭 막지 않음

      if (touches && touches.length) {
        pointerDragged(touches[0].x, touches[0].y);
      }
      return false;
    }

    function touchEnded(e) {
      if (isTouchOnUI(e)) return true;

      pointerReleased();
      return false;
    }

    function updateScreenCanvas(a, b, atInfinity, isReal, screenPx, objectH, effectiveR = 100) {
      const canvas = document.getElementById('screen-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const sw = canvas.width, sh = canvas.height;
      const scx = sw / 2, scy = sh / 2;

      ctx.clearRect(0, 0, sw, sh);
      ctx.fillStyle = '#111827';
      ctx.fillRect(0, 0, sw, sh);

      let blurRadius = 0, labelText = '—', labelClass = '';

      if (atInfinity) {
        blurRadius = 30;
        labelText = '상 없음 (직진)';
      } else if (isReal) {
        blurRadius = effectiveR * Math.abs(screenPx - b) / Math.max(1, b);
        if (blurRadius < 5) { labelText = '선명한 실상 맺힘!'; labelClass = 'good'; }
        else { labelText = '흐릿한 실상'; labelClass = 'warn'; }
      } else {
        blurRadius = effectiveR * (screenPx + Math.abs(b)) / Math.max(1, Math.abs(b));
        labelText = '빛이 퍼짐 (허상)'; labelClass = 'bad';
      }
      blurRadius = Math.min(blurRadius, 40);

      const scale = (sh * 0.38) / 200;
      const projectedH = -(screenPx / Math.max(1, a)) * objectH;
      const drawH = Math.max(-sh * 0.42, Math.min(sh * 0.42, projectedH * scale));

      ctx.save();
      ctx.filter = `blur(${blurRadius}px)`;
      ctx.globalAlpha = 0.9;
      ctx.strokeStyle = '#34d399';
      ctx.fillStyle = '#34d399';
      ctx.lineWidth = 4;

      const arrowSize = 13;
      const tipY = scy - drawH;
      const dir = drawH > 0 ? 1 : -1;

      // 직선은 삼각형 밑변에서 멈춤
      ctx.beginPath();
      ctx.moveTo(scx, scy);
      ctx.lineTo(scx, tipY + dir * arrowSize);
      ctx.stroke();

      // 삼각형: 꼭짓점=tipY, 밑변=tipY + dir*arrowSize
      ctx.beginPath();
      ctx.moveTo(scx, tipY);
      ctx.lineTo(scx - 7, tipY + dir * arrowSize);
      ctx.lineTo(scx + 7, tipY + dir * arrowSize);
      ctx.closePath();
      ctx.fill();

      ctx.restore();

      const labelEl = document.getElementById('screen-label');
      if (labelEl) {
        labelEl.textContent = labelText;
        labelEl.className = 'screen-status' + (labelClass ? ' ' + labelClass : '');
      }
    }

  <!-- ===== 렌즈 도전 게임 로직 (점수/판정) ===== -->
  <script>
    (function () {

      let score = 0;
      let bestScore = 0;
      let answerKind = null;   // '도립실상' 등
      let answerSize = null;   // '확대','동일','축소' (4~10라운드에서 사용)
      let answerProperty = null;

      function updateBestScoreUI(animate) {

      function resetGame() {

        lensGameOn = false;
        lensGameRound = 0;

        elRound.textContent = '-';
        elScore.textContent = '0';
        selectedKind = null;
        selectedSize = null;

        sizeButtons.forEach(btn => btn.classList.remove('selected'));
        propertyButtons.forEach(btn => btn.classList.remove('selected'));
        if (kindSection) kindSection.style.display = 'block';
        sizeSection.style.display = 'none';
        propertySection.style.display = 'none';
        elMsg.innerHTML =
          '도전 버튼을 눌러<br>렌즈 도전 게임을 시작하세요.' +

      function randomBetween(min, max) {

      function getRoundMode(round) {

      function setAdvancedPanel(open) {

      function resetAdvancedControls() {
        if (ui.lensDiam) ui.lensDiam.value = 480;

      function effectiveFocalMagnitude(fmag, medium) {
        const n_m = { water: 1.33, hotAir: 1.1, glass: 1.5, air: 1.0 }[medium] || 1.0;
        if (n_m > 1.0 && n_m < 1.5) return fmag * (0.5 / (1.5 / n_m - 1));
        return fmag;
      }

      function applyAdvancedRoundSettings(round) {
        resetAdvancedControls();
        if (round < 6) {

          answerProperty = null;

        setAdvancedPanel(true);
        if (round === 6) {

          if (ui.extraRaysSlider) ui.extraRaysSlider.value = 10;
          answerProperty = 'small-aperture';
          setPropertyChoices([
            { value: 'small-aperture', label: '통과하는 빛의 양이 줄고, 스크린의 흐림 폭도 작아진다.' },
            { value: 'partial-image', label: '렌즈가 작아진 만큼 상의 일부가 잘려서 사라진다.' },
            { value: 'focal-shorter', label: '렌즈 직경이 작아져 초점거리가 짧아진다.' }
          ]);
          return '심화탐구 1: 렌즈 직경을 줄이면 어떤 물리적 성질이 달라질까요?';
        }
        if (round === 7) {
          if (ui.extraRaysSlider) ui.extraRaysSlider.value = 12;
          if (ui.blockTop) ui.blockTop.value = 55;
          answerProperty = 'blocked-rays';
          setPropertyChoices([
            { value: 'half-image', label: '위쪽을 가렸으므로 상의 위쪽 절반만 사라진다.' },
            { value: 'blocked-rays', label: '일부 광선만 줄어들어 상 전체는 남지만 밝기가 약해진다.' },
            { value: 'no-refraction', label: '가림막 때문에 렌즈의 굴절 작용 자체가 사라진다.' }
          ]);
          return '심화탐구 2: 위쪽 가림막은 상의 어느 성질에 가장 직접적으로 영향을 줄까요?';
        }
        if (round === 8) {
          if (ui.lensDiam) ui.lensDiam.value = 260;
          if (ui.extraRaysSlider) ui.extraRaysSlider.value = 14;
          if (ui.blockTop) ui.blockTop.value = 35;
          if (ui.blockBottom) ui.blockBottom.value = 35;
          answerProperty = 'less-light-same-position';
          setPropertyChoices([
            { value: 'less-light-same-position', label: '빛의 양은 줄지만, 렌즈 공식이 정하는 상의 위치는 거의 그대로다.' },
            { value: 'position-by-block', label: '가림막의 위치에 따라 상의 위치가 위아래로 이동한다.' },
            { value: 'bigger-image', label: '렌즈가 일부 가려지면 배율이 커져 상이 확대된다.' }
          ]);
          return '심화탐구 3: 위아래를 함께 가리면 위치, 배율, 빛의 양 중 무엇이 주로 변할까요?';
        }
        if (round === 9) {
          if (ui.extraRaysSlider) ui.extraRaysSlider.value = 8;
          if (ui.medium) ui.medium.value = 'water';
          answerProperty = 'focal-longer';
          setPropertyChoices([
            { value: 'focal-longer', label: '공기 중보다 굴절능이 약해져 유효 초점거리가 길어진다.' },
            { value: 'focal-shorter-medium', label: '물의 굴절률이 크므로 렌즈의 유효 초점거리가 짧아진다.' },
            { value: 'only-brightness', label: '매질은 밝기만 바꾸고 초점거리에는 영향을 주지 않는다.' }
          ]);
          return '심화탐구 4: 렌즈 주변 매질을 물로 바꾸면 렌즈의 굴절능은 어떻게 될까요?';

        if (round === 10) {
          if (ui.lensDiam) ui.lensDiam.value = 220;

          if (ui.blockTop) ui.blockTop.value = 25;
          if (ui.blockBottom) ui.blockBottom.value = 25;
          if (ui.medium) ui.medium.value = 'hotAir';
          answerProperty = 'combined';
          setPropertyChoices([
            { value: 'combined', label: '매질 때문에 초점거리는 길어지고, 작은 구경 때문에 빛의 양은 줄어든다.' },
            { value: 'glass-like', label: '가열된 공기에서는 굴절이 완전히 사라져 모든 광선이 직진한다.' },
            { value: 'aperture-focal', label: '작은 구경이 초점거리를 직접 짧게 만들어 상의 위치를 바꾼다.' }
          ]);
          return '심화탐구 5: 매질 변화와 작은 구경이 동시에 있을 때 핵심 물리 성질은 무엇일까요?';
        }
        return '심화탐구 설정을 관찰하며 답을 고르세요.';
      }

      // 현재 설정에서 상의 종류/크기 계산
      function computeImageState(type, f, lensXNow, objectXNow, objectHNow) {
        const a = Math.abs(lensXNow - objectXNow);
        if (a < 5) return { valid: false };
        const denom = (1 / f) - (1 / a);
        if (!isFinite(denom) || Math.abs(denom) < 1e-4) {
          return { valid: false, atInfinity: true };
        }
        const b = 1 / denom;
        const m = -b / a;
        const isReal = (b > 0);

        let kindLabel = null;
        if (isReal && m < 0) kindLabel = '도립실상';
        else if (isReal && m > 0) kindLabel = '정립실상';
        else if (!isReal && m < 0) kindLabel = '도립허상';
        else if (!isReal && m > 0) kindLabel = '정립허상';

        const mag = Math.abs(m);
        const tol = 0.08;
        let sizeLabel;
        if (mag > 1 + tol) sizeLabel = '확대';
        else if (mag < 1 - tol) sizeLabel = '축소';
        else sizeLabel = '동일';

        return { valid: true, atInfinity: false, kindLabel, sizeLabel, m };
      }

      function setupRound() {
        lensGameOn = true;
        lensRoundLocked = false;
        elScore.textContent = String(score);
        elRound.textContent = lensGameRound + '/' + TOTAL_ROUNDS;
        const roundMode = getRoundMode(lensGameRound);

        selectedKind = null;
        selectedSize = null;
        selectedProperty = null;
        kindButtons.forEach(btn => btn.classList.remove('selected'));
        sizeButtons.forEach(btn => btn.classList.remove('selected'));
        propertyButtons.forEach(btn => btn.classList.remove('selected'));

        const requiresSize = roundMode.requiresSize;
        if (kindSection) kindSection.style.display = roundMode.advanced ? 'none' : 'block';
        sizeSection.style.display = (!roundMode.advanced && requiresSize) ? 'block' : 'none';
        propertySection.style.display = roundMode.advanced ? 'block' : 'none';
        const roundGuide = applyAdvancedRoundSettings(lensGameRound);

        // === 랜덤 파라미터 생성 (렌즈 종류, f, a, 물체 높이) ===
        const type = (Math.random() < 0.5) ? 'convex' : 'concave';
        ui.lensType.value = type;

        const fmag = randomBetween(60, 260);
        const fmagRounded = Math.round(fmag);
        ui.focal.value = String(fmagRounded);
        const fSign = (type === 'convex') ? +1 : -1;
        const medium = ui.medium ? ui.medium.value : 'air';
        const f = fSign * effectiveFocalMagnitude(fmagRounded, medium);

        const marginLeft = Math.max(40, W * 0.12);
        const marginRightOfObject = 40;
        const minObjectX = marginLeft;
        const maxObjectX = lensX - marginRightOfObject;
        const minH = 60;
        const maxH = 180;

        let trials = 0;
        answerKind = null;
        answerSize = null;

        while (trials < 80) {
          objectX = randomBetween(minObjectX, maxObjectX);
          objectH = (Math.random() < 0.5 ? 1 : -1) * randomBetween(minH, maxH);

          // 물체 꼭짓점이 화면 밖으로 나가지 않도록 보정
          let tipY = axisY - objectH;
          if (tipY < 40) objectH = axisY - 40;
          if (tipY > H - 40) objectH = axisY - (H - 40);

          const state = computeImageState(type, f, lensX, objectX, objectH);
          if (!state.valid || state.atInfinity || !state.kindLabel) {
            trials++;
            continue;
          }
          // 크기 판단 라운드에는 크기도 명확하게 구분되도록
          if (requiresSize && !state.sizeLabel) {
            trials++;
            continue;
          }
          answerKind = state.kindLabel;
          answerSize = requiresSize ? state.sizeLabel : null;
          break;
        }

        if (lensGameRound <= 2) {
          elMsg.innerHTML =
            '왼쪽 물체와 렌즈에서 만들어진 오른쪽 상을 보고<br>' +
            '<b>상이 도립/정립 & 실상/허상</b>이<br>어떤 조합인지 선택하세요.';
        } else if (lensGameRound === 3) {
          elMsg.innerHTML =
            '렌즈 중심부터 오른쪽이 가려진 상태입니다.<br>' +
            '광선 진행과 렌즈 공식을 떠올리며<br>' +
            '<b>상이 도립/정립 & 실상/허상</b>을 추론해 보세요.';
        } else if (lensGameRound <= 5) {
          elMsg.innerHTML =
            '기본 도전 압축 단계입니다.<br>' +
            '<b>상의 종류</b>와 <b>크기</b>를 함께 선택하세요.' +
            (roundMode.hideRight ? '<br><small>오른쪽 상은 가려져 있으니 광선과 식으로 추론합니다.</small>' : '');
        } else {
          elMsg.innerHTML =
            roundGuide + '<br>' +
            '<b>물리적 성질</b>을 가장 잘 설명한 선택지를 고르세요.';
        }
      }

      function startGame() {
        score = 0;
        elScore.textContent = '0';
        lensGameRound = 1;
        lensGameOn = true;
        updateBestScoreUI(false);
        setupRound();
      }

      function endGame() {
        lensGameOn = false;
        lensRoundLocked = false;
        const finalScore = score;
        lensGameRound = 0;
        elRound.textContent = '-';
        elMsg.innerHTML =
          `게임이 끝났습니다.<br>최종 점수: <b>${finalScore}점</b>`;
      }

      function handleResult(isCorrect) {
        lensRoundLocked = true;

        if (isCorrect) {
          score += 50;
          elScore.textContent = String(score);
          if (score > bestScore) {
            bestScore = score;
            updateBestScoreUI(true);
            if (window.saveBestScoreToFirebase) {
              window.saveBestScoreToFirebase(bestScore);
            }
          } else {
            updateBestScoreUI(false);
          }
          elMsg.innerHTML =
            '✅ 정답입니다! +50점<br><small>다음 라운드로 넘어갑니다.</small>';
        } else {
          elMsg.innerHTML =
            '❌ 오답입니다. 이번 라운드는 0점입니다.<br><small>다음 라운드로 넘어갑니다.</small>';
        }

        if (lensGameRound >= TOTAL_ROUNDS) {
          setTimeout(() => {
            endGame();
          }, 600);
        } else {
          setTimeout(() => {
            lensGameRound++;
            setupRound();
          }, 600);
        }
      }

      function checkAnswerAndAdvance() {
        if (!lensGameOn || lensGameRound === 0) return;
        if (getRoundMode(lensGameRound).advanced) {
          if (!answerProperty) {
            elMsg.innerHTML = '라운드 세팅 중 오류가 발생했습니다. 다시 도전해 주세요.';
            return;
          }
          handleResult(selectedProperty === answerProperty);
          return;
        }

        if (!answerKind) {
          elMsg.innerHTML = '라운드 세팅 중 오류가 발생했습니다. 다시 도전해 주세요.';
          return;
        }

        const requiresSize = getRoundMode(lensGameRound).requiresSize;
        const correctKind = (selectedKind === answerKind);
        let correctSize = true;

        if (requiresSize) {
          if (!answerSize) {
            elMsg.innerHTML = '라운드 세팅 중 오류가 발생했습니다. 다시 도전해 주세요.';
            return;
          }
          correctSize = (selectedSize === answerSize);
        }

        const isCorrect = correctKind && correctSize;
        handleResult(isCorrect);
      }

      // 상의 종류 버튼: 크기 판단 전 라운드는 이 버튼을 누르는 순간 바로 채점,
      // 크기 판단 라운드는 크기까지 선택한 뒤 채점
      kindButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          if (lensRoundLocked) return;
          selectKind(btn.dataset.kind);

          if (!lensGameOn || lensGameRound === 0) {
            elMsg.innerHTML = '먼저 <b>도전</b> 버튼을 눌러 라운드를 시작해 주세요.';
            return;
          }

          if (!getRoundMode(lensGameRound).requiresSize) {
            // 기본 전반 라운드는 상의 종류만으로 채점
            checkAnswerAndAdvance();
          } else {
            // 크기 판단 라운드는 크기도 필요 → 크기까지 선택되면 채점
            if (selectedSize) {
              checkAnswerAndAdvance();
            } else {
              elMsg.innerHTML =
                '이제 <b>크기(확대/동일/축소)</b>도 선택해 주세요.';
            }
          }
        });
      });

      // 크기 버튼: 4~10라운드에서 사용, 이 버튼을 누르는 순간 채점
      sizeButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          if (lensRoundLocked) return;
          selectSize(btn.dataset.size);

          if (!lensGameOn || lensGameRound === 0) {
            elMsg.innerHTML = '먼저 <b>도전</b> 버튼을 눌러 라운드를 시작해 주세요.';
            return;
          }

          if (!getRoundMode(lensGameRound).requiresSize) {
            elMsg.innerHTML = '4~10라운드에서 크기를 함께 맞추는 문제입니다.';
            return;
          }

          if (!selectedKind) {
            elMsg.innerHTML =
              '<b>상의 종류</b>를 먼저 선택한 뒤 크기를 선택해 주세요.';
            return;
          }

          // 종류+크기 모두 선택되면 바로 채점
          checkAnswerAndAdvance();
        });
      });

      propertyButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          if (lensRoundLocked) return;
          if (!lensGameOn || lensGameRound === 0) {
            elMsg.innerHTML = '먼저 <b>도전</b> 버튼을 눌러 라운드를 시작해 주세요.';
            return;
          }
          if (!getRoundMode(lensGameRound).advanced) {
            elMsg.innerHTML = '6~10라운드에서 심화탐구의 물리적 성질을 묻는 문제입니다.';
            return;
          }

          selectProperty(btn.dataset.property);
          checkAnswerAndAdvance();
        });
      });

      btnStart.addEventListener('click', startGame);
    })();
  </script>

    const auth = getAuth(app);
    const db = getFirestore(app);

    // 상대성이론 파일과 동일한 구조: users/{uid}/simulations/{SIM_ID} 에 score 필드 저장
    const SIM_ID = "렌즈_굴절_도전게임";
    let firebaseUser = null;

    async function saveBestScore(score) {
      if (!firebaseUser) return;
      try {
        const ref = doc(db, "users", firebaseUser.uid, "simulations", SIM_ID);
        await setDoc(ref, { score: Number(score) || 0 }, { merge: true });
      } catch (err) {
        console.error("[렌즈 도전] 최고 점수 저장 오류:", err);
      }
    }

    async function loadBestScore() {
      if (!firebaseUser) return;
      try {
        const ref = doc(db, "users", firebaseUser.uid, "simulations", SIM_ID);
        const snap = await getDoc(ref);
        if (snap.exists()) {
          const data = snap.data();
          const score = Number(data.score || 0) || 0;
          if (window.setBestScoreFromFirebase) {
            window.setBestScoreFromFirebase(score);
          }
        }
      } catch (err) {
        console.error("[렌즈 도전] 최고 점수 불러오기 오류:", err);
      }
    }

    // 상대성이론 파일과 동일한 전역 이름
    window.saveBestScoreToFirebase = saveBestScore;

    onAuthStateChanged(auth, async (user) => {
      firebaseUser = user;
      if (user) {
        await loadBestScore();
      }
    });
  </script>

</body>
