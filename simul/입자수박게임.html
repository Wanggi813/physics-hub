<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>입자 물리 수박게임</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #090f1e;
      background-image:
        radial-gradient(ellipse 55% 42% at 12% 18%, rgba(90,20,155,0.28) 0%, transparent 100%),
        radial-gradient(ellipse 50% 38% at 88% 72%, rgba(12,62,155,0.26) 0%, transparent 100%),
        radial-gradient(ellipse 40% 52% at 70% 8%,  rgba(12,118,105,0.18) 0%, transparent 100%),
        radial-gradient(ellipse 44% 40% at 22% 88%, rgba(148,16,70,0.20)  0%, transparent 100%),
        radial-gradient(ellipse 35% 35% at 55% 55%, rgba(18,40,100,0.22)  0%, transparent 100%);
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      color: #fff; overflow: hidden; user-select: none;
    }
    #gameWrapper { display: flex; gap: 14px; align-items: flex-start; }
    #gameCanvas { cursor: crosshair; display: block; border-radius: 4px; }
    /* ── 왼쪽 입자 목록 패널 ── */
    #listPanel {
      width: 185px; flex-shrink: 0;
      background: rgba(8,16,38,0.55);
      border: 1px solid rgba(140,170,255,0.10);
      border-radius: 12px; padding: 12px 10px;
      display: flex; flex-direction: column; gap: 6px;
      backdrop-filter: blur(6px);
    }
    .list-label { font-size: 9px; color: rgba(170,195,255,0.5); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; }
    #particleList { display: flex; flex-direction: column; gap: 5px; overflow-y: auto; }
    #particleList::-webkit-scrollbar { width: 3px; }
    #particleList::-webkit-scrollbar-thumb { background: rgba(140,170,255,0.18); border-radius: 2px; }
    .p-entry { display: flex; align-items: center; gap: 7px; }
    .p-num { font-size: 9px; color: rgba(155,180,225,0.38); width: 14px; text-align: right; flex-shrink: 0; }
    .p-img { width: 36px; height: 36px; flex-shrink: 0; }
    .p-info { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
    .p-name { font-size: 10.5px; color: rgba(200,215,245,0.82); white-space: nowrap; }
    .p-mass { font-size: 9px; color: rgba(130,175,235,0.52); letter-spacing: 0.3px; }
    .p-mass.unk { color: rgba(155,135,210,0.40); letter-spacing: 1.5px; }
    /* ── 명예의 전당 패널 ── */
    #hallPanel {
      width: 150px; flex-shrink: 0;
      background: rgba(8,16,38,0.55);
      border: 1px solid rgba(140,170,255,0.10);
      border-radius: 12px; padding: 14px 12px;
      display: flex; flex-direction: column; gap: 0;
      backdrop-filter: blur(6px);
    }
    #hallPanel .hall-title {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      color: rgba(255,208,80,0.82); text-align: center;
      margin-bottom: 4px;
    }
    #hallPanel .hall-trophy {
      font-size: 30px; text-align: center; line-height: 1;
      margin-bottom: 12px;
      filter: drop-shadow(0 0 8px rgba(255,200,60,0.45));
    }
    .hall-entry {
      display: flex; flex-direction: column; gap: 2px;
      padding: 8px 4px; border-top: 1px solid rgba(140,170,255,0.08);
    }
    .hall-entry:first-of-type { border-top: none; }
    .hall-rank-row { display: flex; align-items: baseline; gap: 6px; }
    .hall-medal { font-size: 16px; line-height: 1; flex-shrink: 0; }
    .hall-name  { font-size: 13px; font-weight: 600; color: rgba(215,228,255,0.88); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .hall-score { font-size: 12px; color: rgba(175,205,255,0.58); font-variant-numeric: tabular-nums; padding-left: 22px; letter-spacing: 0.3px; }
    .hall-empty { font-size: 11px; color: rgba(155,175,220,0.28); text-align: center; padding: 24px 0; line-height: 1.8; }
    .hall-entry.rank1 .hall-name { color: #ffd060; }
    .hall-entry.rank2 .hall-name { color: #d8d8e0; }
    .hall-entry.rank3 .hall-name { color: #d4976a; }
    /* ── 오른쪽 사이드바 ── */
    #sidebar { width: 148px; display: flex; flex-direction: column; gap: 11px; }
    .panel {
      background: rgba(8,16,38,0.55);
      border: 1px solid rgba(140,170,255,0.10);
      border-radius: 12px; padding: 13px;
      backdrop-filter: blur(6px);
    }
    .panel-label { font-size: 9px; color: rgba(170,195,255,0.5); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
    #scoreValue { font-size: 28px; font-weight: 700; color: #e8f0ff; line-height: 1; }
    #bestValue  { font-size: 18px; font-weight: 700; color: #ffd060; line-height: 1; }
    #nextCanvas, #nextCanvas2 { display: block; width: 100%; }
    #overlay {
      position: fixed; inset: 0;
      background: rgba(10,22,44,0.86); backdrop-filter: blur(6px);
      display: none; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; z-index: 100;
    }
    #overlay.show { display: flex; }
    #overlay h2 { font-size: 36px; color: #e04444; letter-spacing: 3px; }
    #finalScore { color: rgba(195,210,240,0.7); font-size: 15px; }
    #newRecordMsg { color: #ffd060; font-size: 13px; letter-spacing: 1px; }
    #nameSection { display: none; flex-direction: column; align-items: center; gap: 8px; }
    #nameRow { display: flex; gap: 8px; }
    #playerName {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(140,170,255,0.28);
      border-radius: 7px; color: #e8f0ff; padding: 7px 13px; font-size: 13px;
      outline: none; width: 130px;
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    }
    #submitScore, #restartBtn {
      background: rgba(90,130,220,0.14); border: 1px solid rgba(110,155,255,0.3);
      color: #c8d8ff; padding: 7px 22px; border-radius: 8px; font-size: 14px;
      cursor: pointer; transition: background 0.2s;
    }
    #submitScore:hover, #restartBtn:hover { background: rgba(90,130,220,0.3); }
    #leaderboard { width: 100%; max-width: 260px; }
    #leaderboard table { width: 100%; border-collapse: collapse; font-size: 12px; }
    #leaderboard th { color: rgba(160,190,240,0.5); font-weight: 400; padding: 3px 8px; letter-spacing: 1px; font-size: 10px; }
    #leaderboard td { padding: 5px 8px; color: rgba(210,225,255,0.80); border-top: 1px solid rgba(140,170,255,0.08); }
    #leaderboard tr.me td { color: #ffd060; }
    #leaderboard td:first-child { color: rgba(170,195,245,0.45); text-align: center; width: 24px; }
    #leaderboard td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
    #hint {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: rgba(170,190,255,0.22); letter-spacing: 1px; pointer-events: none;
    }
    @keyframes titlePulse {
      0%, 100% {
        filter: drop-shadow(0 0 6px rgba(130,182,255,0.55))
                drop-shadow(0 0 20px rgba(105,152,255,0.30))
                drop-shadow(0 0 42px rgba(88,130,245,0.14));
      }
      50% {
        filter: drop-shadow(0 0 14px rgba(162,210,255,0.80))
                drop-shadow(0 0 34px rgba(128,176,255,0.50))
                drop-shadow(0 0 62px rgba(108,158,255,0.26));
      }
    }
    @keyframes atomFloat {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50%       { transform: translateY(-2px) rotate(8deg); }
    }
    #gameTitle {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      pointer-events: none; white-space: nowrap;
      animation: titlePulse 4s ease-in-out infinite;
    }
    #gameTitle .main {
      font-size: 28px; font-weight: 900; letter-spacing: 7px;
      background: linear-gradient(120deg,
        #6e9ef5 0%, #a8ceff 22%, #e8f2ff 44%,
        #ffffff 50%, #d0e6ff 58%, #9abeff 78%, #6892f0 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #gameTitle .atom {
      display: inline-block; margin-right: 10px;
      font-size: 32px;
      background: linear-gradient(135deg, #48d8f8 0%, #6e98ff 45%, #b462ff 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: atomFloat 4s ease-in-out infinite;
    }
    #gameTitle .sub {
      font-size: 9.5px; letter-spacing: 5.5px; font-weight: 400;
      -webkit-text-fill-color: rgba(152,188,242,0.36);
      color: rgba(152,188,242,0.36);
    }
    #disclaimer {
      position: fixed; bottom: 14px; right: 22px;
      max-width: 270px; text-align: right;
      font-size: 10px; line-height: 1.72;
      color: rgba(165,188,232,0.38);
      pointer-events: none;
    }
    #disclaimer .icon { color: rgba(255,195,80,0.45); }
  </style>
</head>
<body>
<div id="gameTitle">
  <div class="main"><span class="atom">⚛</span>입자 물리 수박게임</div>
  <div class="sub">PARTICLE PHYSICS SUIKA GAME</div>
</div>
<div id="gameWrapper">
  <!-- 맨 왼쪽: 명예의 전당 -->
  <div id="hallPanel">
    <div class="hall-trophy">🏆</div>
    <div class="hall-title">명예의 전당</div>
    <div id="sideLeaderboard"><div class="hall-empty">아직<br>기록이<br>없습니다</div></div>
  </div>
  <!-- 왼쪽: 입자 목록 -->
  <div id="listPanel">
    <div class="list-label">입자 목록</div>
    <div id="particleList"></div>
  </div>
  <!-- 중앙: 게임 -->
  <canvas id="gameCanvas"></canvas>
  <!-- 오른쪽: 점수 + 다음 입자 2개 -->
  <div id="sidebar">
    <div class="panel">
      <div class="panel-label">점수</div>
      <div id="scoreValue">0</div>
    </div>
    <div class="panel">
      <div class="panel-label">최고</div>
      <div id="bestValue">—</div>
    </div>
    <div class="panel">
      <div class="panel-label">다음</div>
      <canvas id="nextCanvas" width="120" height="84"></canvas>
    </div>
    <div class="panel">
      <div class="panel-label">그 다음</div>
      <canvas id="nextCanvas2" width="120" height="74"></canvas>
    </div>
  </div>
</div>
<div id="overlay">
  <h2>GAME OVER</h2>
  <div id="finalScore"></div>
  <div id="nameSection">
    <div id="newRecordMsg">🏆 TOP 5 진입!</div>
    <div id="nameRow">
      <input id="playerName" type="text" maxlength="8" placeholder="이름 (최대 8자)">
      <button id="submitScore">등록</button>
    </div>
  </div>
  <div id="leaderboard"></div>
  <button id="restartBtn">다시 시작</button>
</div>
<div id="hint">클릭 또는 Space · Enter 로 입자 투하</div>
<div id="disclaimer">
  <span class="icon">⚠</span> 이 게임은 수박게임 형식의 입자물리 테마 퍼즐입니다.<br>
  실제 입자의 합성·붕괴 반응과는 다르며,<br>
  게임 내 합성 순서는 물리적 사실을 묘사하지 않습니다.
</div>

<script>
// ═══════════════════════════════════════════════
// Firebase (modular SDK — 동적 import)
// ═══════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCO36JgPpNz8swADxTMVJUFVALWM5o171w",
  authDomain:        "simulation-67cd3.firebaseapp.com",
  projectId:         "simulation-67cd3",
  storageBucket:     "simulation-67cd3.appspot.com",
  messagingSenderId: "615983461615",
  appId:             "1:615983461615:web:002e07bcea878eb6d5571a"
};
const SUIKA_COL = 'suika_scores';   // Firestore 컬렉션 이름

let _fb = null;  // Firebase 모듈 캐시

async function getFirebase() {
  if (_fb) return _fb;
  try {
    const [
      { initializeApp, getApps, getApp },
      { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp },
      { getAuth, signInAnonymously }
    ] = await Promise.all([
      import('https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js'),
      import('https://www.gstatic.com/firebasejs/12.4.0/firebase-firestore.js'),
      import('https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js'),
    ]);
    const app = getApps().find(a => a.name === 'suika') || initializeApp(FIREBASE_CONFIG, 'suika');
    const db  = getFirestore(app);
    const auth = getAuth(app);
    try { await signInAnonymously(auth); } catch(e) {}
    _fb = { db, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp };
    return _fb;
  } catch(e) {
    console.warn('Firebase 초기화 실패:', e);
    return null;
  }
}

// ═══════════════════════════════════════════════
// 입자 정의
// ═══════════════════════════════════════════════
const DEFS = [
  { name: '전자 뉴트리노', r: 11,  glow: 'rgba(150,220,252,0.28)', dot: '#90D8F0', mev: '< 0.1 eV/c²'   },
  { name: '전자',          r: 16,  glow: 'rgba(65,125,220,0.42)',  dot: '#4E96E0', mev: '0.511 MeV/c²'  },

  { name: '파이온',         r: 37,  glow: 'rgba(158,86,28,0.40)',   dot: '#C07438', mev: '135 MeV/c²'    },

  { name: '중수소핵',       r: 56,  glow: 'rgba(28,128,85,0.40)',   dot: '#3EB86E', mev: '1,876 MeV/c²'  },
  { name: '알파입자',       r: 67,  glow: 'rgba(22,135,135,0.40)', dot: '#2EB8B8',  mev: '3,727 MeV/c²'  },
  { name: '헬륨 원자',      r: 79,  glow: 'rgba(175,50,110,0.40)', dot: '#CE5E92',  mev: '3,728 MeV/c²'  },
  { name: '탄소 원자',      r: 92,  glow: 'rgba(72,85,110,0.36)',   dot: '#5A6878', mev: '11.2 GeV/c²'   },
  { name: '산소 원자',      r: 106, glow: 'rgba(172,48,35,0.40)',   dot: '#CE4838', mev: '14.9 GeV/c²'   },
  { name: '철 원자',        r: 121, glow: 'rgba(128,98,38,0.40)',   dot: '#A07838', mev: '52.1 GeV/c²'   },
];

// ═══════════════════════════════════════════════
// 입자 SVG 정의 — 12종
// ═══════════════════════════════════════════════
function buildParticleSVGs() {
  return [

  // ─── 0. 전자 뉴트리노 ───────────────────────

      <radialGradient id="g" cx="36%" cy="28%" r="68%">

    <text x="50" y="56" text-anchor="middle" dominant-baseline="middle"
          fill="rgba(205,242,255,0.88)" font-size="42" font-family="Georgia,serif" font-style="italic" font-weight="bold">ν</text>
  </svg>`,

  // ─── 1. 전자 ────────────────────────────────
  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
      <radialGradient id="g" cx="34%" cy="26%" r="72%">
        <stop offset="0%"   stop-color="#b4d8ff"/>
        <stop offset="52%"  stop-color="#2858c4"/>

    <text x="50" y="56" text-anchor="middle" dominant-baseline="middle"

  </svg>`,

  // ─── 2. 뮤온 ────────────────────────────────
  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
      <radialGradient id="g" cx="34%" cy="26%" r="72%">
        <stop offset="0%"   stop-color="#c4a4ff"/>

    <text x="51" y="56" text-anchor="middle" dominant-baseline="middle"

  </svg>`,

  // ─── 3. 업 쿼크 ─────────────────────────────
  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
      <radialGradient id="g" cx="34%" cy="26%" r="72%">
        <stop offset="0%"   stop-color="#eca0a0"/>
        <stop offset="52%"  stop-color="#8c2020"/>
        <stop offset="100%" stop-color="#3c0c0c"/>
      </radialGradient>
      <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%"   stop-color="#ff4444"/>
        <stop offset="33%"  stop-color="#44cc44"/>
        <stop offset="66%"  stop-color="#4466ff"/>
        <stop offset="100%" stop-color="#ff4444"/>
      </linearGradient>
    </defs>
    <circle cx="50" cy="50" r="46" fill="url(#g)"/>
    <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(228,152,152,0.42)" stroke-width="1.2"/>
    <ellipse cx="37" cy="33" rx="11" ry="6.5" fill="rgba(255,255,255,0.16)" transform="rotate(-22 37 33)"/>
    <!-- 색전하 링: R/G/B는 내부 구조가 아닌 QCD 양자수 -->
    <circle cx="50" cy="50" r="30" fill="none" stroke="url(#cg)" stroke-width="4.5" opacity="0.46" stroke-dasharray="13 7"/>
    <text x="50" y="55" text-anchor="middle" dominant-baseline="middle"

  </svg>`,

  // ─── 4. 파이온 ──────────────────────────────
  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
      <radialGradient id="g" cx="34%" cy="26%" r="72%">
        <stop offset="0%"   stop-color="#eeb87a"/>
        <stop offset="52%"  stop-color="#8c4a18"/>

      </radialGradient>
      <radialGradient id="qr" cx="34%" cy="30%" r="68%"><stop offset="0%" stop-color="#ff9070"/><stop offset="100%" stop-color="#cc3810"/></radialGradient>

    </defs>
    <circle cx="50" cy="50" r="46" fill="url(#g)"/>
    <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(228,188,130,0.42)" stroke-width="1.2"/>
    <ellipse cx="37" cy="33" rx="11" ry="6.5" fill="rgba(255,255,255,0.16)" transform="rotate(-22 37 33)"/>
    <!-- q-qbar 쌍 -->
    <circle cx="31" cy="54" r="14" fill="url(#qr)"/>
    <circle cx="69" cy="54" r="14" fill="url(#qb)"/>

let particleImages = new Array(DEFS.length).fill(null);

function preloadImages() {
  const svgs = buildParticleSVGs();
  return Promise.all(svgs.map((svg, i) => new Promise(resolve => {
    const img = new Image();
    img.onload = () => { particleImages[i] = img; resolve(); };
    img.onerror = () => resolve();
    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  })));
}

// 게임 상태
// ═══════════════════════════════════════════════
let particles = [], flashes = [], labels = [];
let curLevel = 0, nxtLevel = 0, nxt2Level = 0;
let score = 0, over = false, cooldown = 0, dangerTimer = 0;
let combo = 0, lastMergeMs = 0;
let mouseX = CW / 2, idCnt = 0;
const COMBO_WINDOW = 1800;
const SCORE_KEY   = 'psuika_scores';
const DISC_KEY    = 'psuika_disc';

// 발견된 입자 레벨 집합 (localStorage 영속)
function loadDiscovered() {
  try { return new Set(JSON.parse(localStorage.getItem(DISC_KEY)) || [0,1,2,3,4]); }
  catch { return new Set([0,1,2,3,4]); }
}
let discovered = loadDiscovered();

function markDiscovered(level) {
  if (discovered.has(level)) return;
  discovered.add(level);
  localStorage.setItem(DISC_KEY, JSON.stringify([...discovered]));
  buildList(); // 목록 즉시 갱신
}

function rndLevel() { return Math.floor(Math.random() * 5); }

// ═══════════════════════════════════════════════
// 초기화
// ═══════════════════════════════════════════════
function init() {
  particles = []; flashes = []; labels = [];
  score = 0; over = false; cooldown = 0; dangerTimer = 0;
  combo = 0; lastMergeMs = 0;
  curLevel = rndLevel(); nxtLevel = rndLevel(); nxt2Level = rndLevel();
  document.getElementById('scoreValue').textContent = '0';
  document.getElementById('overlay').classList.remove('show');
  updateBestScore();
  buildList();
  fetchTop5().then(arr => { cachedScores = arr; renderSideLeaderboard(); });
}

const _listSVGSrcs = (() => {
  const svgs = buildParticleSVGs();
  return svgs.map(s => 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(s));
})();

function buildList() {
  const el = document.getElementById('particleList');
  el.innerHTML = '';
  DEFS.forEach((d, i) => {
    const known = discovered.has(i);
    const div = document.createElement('div');
    div.className = 'p-entry';
    div.dataset.level = i;
    div.innerHTML =
      `<span class="p-num">${i + 1}</span>` +
      `<img class="p-img" src="${_listSVGSrcs[i]}" alt="${d.name}">` +
      `<div class="p-info">` +
        `<span class="p-name">${d.name}</span>` +
        `<span class="p-mass ${known ? '' : 'unk'}">${known ? d.mev : '???'}</span>` +
      `</div>`;
    el.appendChild(div);
  });
}

// ═══════════════════════════════════════════════
// 입자 생성 / 투하
// ═══════════════════════════════════════════════
function mkParticle(x, y, level) {
  const r = DEFS[level].r;
  return { id: idCnt++, x, y, vx: 0, vy: 0, r, level, merging: false, born: 0,
    mass: r * r };  // 질량 ∝ r² — 큰 입자가 훨씬 무거움
}

function drop() {
  if (over || cooldown > 0) return;
  const d = DEFS[curLevel];
  const cx = Math.max(WT + d.r + 2, Math.min(CW - WT - d.r - 2, mouseX));
  const p = mkParticle(cx, DROP_Y, curLevel);
  p.vy = 3;
  particles.push(p);
  curLevel = nxtLevel; nxtLevel = nxt2Level; nxt2Level = rndLevel();
  cooldown = COOLDOWN_F;
}

// ═══════════════════════════════════════════════
// 물리
// ═══════════════════════════════════════════════
function physics() {
  const now = performance.now();
  for (const p of particles) {
    p.vy += GRAVITY;
    p.x += p.vx; p.y += p.vy;
    p.vx *= FRICTION;
  }
  // 바닥·벽 충돌 — WALL_REST 사용으로 거의 안 튀김
  for (const p of particles) {
    if (p.x - p.r < WT)      { p.x = WT + p.r;      p.vx =  Math.abs(p.vx) * WALL_REST; }
    if (p.x + p.r > CW - WT) { p.x = CW - WT - p.r; p.vx = -Math.abs(p.vx) * WALL_REST; }
    if (p.y + p.r > CH - WT) { p.y = CH - WT - p.r; p.vy = -Math.abs(p.vy) * WALL_REST; p.vx *= FRICTION; }
  }
  const toMerge = [];
  for (let it = 0; it < ITERS; it++) {
    for (let i = 0; i < particles.length - 1; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const a = particles[i], b = particles[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const d2 = dx * dx + dy * dy;
        const minD = a.r + b.r;
        if (d2 >= minD * minD) continue;
        const dist = Math.sqrt(d2) || 0.0001;
        const nx = dx / dist, ny = dy / dist;
        const ov = minD - dist;
        const totalM = a.mass + b.mass;
        // CORR 계수로 점진 보정 → 과보정 방지
        a.x -= nx * ov * CORR * (b.mass / totalM);
        a.y -= ny * ov * CORR * (b.mass / totalM);
        b.x += nx * ov * CORR * (a.mass / totalM);
        b.y += ny * ov * CORR * (a.mass / totalM);
        const dvx = b.vx - a.vx, dvy = b.vy - a.vy;
        const vn = dvx * nx + dvy * ny;
        if (vn < 0) {
          const imp = vn * (1 + RESTITUTION) / (1 / a.mass + 1 / b.mass);
          a.vx += (imp / a.mass) * nx; a.vy += (imp / a.mass) * ny;
          b.vx -= (imp / b.mass) * nx; b.vy -= (imp / b.mass) * ny;
        }
        if (it === 0 && a.level === b.level && !a.merging && !b.merging
            && (now - a.born) > 300 && (now - b.born) > 300) {
          toMerge.push([a.id, b.id]);
          a.merging = true; b.merging = true;
        }
      }
    }
    // 이터레이션 후 벽 클램프
    for (const p of particles) {
      if (p.x - p.r < WT)      p.x = WT + p.r;
      if (p.x + p.r > CW - WT) p.x = CW - WT - p.r;
      if (p.y + p.r > CH - WT) p.y = CH - WT - p.r;
    }
  }
  // Sleep: 거의 멈춘 입자 속도 완전히 0으로 (떨림 방지)
  for (const p of particles) {
    if (p.vx * p.vx + p.vy * p.vy < SLEEP_V2) { p.vx = 0; p.vy = 0; }
  }
  for (const [idA, idB] of toMerge) {
    const ia = particles.findIndex(p => p.id === idA);
    const ib = particles.findIndex(p => p.id === idB);
    if (ia < 0 || ib < 0) continue;
    const a = particles[ia], b = particles[ib];
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
    const nl = a.level + 1;
    flashes.push({ x: mx, y: my, maxR: DEFS[a.level].r * 3.5, t: 0 });
    const hi = Math.max(ia, ib), lo = Math.min(ia, ib);
    particles.splice(hi, 1); particles.splice(lo, 1);
    // 콤보
    const nowMs = performance.now();
    if (combo > 0 && nowMs - lastMergeMs < COMBO_WINDOW) { combo++; }
    else { combo = 1; }
    lastMergeMs = nowMs;
    const mult = 1 + Math.min(combo - 1, 9) * 0.3;
    const gained = Math.round((nl + 1) * 12 * mult);
    score += gained;
    document.getElementById('scoreValue').textContent = score;
    if (nl < DEFS.length) {
      const np = mkParticle(mx, my, nl);
      np.born = now; np.vy = -3;
      particles.push(np);
      markDiscovered(nl);
      // 질량 라벨 팝업
      const def = DEFS[nl];
      labels.push({ x: mx, y: my - def.r - 8, name: def.name, mev: def.mev,
                    gained, alpha: 1.0, vy: 0.85 });
    }
  }
  const danger = particles.some(p => p.y - p.r < DANGER_Y && (now - p.born) > 800);
  dangerTimer = danger ? dangerTimer + 1 : 0;
  if (dangerTimer > DANGER_LIMIT) triggerOver();
}

// ── 점수 관리 (Firebase + localStorage 혼용)
let cachedScores = [];   // Firestore에서 불러온 Top5 캐시

function getLocalBest() {
  try {
    const arr = JSON.parse(localStorage.getItem(SCORE_KEY)) || [];
    return arr.length ? arr[0].score : null;
  } catch { return null; }
}
function saveLocalBest(s) {
  try {
    const arr = JSON.parse(localStorage.getItem(SCORE_KEY)) || [];
    arr.push({ score: s });
    arr.sort((a, b) => b.score - a.score);
    localStorage.setItem(SCORE_KEY, JSON.stringify(arr.slice(0, 1)));
  } catch {}
}
function updateBestScore() {
  const best = getLocalBest();
  document.getElementById('bestValue').textContent = best !== null ? best.toLocaleString() : '—';
}

async function fetchTop5() {
  const fb = await getFirebase();
  if (!fb) return [];
  try {
    const q = fb.query(
      fb.collection(fb.db, SUIKA_COL),
      fb.orderBy('score', 'desc'),
      fb.limit(5)
    );
    const snap = await fb.getDocs(q);
    return snap.docs.map(d => d.data());
  } catch(e) { console.warn('Firestore 읽기 실패:', e); return []; }
}
async function saveScoreFirebase(name, s) {
  const fb = await getFirebase();
  if (!fb) return;
  try {
    await fb.addDoc(fb.collection(fb.db, SUIKA_COL), {
      name: name || '익명',
      score: s,
      timestamp: fb.serverTimestamp()
    });
  } catch(e) { console.warn('Firestore 저장 실패:', e); }
}
function isTop5(s) {
  return cachedScores.length < 5 || s > cachedScores[cachedScores.length - 1].score;
}

const MEDALS   = ['🥇','🥈','🥉','④','⑤'];
const RANK_CLS = ['rank1','rank2','rank3','',''];

function renderSideLeaderboard() {
  const el = document.getElementById('sideLeaderboard');
  if (!cachedScores.length) {
    el.innerHTML = '<div class="hall-empty">아직<br>기록이<br>없습니다</div>';
    return;
  }
  el.innerHTML = cachedScores.map((e, i) =>
    `<div class="hall-entry ${RANK_CLS[i]}">
      <div class="hall-rank-row">
        <span class="hall-medal">${MEDALS[i]}</span>
        <span class="hall-name">${e.name}</span>
      </div>
      <div class="hall-score">${e.score.toLocaleString()}</div>
    </div>`
  ).join('');
}

function renderLeaderboard(highlightScore) {
  if (!cachedScores.length) { document.getElementById('leaderboard').innerHTML = ''; return; }
  const rows = cachedScores.map((e, i) => {
    const cls = e.score === highlightScore ? ' class="me"' : '';
    return `<tr${cls}><td>${MEDALS[i]}</td><td>${e.name}</td><td>${e.score.toLocaleString()}</td></tr>`;
  }).join('');
  document.getElementById('leaderboard').innerHTML =
    `<table><tr><th></th><th>이름</th><th>점수</th></tr>${rows}</table>`;
}

async function triggerOver() {
  over = true;
  document.getElementById('finalScore').textContent = `최종 점수: ${score.toLocaleString()}`;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('nameSection').style.display = 'none';
  document.getElementById('leaderboard').innerHTML =
    '<div style="color:rgba(180,200,255,0.4);font-size:12px;text-align:center;padding:12px">불러오는 중...</div>';

  cachedScores = await fetchTop5();
  saveLocalBest(score);
  updateBestScore();

  if (isTop5(score)) {
    document.getElementById('nameSection').style.display = 'flex';
    document.getElementById('playerName').focus();
    renderLeaderboard(null);
  } else {
    renderLeaderboard(null);
  }
}

// ═══════════════════════════════════════════════
// 렌더링
// ═══════════════════════════════════════════════
function drawParticle(c, x, y, r, level, alpha = 1) {
  const img = particleImages[level];
  if (!img) return;
  const def = DEFS[level];
  c.save();
  c.globalAlpha = alpha;
  c.shadowColor = def.glow;
  c.shadowBlur = r * 0.45;
  c.drawImage(img, x - r, y - r, r * 2, r * 2);
  c.restore();
}

function render() {
  // ── 배경 그라디언트
  const bg = ctx.createLinearGradient(0, 0, 0, CH);
  bg.addColorStop(0, '#111e3a'); bg.addColorStop(1, '#0e1a32');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, CW, CH);

  // ── 성운 (nebula blobs)
  for (const n of NEBULAS) {
    const ng = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
    ng.addColorStop(0,   `rgba(${n.c},0.072)`);
    ng.addColorStop(0.5, `rgba(${n.c},0.030)`);
    ng.addColorStop(1,   `rgba(${n.c},0)`);
    ctx.fillStyle = ng; ctx.fillRect(0, 0, CW, CH);
  }

  // ── 소형 별
  for (const s of STARS_SM) {
    ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(210,224,255,${s.a})`; ctx.fill();
  }
  // ── 중형 별
  for (const s of STARS_MD) {
    ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(235,244,255,${s.a})`; ctx.fill();
  }
  // ── 대형 별 (반짝임 + 십자 광선)
  const now_t = performance.now() / 1000;
  for (const s of STARS_LG) {
    const tw = s.a + Math.sin(now_t * 1.7 + s.ph) * 0.13;
    const ta = Math.max(0, tw);
    ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,248,230,${ta})`; ctx.fill();
    ctx.strokeStyle = `rgba(255,248,230,${ta * 0.38})`;
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.moveTo(s.x - s.s * 3.5, s.y); ctx.lineTo(s.x + s.s * 3.5, s.y);
    ctx.moveTo(s.x, s.y - s.s * 3.5); ctx.lineTo(s.x, s.y + s.s * 3.5);
    ctx.stroke();
  }

  // ── 우주 먼지 (위에서 아래로 천천히 흘러 내림)
  for (const d of DUST) {
    d.x += d.vx; d.y += d.vy;
    if (d.y > CH + 2) { d.y = -2; d.x = Math.random() * CW; }
    if (d.x < -2) d.x = CW + 2;
    else if (d.x > CW + 2) d.x = -2;
    ctx.beginPath(); ctx.arc(d.x, d.y, d.s, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(208,224,255,${d.a})`; ctx.fill();
  }

  // 벽
  ctx.fillStyle = 'rgba(105,148,225,0.08)';
  ctx.fillRect(0, 0, WT, CH); ctx.fillRect(CW - WT, 0, WT, CH); ctx.fillRect(0, CH - WT, CW, WT);
  ctx.strokeStyle = 'rgba(135,172,255,0.20)'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(WT, 0); ctx.lineTo(WT, CH);
  ctx.moveTo(CW - WT, 0); ctx.lineTo(CW - WT, CH);
  ctx.moveTo(0, CH - WT); ctx.lineTo(CW, CH - WT);
  ctx.stroke();

  // 위험선
  const da = Math.min(1, 0.22 + (dangerTimer / DANGER_LIMIT) * 0.78);
  ctx.strokeStyle = `rgba(210,62,62,${da})`;
  ctx.lineWidth = 1.5; ctx.setLineDash([7, 5]);
  ctx.beginPath(); ctx.moveTo(WT, DANGER_Y); ctx.lineTo(CW - WT, DANGER_Y); ctx.stroke();
  ctx.setLineDash([]);

  // 카운트다운
  if (dangerTimer > 0) {
    const secsLeft = Math.ceil((DANGER_LIMIT - dangerTimer) / 60);
    const pulse = 0.62 + 0.38 * Math.sin(dangerTimer * 0.18);
    ctx.save();
    ctx.globalAlpha = da * pulse;
    ctx.font = 'bold 15px sans-serif';
    ctx.fillStyle = `rgba(255,90,90,1)`;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText(`⚠ ${secsLeft}초`, CW - WT - 6, DANGER_Y);
    ctx.restore();
  }

  // 합체 이펙트
  flashes = flashes.filter(f => f.t < 1);
  for (const f of flashes) {
    const fa = (1 - f.t) * 0.42;
    ctx.beginPath(); ctx.arc(f.x, f.y, f.maxR * f.t, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(242,232,168,${fa})`; ctx.fill();
    f.t += 0.07;
  }

  // 입자들
  for (const p of particles) drawParticle(ctx, p.x, p.y, p.r, p.level);

  // ── 질량 라벨 팝업 (합체 시 새 입자 정보)
  labels = labels.filter(l => l.alpha > 0.02);
  for (const l of labels) {
    l.y -= l.vy; l.vy *= 0.95;
    l.alpha -= 0.013;
    const a = Math.min(l.alpha, 1);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.textAlign = 'center';
    // 입자 이름
    ctx.font = 'bold 13px sans-serif';
    ctx.shadowColor = 'rgba(100,165,255,0.9)'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#e8f4ff';
    ctx.fillText(l.name, l.x, l.y);
    // 질량
    ctx.font = '11px sans-serif';
    ctx.shadowBlur = 6;
    ctx.fillStyle = '#90c8ff';
    ctx.fillText(`질량 ${l.mev}`, l.x, l.y + 14);
    // 획득 점수
    if (combo >= 2) {
      ctx.font = 'bold 11px sans-serif';
      ctx.fillStyle = '#ffd060';
      ctx.shadowColor = 'rgba(255,190,40,0.8)';
      ctx.fillText(`+${l.gained} (×${(1 + Math.min(combo-1,9)*0.3).toFixed(1)})`, l.x, l.y + 27);
    } else {
      ctx.font = '11px sans-serif';
      ctx.fillStyle = 'rgba(200,225,255,0.6)';
      ctx.shadowBlur = 0;
      ctx.fillText(`+${l.gained}`, l.x, l.y + 27);
    }
    ctx.restore();
  }

  // ── 콤보 카운터
  const elapsed = performance.now() - lastMergeMs;
  if (combo >= 2 && elapsed < COMBO_WINDOW) {
    const fade = Math.max(0, 1 - (elapsed - COMBO_WINDOW * 0.6) / (COMBO_WINDOW * 0.4));
    const size = Math.min(32, 18 + combo * 1.8);
    ctx.save();
    ctx.globalAlpha = Math.min(1, fade * 1.4);
    ctx.textAlign = 'center';
    ctx.font = `900 ${size}px sans-serif`;
    ctx.shadowColor = combo >= 5 ? 'rgba(255,130,20,0.9)' : 'rgba(255,215,40,0.85)';
    ctx.shadowBlur = 18;
    ctx.fillStyle = combo >= 5 ? '#ffaa30' : '#ffe040';
    ctx.fillText(`COMBO ×${combo}`, CW / 2, 128);
    ctx.restore();
  } else if (elapsed >= COMBO_WINDOW) {
    combo = 0;
  }

  // 투하 가이드
  if (!over && cooldown === 0) {
    const def = DEFS[curLevel];
    const gx = Math.max(WT + def.r + 2, Math.min(CW - WT - def.r - 2, mouseX));
    ctx.strokeStyle = 'rgba(175,198,255,0.11)'; ctx.lineWidth = 1; ctx.setLineDash([5, 5]);
    ctx.beginPath(); ctx.moveTo(gx, DROP_Y + def.r); ctx.lineTo(gx, CH - WT); ctx.stroke();
    ctx.setLineDash([]);
    drawParticle(ctx, gx, DROP_Y, def.r, curLevel, 0.52);
  }

  // 다음 입자 미리보기 1
  const nbg = nctx.createLinearGradient(0, 0, 0, nc.height);
  nbg.addColorStop(0, '#111e3a'); nbg.addColorStop(1, '#0e1a32');
  nctx.fillStyle = nbg; nctx.fillRect(0, 0, nc.width, nc.height);
  const nr = Math.min(DEFS[nxtLevel].r, 34);
  drawParticle(nctx, nc.width / 2, nc.height / 2, nr, nxtLevel);

  // 다음 입자 미리보기 2
  const nbg2 = nctx2.createLinearGradient(0, 0, 0, nc2.height);
  nbg2.addColorStop(0, '#111e3a'); nbg2.addColorStop(1, '#0e1a32');
  nctx2.fillStyle = nbg2; nctx2.fillRect(0, 0, nc2.width, nc2.height);
  const nr2 = Math.min(DEFS[nxt2Level].r, 28);
  drawParticle(nctx2, nc2.width / 2, nc2.height / 2, nr2, nxt2Level, 0.75);
}

// ═══════════════════════════════════════════════
// 게임 루프
// ═══════════════════════════════════════════════
function loop() {
  if (!over) { if (cooldown > 0) cooldown--; physics(); }
  render();
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════
// 입력
// ═══════════════════════════════════════════════
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (CW / rect.width);
});
canvas.addEventListener('click', drop);
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); drop(); }
});
document.getElementById('restartBtn').addEventListener('click', init);

async function doSubmitScore() {
  const name = document.getElementById('playerName').value.trim() || '익명';
  const btn = document.getElementById('submitScore');
  btn.disabled = true; btn.textContent = '저장 중...';
  await saveScoreFirebase(name, score);
  cachedScores = await fetchTop5();
  document.getElementById('nameSection').style.display = 'none';
  renderLeaderboard(score);
  renderSideLeaderboard();
  btn.disabled = false; btn.textContent = '등록';
}
document.getElementById('submitScore').addEventListener('click', doSubmitScore);
document.getElementById('playerName').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSubmitScore();
});

// ═══════════════════════════════════════════════
// 시작
// ═══════════════════════════════════════════════
preloadImages().then(() => { init(); loop(); });
</script>
