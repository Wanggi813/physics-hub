<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https: wss:; media-src 'self' https: blob: data:; worker-src 'self' blob:; frame-src 'self' https:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self';">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>PN 다이오드 시뮬레이션</title>
  <meta name="description" content="PN 다이오드의 평형, 순방향 바이어스, 역방향 바이어스에서 공핍층과 에너지 밴드 변화를 관찰하는 반도체 시뮬레이션입니다." />
  <style>
    :root {
      --bg: #101419;
      --panel: #181d24;
      --panel-2: #202832;
      --line: #303946;
      --text: #edf3f8;
      --muted: #a8b4c0;
      --accent: #46a3ff;
      --hole: #ff7b75;
      --electron: #68a5ff;
      --depletion: #d7ecff;
      --warning: #ffd36b;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      overscroll-behavior: none;
    }

    .wrap {
      display: flex;
      height: 100%;
      min-height: 560px;
    }

    aside {
      width: 340px;
      padding: 18px;
      background: var(--panel);
      border-right: 1px solid var(--line);
      overflow-y: auto;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .lead {
      margin: 8px 0 18px;
      color: var(--muted);
      font-size: 13px;
    }

    label {
      display: block;
      color: var(--muted);
      margin: 14px 0 7px;
      font-size: 13px;
    }

    select,
    input[type=range],
    button {
      font: inherit;
    }

    select,
    input[type=range] {
      width: 100%;
    }

    select {
      padding: 10px 12px;
      background: #111820;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    input[type=range] {
      accent-color: var(--accent);
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .value {
      min-width: 72px;
      text-align: right;
      color: var(--accent);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 8px;
    }

    .segmented button,
    .preset button,
    .icon-button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111820;
      color: var(--text);
      cursor: pointer;
    }

    .segmented button:hover,
    .preset button:hover,
    .icon-button:hover {
      border-color: #4c5d70;
    }

    .segmented button.active {
      background: #163456;
      border-color: var(--accent);
      color: #dceeff;
    }

    .preset {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 10px;
    }

    .metrics {
      display: grid;
      gap: 8px;
      margin-top: 16px;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 9px 10px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .metric span:first-child {
      color: var(--muted);
    }

    .metric span:last-child {
      text-align: right;
      font-weight: 700;
    }

    .legend {
      display: grid;
      gap: 8px;
      margin-top: 16px;
      color: var(--muted);
      font-size: 13px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .dot.electron {
      background: var(--electron);
    }

    .dot.hole {
      border: 2px solid var(--hole);
    }

    .dot.depletion {
      border-radius: 3px;
      background: var(--depletion);
    }

    .note {
      min-height: 88px;
      margin-top: 16px;
      padding: 12px;
      background: #111820;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
    }

    .note strong {
      display: block;
      margin-bottom: 5px;
      color: var(--text);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
    }

    .view {
      position: relative;
      flex: 1;
      min-width: 0;
      background: radial-gradient(circle at 50% 0%, #1b2632 0%, #101419 45%);
    }

    #canvasRoot {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 560px;
    }

    @media (max-width: 768px) {
      .wrap {
        flex-direction: column-reverse;
        min-height: 100%;
      }

      .view {
        flex: none;
        width: 100%;
        height: 46vh;
        border-bottom: 1px solid var(--line);
      }

      #canvasRoot {
        height: 100% !important;
        min-height: 0 !important;
      }

      aside {
        width: 100%;
        height: 54vh;
        border-right: none;
        border-top: 1px solid var(--line);
        padding-bottom: 28px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <aside>
      <h1>PN 다이오드</h1>
      <p class="lead">전압에 따라 공핍층, 전기장, 에너지 밴드가 어떻게 달라지는지 관찰합니다.</p>

      <label for="mode">상태 선택</label>
      <select id="mode">
        <option value="eq" selected>열적 평형</option>
        <option value="rev">역방향 바이어스</option>
        <option value="fwd">순방향 바이어스</option>
      </select>

      <div class="segmented" aria-label="상태 빠른 선택">
        <button type="button" data-state="rev">역방향</button>
        <button type="button" data-state="eq" class="active">평형</button>
        <button type="button" data-state="fwd">순방향</button>
      </div>

      <label for="vol">전압 조절</label>
      <div class="row">
        <input id="vol" type="range" min="-1.5" max="1.5" step="0.01" value="0" />
        <div id="volVal" class="value">0.00 V</div>
      </div>

      <div class="preset" aria-label="전압 프리셋">
        <button type="button" data-voltage="-1.00">-1.0 V</button>
        <button type="button" data-voltage="0">0 V</button>
        <button type="button" data-voltage="0.70">+0.7 V</button>
      </div>

      <div class="metrics">
        <div class="metric"><span>공핍층 폭</span><span id="depMetric">보통</span></div>
        <div class="metric"><span>전위 장벽</span><span id="barrierMetric">기준</span></div>
        <div class="metric"><span>전류 흐름</span><span id="currentMetric">거의 없음</span></div>
      </div>

      <div class="legend" aria-label="범례">
        <div class="legend-item"><span class="dot electron"></span><span>전자: n형 영역의 다수 캐리어</span></div>
        <div class="legend-item"><span class="dot hole"></span><span>양공: p형 영역의 다수 캐리어</span></div>
        <div class="legend-item"><span class="dot depletion"></span><span>공핍층: 이동 캐리어가 적은 영역</span></div>
      </div>

      <div id="stateNote" class="note" aria-live="polite"></div>

      <div class="toolbar">
        <button id="pauseBtn" class="icon-button" type="button" aria-pressed="false">일시정지</button>
        <span class="hint">큰 입자, 적은 개수로 흐름을 더 또렷하게 표시합니다.</span>
      </div>
    </aside>

    <main class="view">
      <div id="canvasRoot"></div>
    </main>
  </div>

  <script src="./libs/p5.min.js"></script>
  <script>
    const root = document.getElementById('canvasRoot');
    const modeSel = document.getElementById('mode');
    const vol = document.getElementById('vol');
    const volVal = document.getElementById('volVal');
    const stateButtons = [...document.querySelectorAll('[data-state]')];
    const voltageButtons = [...document.querySelectorAll('[data-voltage]')];
    const depMetric = document.getElementById('depMetric');
    const barrierMetric = document.getElementById('barrierMetric');
    const currentMetric = document.getElementById('currentMetric');
    const stateNote = document.getElementById('stateNote');
    const pauseBtn = document.getElementById('pauseBtn');

    const STATES = {
      eq: {
        dep: 0.34,
        bend: 1.00,
        efSplit: 0.00,
        flow: 0,
        label: '열적 평형',
        noteTitle: '열적 평형',
        note: '확산과 드리프트가 균형을 이루어 순전류가 거의 없습니다. 공핍층과 내장 전기장이 형성되고 페르미 준위는 하나로 맞춰집니다.'
      },
      rev: {
        dep: 0.52,
        bend: 1.45,
        efSplit: -0.22,
        flow: 0,
        label: '역방향 바이어스',
        noteTitle: '역방향 바이어스',
        note: '외부 전압이 장벽을 더 높여 공핍층이 넓어집니다. 다수 캐리어의 이동은 억제되고 아주 작은 누설 전류만 흐릅니다.'
      },
      fwd: {
        dep: 0.18,
        bend: 0.35,
        efSplit: 0.22,
        flow: 1,
        label: '순방향 바이어스',
        noteTitle: '순방향 바이어스',
        note: '외부 전압이 전위 장벽을 낮춰 전자와 양공 주입이 쉬워집니다. 공핍층이 좁아지고 전류가 뚜렷하게 증가합니다.'
      }
    };

    const st = {
      key: 'eq',
      dep: STATES.eq.dep,
      bend: STATES.eq.bend,
      efSplit: STATES.eq.efSplit,
      flow: STATES.eq.flow,
      V: 0,
      Vmax: 1.5,
      paused: false,
      label: STATES.eq.label
    };

    modeSel.addEventListener('change', () => setState(modeSel.value));

    vol.addEventListener('input', () => {
      st.V = parseFloat(vol.value) || 0;
      st.key = st.V > 0.03 ? 'fwd' : st.V < -0.03 ? 'rev' : 'eq';
      modeSel.value = st.key;
      updateUI();
    });

    stateButtons.forEach((button) => {
      button.addEventListener('click', () => setState(button.dataset.state));
    });

    voltageButtons.forEach((button) => {
      button.addEventListener('click', () => {
        st.V = parseFloat(button.dataset.voltage) || 0;
        st.key = st.V > 0.03 ? 'fwd' : st.V < -0.03 ? 'rev' : 'eq';
        modeSel.value = st.key;
        updateUI();
      });
    });

    pauseBtn.addEventListener('click', () => {
      st.paused = !st.paused;
      pauseBtn.textContent = st.paused ? '재생' : '일시정지';
      pauseBtn.setAttribute('aria-pressed', String(st.paused));
    });

    function setState(key) {
      st.key = key;
      st.V = key === 'eq' ? 0 : key === 'rev' ? -0.9 : 0.7;
      modeSel.value = key;
      updateUI();
    }

    function currentLevel(v) {
      if (v > 0.85) return '강함';
      if (v > 0.25) return '증가';
      if (v < -0.05) return '누설 수준';
      return '거의 없음';
    }

    function updateUI() {
      vol.value = st.V.toFixed(2);
      volVal.textContent = `${st.V.toFixed(2)} V`;

      stateButtons.forEach((button) => {
        button.classList.toggle('active', button.dataset.state === st.key);
      });

      const s = Math.max(-1, Math.min(1, st.V / st.Vmax));
      depMetric.textContent = s > 0.18 ? '좁아짐' : s < -0.18 ? '넓어짐' : '보통';
      barrierMetric.textContent = s > 0.18 ? '낮아짐' : s < -0.18 ? '높아짐' : '기준';
      currentMetric.textContent = currentLevel(st.V);

      const info = STATES[st.key];
      stateNote.innerHTML = `<strong>${info.noteTitle}</strong>${info.note}`;
    }

    new p5((p) => {
      let carrierBounds = null;
      const electrons = [];
      const holes = [];
      const CARRIER_COUNT = 24;
      const ELECTRON_SIZE = 11;
      const HOLE_SIZE = 12;

      function resetCarriers(x0, x1, y0, h) {
        electrons.length = 0;
        holes.length = 0;
        const mid = (x0 + x1) / 2;

        for (let i = 0; i < CARRIER_COUNT; i++) {
          electrons.push({
            x: p.random(mid + 18, x1 - 18),
            y: p.random(y0 + 18, y0 + h - 18),
            vx: p.random(-18, 18),
            vy: p.random(-18, 18)
          });
          holes.push({
            x: p.random(x0 + 18, mid - 18),
            y: p.random(y0 + 18, y0 + h - 18),
            vx: p.random(-18, 18),
            vy: p.random(-18, 18)
          });
        }
      }

      function ensureCarriers(x0, x1, y0, h) {
        const next = [Math.round(x0), Math.round(x1), Math.round(y0), Math.round(h)].join(':');
        if (carrierBounds !== next || electrons.length === 0) {
          carrierBounds = next;
          resetCarriers(x0, x1, y0, h);
        }
      }

      function repelCarriers(list, dt, x0, x1, y0, h) {
        const minDist = 32;
        const minDistSq = minDist * minDist;
        const strength = 2200;

        for (let i = 0; i < list.length; i++) {
          for (let j = i + 1; j < list.length; j++) {
            const a = list[i];
            const b = list[j];
            let dx = a.x - b.x;
            let dy = a.y - b.y;
            let d2 = dx * dx + dy * dy;

            if (d2 < 0.01) {
              dx = p.random(-1, 1);
              dy = p.random(-1, 1);
              d2 = dx * dx + dy * dy || 1;
            }

            if (d2 < minDistSq) {
              const d = Math.sqrt(d2);
              const nx = dx / d;
              const ny = dy / d;
              const push = (1 - d / minDist) * strength;
              const correction = (minDist - d) * 0.36;

              a.vx += nx * push * dt;
              a.vy += ny * push * dt;
              b.vx -= nx * push * dt;
              b.vy -= ny * push * dt;

              a.x += nx * correction;
              a.y += ny * correction;
              b.x -= nx * correction;
              b.y -= ny * correction;
            }
          }
        }

        list.forEach((pt) => {
          const speed = Math.hypot(pt.vx, pt.vy);
          if (speed > 86) {
            pt.vx = (pt.vx / speed) * 86;
            pt.vy = (pt.vy / speed) * 86;
          }

          if (pt.y < y0 + 18) {
            pt.y = y0 + 18;
            pt.vy = Math.abs(pt.vy) + p.random(4, 12);
          } else if (pt.y > y0 + h - 18) {
            pt.y = y0 + h - 18;
            pt.vy = -Math.abs(pt.vy) + p.random(-12, -4);
          }

          pt.x = p.constrain(pt.x, x0 + 13, x1 - 13);
          pt.y = p.constrain(pt.y, y0 + 13, y0 + h - 13);
        });
      }

      function updateCarriers(dt, x0, x1, y0, h) {
        if (st.paused) return;

        const mid = (x0 + x1) / 2;
        const sign = Math.sign(st.V || 0);
        const drive = p.map(Math.min(Math.abs(st.V), st.Vmax), 0, st.Vmax, 0, 46);

        repelCarriers(electrons, dt, x0, x1, y0, h);
        repelCarriers(holes, dt, x0, x1, y0, h);

        electrons.forEach((pt) => {
          pt.vx += -drive * sign * dt;
          pt.vy += p.random(-14, 14) * dt;
          pt.vx *= 0.995;
          pt.vy *= 0.92;
          pt.x += pt.vx * dt;
          pt.y += pt.vy * dt;

          if (sign > 0 && pt.x < mid - 5) {
            pt.x = x1 - 18;
            pt.y = p.random(y0 + 24, y0 + h - 24);
            pt.vx = p.random(-18, 4);
            pt.vy = p.random(-24, 24);
          }

          if (sign === 0 && pt.x < mid + 10) {
            pt.x = mid + 10;
            pt.vx = Math.abs(pt.vx) * 0.4 + p.random(1, 5);
          }

          if (sign < 0 && pt.x > x1 - 15) {
            pt.x = x1 - 15;
            pt.vx = -Math.abs(pt.vx) * 0.35 + p.random(-7, 1);
            pt.vy += p.random(-40, 40) * dt;
          }

          pt.x = p.constrain(pt.x, x0 + 13, x1 - 13);
          pt.y = p.constrain(pt.y, y0 + 13, y0 + h - 13);
        });

        holes.forEach((pt) => {
          pt.vx += drive * sign * dt;
          pt.vy += p.random(-14, 14) * dt;
          pt.vx *= 0.995;
          pt.vy *= 0.92;
          pt.x += pt.vx * dt;
          pt.y += pt.vy * dt;

          if (sign > 0 && pt.x > mid + 5) {
            pt.x = x0 + 18;
            pt.y = p.random(y0 + 24, y0 + h - 24);
            pt.vx = p.random(-4, 18);
            pt.vy = p.random(-24, 24);
          }

          if (sign === 0 && pt.x > mid - 10) {
            pt.x = mid - 10;
            pt.vx = -Math.abs(pt.vx) * 0.4 + p.random(-5, -1);
          }

          if (sign < 0 && pt.x < x0 + 15) {
            pt.x = x0 + 15;
            pt.vx = Math.abs(pt.vx) * 0.35 + p.random(-1, 7);
            pt.vy += p.random(-40, 40) * dt;
          }

          pt.x = p.constrain(pt.x, x0 + 13, x1 - 13);
          pt.y = p.constrain(pt.y, y0 + 13, y0 + h - 13);
        });

        repelCarriers(electrons, dt, x0, x1, y0, h);
        repelCarriers(holes, dt, x0, x1, y0, h);
      }

      function drawCarrierLabel(text, x, y, align = p.LEFT) {
        p.noStroke();
        p.fill(12, 16, 20, 185);
        const tw = p.textWidth(text) + 18;
        const bx = align === p.LEFT ? x - 9 : x - tw + 9;
        p.rect(bx, y - 16, tw, 24, 6);
        p.fill(235);
        p.textAlign(align, p.CENTER);
        p.text(text, x, y - 4);
      }

      function drawTag(text, x, y, align = p.CENTER) {
        p.textSize(12);
        const tw = p.textWidth(text) + 16;
        const bx = align === p.CENTER ? x - tw / 2 : align === p.RIGHT ? x - tw : x;
        p.noStroke();
        p.fill(12, 16, 20, 190);
        p.rect(bx, y - 12, tw, 24, 6);
        p.fill(237, 243, 248);
        p.textAlign(align, p.CENTER);
        p.text(text, x, y);
      }

      function drawCarriers(x0, x1, y0, h) {
        const mid = (x0 + x1) / 2;

        electrons.forEach((e) => {
          const alpha = e.x < mid ? 150 : 235;
          p.noStroke();
          p.fill(104, 165, 255, alpha);
          p.circle(e.x, e.y, ELECTRON_SIZE);
          p.stroke(18, 26, 36);
          p.strokeWeight(1.6);
          p.line(e.x - 3, e.y, e.x + 3, e.y);
        });

        holes.forEach((o) => {
          const alpha = o.x < mid ? 235 : 150;
          p.noFill();
          p.stroke(255, 123, 117, alpha);
          p.strokeWeight(2.5);
          p.circle(o.x, o.y, HOLE_SIZE);
          p.strokeWeight(1.6);
          p.line(o.x - 3, o.y, o.x + 3, o.y);
          p.line(o.x, o.y - 3, o.x, o.y + 3);
        });

        p.textSize(12);
        if (st.V > 0.05) {
          drawCarrierLabel('전자 주입', x1 - 94, y0 + 52, p.LEFT);
          drawCarrierLabel('양공 주입', x0 + 102, y0 + 52, p.RIGHT);
        } else if (st.V < -0.05) {
          drawCarrierLabel('다수 캐리어 억제', x1 - 36, y0 + 52, p.RIGHT);
          drawCarrierLabel('공핍층 확장', x0 + 110, y0 + 52, p.RIGHT);
        }
      }

      function easeTo() {
        const s = Math.max(-1, Math.min(1, st.V / st.Vmax));
        let target;

        if (s > 0) {
          target = {
            dep: p.lerp(STATES.eq.dep, STATES.fwd.dep, s),
            bend: p.lerp(STATES.eq.bend, STATES.fwd.bend, s),
            efSplit: p.lerp(STATES.eq.efSplit, STATES.fwd.efSplit, s),
            flow: p.lerp(STATES.eq.flow, STATES.fwd.flow, s)
          };
          st.label = STATES.fwd.label;
        } else if (s < 0) {
          const u = -s;
          target = {
            dep: p.lerp(STATES.eq.dep, STATES.rev.dep, u),
            bend: p.lerp(STATES.eq.bend, STATES.rev.bend, u),
            efSplit: p.lerp(STATES.eq.efSplit, STATES.rev.efSplit, u),
            flow: 0
          };
          st.label = STATES.rev.label;
        } else {
          target = STATES.eq;
          st.label = STATES.eq.label;
        }

        const k = st.paused ? 0 : 0.1;
        st.dep += (target.dep - st.dep) * k;
        st.bend += (target.bend - st.bend) * k;
        st.efSplit += (target.efSplit - st.efSplit) * k;
        st.flow += (target.flow - st.flow) * k;
      }

      function drawPanelTitle(title, subtitle, x, y, w, compact = false) {
        p.noStroke();
        p.fill(237, 243, 248);
        p.textAlign(p.LEFT, p.TOP);
        p.textSize(compact ? 14 : 16);
        p.textStyle(p.BOLD);
        p.text(title, x, y);
        p.textStyle(p.NORMAL);
        if (compact) return;
        p.fill(168, 180, 192);
        p.textSize(12);
        p.text(subtitle, x, y + 24, w, 40);
      }

      function drawDevice(x0, x1, y0, h, compact = false) {
        const mid = (x0 + x1) / 2;
        const full = x1 - x0;
        const w = st.dep * full * 0.78;
        const left = mid - w / 2;
        const right = mid + w / 2;

        p.noStroke();
        p.fill(70, 105, 138);
        p.rect(x0, y0, full / 2, h, 10, 0, 0, 10);
        p.fill(114, 78, 92);
        p.rect(mid, y0, full / 2, h, 0, 10, 10, 0);

        p.fill(215, 236, 255, 210);
        p.rect(left, y0, w, h, 5);

        p.stroke(230, 244, 255);
        p.strokeWeight(1.5);
        p.drawingContext.setLineDash([6, 5]);
        p.line(left, y0, left, y0 + h);
        p.line(right, y0, right, y0 + h);
        p.drawingContext.setLineDash([]);

        p.noStroke();
        p.fill(12, 16, 20, 190);
        p.rect(x0 + 14, y0 + 14, 34, 24, 6);
        p.rect(x1 - 48, y0 + 14, 34, 24, 6);
        p.fill(245);
        p.textAlign(p.CENTER, p.CENTER);
        p.textSize(14);
        p.textStyle(p.BOLD);
        p.text('p', x0 + 31, y0 + 26);
        p.text('n', x1 - 31, y0 + 26);
        p.textStyle(p.NORMAL);

        const widthY = compact ? y0 + h - 18 : y0 - 12;
        p.stroke(215, 236, 255);
        p.strokeWeight(2);
        p.line(left, widthY, right, widthY);
        p.line(left, widthY - 5, left, widthY + 5);
        p.line(right, widthY - 5, right, widthY + 5);
        drawTag('공핍층 폭 W', mid, compact ? widthY - 16 : widthY - 12);

        const ey = y0 + h + (compact ? 18 : 28);
        p.stroke(230);
        p.strokeWeight(2.2);
        p.line(mid + 48, ey, mid - 48, ey);
        p.line(mid - 48, ey, mid - 39, ey - 6);
        p.line(mid - 48, ey, mid - 39, ey + 6);
        drawTag('내장 전기장 E', mid, compact ? ey - 14 : ey + 17);

        if (!compact) {
          drawBattery(mid, y0 - 38);
        }

        p.noStroke();
        p.fill(237, 243, 248);
        p.textAlign(p.CENTER, p.CENTER);
        p.textSize(compact ? 14 : 17);
        p.textStyle(p.BOLD);
        p.text(st.label, mid, compact ? y0 + h / 2 : y0 - 50);
        p.textStyle(p.NORMAL);
      }

      function drawBattery(mid, y) {
        const left = mid - 74;
        const right = mid + 74;
        p.stroke(230);
        p.strokeWeight(2);
        p.line(left - 9, y, left + 9, y);
        p.line(right - 9, y, right + 9, y);

        if (st.V > 0.03) {
          p.line(left, y - 8, left, y + 8);
        } else if (st.V < -0.03) {
          p.line(right, y - 8, right, y + 8);
        } else {
          p.stroke(150);
          p.line(left, y - 5, left, y + 5);
          p.line(right, y - 5, right, y + 5);
        }

        p.noStroke();
        p.fill(168, 180, 192);
        p.textSize(11);
        p.textAlign(p.CENTER, p.TOP);
        p.text('외부 전압', mid, y + 10);
      }

      function drawBands(x0, x1, y0, h, compact = false) {
        const midx = (x0 + x1) / 2;
        const width = x1 - x0;
        const depWpx = st.dep * width * 0.78;
        const L = midx - depWpx / 2;
        const R = midx + depWpx / 2;
        const EcFlat = y0 + h * (compact ? 0.24 : 0.27);
        const Eg = compact ? Math.max(54, h * 0.36) : Math.max(82, h * 0.32);
        const EvFlat = EcFlat + Eg;
        const amp = -Math.min(compact ? 44 : 86, h * 0.24) * st.bend;

        const curve = (x) => {
          if (x <= L) return 0.5;
          if (x >= R) return -0.5;
          const u = (x - L) / Math.max(1, R - L);
          return 0.5 - (3 * u * u - 2 * u * u * u);
        };

        p.noStroke();
        p.fill(215, 236, 255, 28);
        p.rect(L, y0 + 12, R - L, h - 24, 5);

        p.noFill();
        p.stroke(237, 243, 248);
        p.strokeWeight(2.5);
        p.beginShape();
        for (let i = 0; i <= 150; i++) {
          const xx = p.lerp(x0, x1, i / 150);
          p.vertex(xx, EcFlat + amp * curve(xx));
        }
        p.endShape();

        p.beginShape();
        for (let i = 0; i <= 150; i++) {
          const xx = p.lerp(x0, x1, i / 150);
          p.vertex(xx, EvFlat + amp * curve(xx));
        }
        p.endShape();

        p.noStroke();
        p.fill(237, 243, 248);
        p.textSize(compact ? 11 : 12);
        p.textAlign(p.RIGHT, p.CENTER);
        p.text('Ec', x1 - 10, EcFlat - (compact ? 12 : 18));
        p.text('Ev', x1 - 10, EvFlat + (compact ? 12 : 18));

        const EfL = y0 + h * 0.54 + st.efSplit * 80;
        const EfR = y0 + h * 0.54 - st.efSplit * 80;
        p.stroke(255, 123, 117);
        p.strokeWeight(2);
        p.drawingContext.setLineDash([7, 6]);
        p.line(x0, EfL, midx, EfL);
        p.line(midx, EfR, x1, EfR);
        p.drawingContext.setLineDash([]);

        p.noStroke();
        p.fill(255, 150, 144);
        const efLabel = Math.abs(st.V) < 0.03
          ? (compact ? 'EF' : '페르미 준위 EF')
          : (compact ? 'EFn / EFp' : '준 페르미 준위 EFn / EFp');
        p.textAlign(p.LEFT, p.CENTER);
        p.text(efLabel, x0 + 8, (EfL + EfR) / 2 - (compact ? 10 : 14));

        const aMag = Math.abs(st.efSplit) * 80;
        if (aMag > 4) {
          const aY = (EfL + EfR) / 2;
          p.stroke(255, 150, 144);
          p.strokeWeight(2);
          p.line(x1 - 42, aY - aMag, x1 - 42, aY + aMag);
          p.line(x1 - 42, aY - aMag, x1 - 47, aY - aMag + 7);
          p.line(x1 - 42, aY - aMag, x1 - 37, aY - aMag + 7);
          p.line(x1 - 42, aY + aMag, x1 - 47, aY + aMag - 7);
          p.line(x1 - 42, aY + aMag, x1 - 37, aY + aMag - 7);
          p.noStroke();
          p.fill(255, 150, 144);
          p.textAlign(p.RIGHT, p.CENTER);
          p.text(st.V < 0 ? 'eV_R' : 'eV_a', x1 - 50, aY);
        }

        p.stroke(168, 180, 192);
        p.strokeWeight(1.5);
        p.drawingContext.setLineDash([6, 5]);
        p.line(L, y0 + 8, L, y0 + h - 8);
        p.line(R, y0 + 8, R, y0 + h - 8);
        p.drawingContext.setLineDash([]);

        p.noStroke();
        if (!compact || h > 100) {
          p.fill(168, 180, 192);
          p.textAlign(p.CENTER, p.BOTTOM);
          p.text('공핍층 영역', midx, y0 + h - 8);
        }

        if (st.flow > 0.04 && !st.paused) {
          drawCurrentArrows(x0, x1, EcFlat, EvFlat, curve, amp, midx, compact);
        }
      }

      function drawCurrentArrows(x0, x1, EcFlat, EvFlat, curve, amp, midx, compact = false) {
        p.stroke(237, 243, 248);
        p.strokeWeight(2);
        const yC = EcFlat - 14 + amp * curve(midx) * 0.08;
        const yV = EvFlat + 14 + amp * curve(midx) * 0.08;

        for (let i = 0; i < 3; i++) {
          const px = p.lerp(x1 - 88, x0 + 88, ((p.frameCount * 0.012 + i / 3) % 1));
          p.line(px + 12, yC, px - 12, yC);
          p.line(px - 12, yC, px - 7, yC - 5);
          p.line(px - 12, yC, px - 7, yC + 5);
        }

        for (let i = 0; i < 3; i++) {
          const px = p.lerp(x0 + 88, x1 - 88, ((p.frameCount * 0.012 + i / 3) % 1));
          p.line(px - 12, yV, px + 12, yV);
          p.line(px + 12, yV, px + 7, yV - 5);
          p.line(px + 12, yV, px + 7, yV + 5);
        }

        if (!compact) {
          p.noStroke();
          p.fill(220);
          p.textSize(12);
          p.textAlign(p.LEFT, p.CENTER);
          p.text('전자 흐름', x0 + 18, yC - 16);
          p.textAlign(p.RIGHT, p.CENTER);
          p.text('양공 흐름', x1 - 18, yV + 16);
        }
      }

      p.setup = () => {
        const box = root.getBoundingClientRect();
        p.createCanvas(box.width || window.innerWidth, box.height || window.innerHeight).parent(root);
        p.textFont('system-ui, Noto Sans KR, sans-serif');
        updateUI();
      };

      p.windowResized = () => {
        const box = root.getBoundingClientRect();
        p.resizeCanvas(box.width || window.innerWidth, box.height || window.innerHeight);
        carrierBounds = null;
      };

      p.draw = () => {
        p.background(16, 20, 25);
        easeTo();

        const compact = p.width < 620 || p.height < 520;
        const pad = compact ? 20 : 52;
        const x0 = pad;
        const x1 = p.width - pad;
        const topY = compact ? 58 : 82;
        const deviceH = compact
          ? p.constrain(p.height * 0.26, 88, 130)
          : Math.max(140, p.height * 0.32);
        const bandY = topY + deviceH + (compact ? 58 : 98);
        const bandH = compact
          ? Math.max(86, p.height - bandY - 22)
          : Math.max(150, p.height - bandY - 36);

        drawPanelTitle('소자 구조', 'p형과 n형 접합, 공핍층, 캐리어 이동', x0, 18, x1 - x0, compact);
        drawDevice(x0, x1, topY, deviceH, compact);

        ensureCarriers(x0, x1, topY, deviceH);
        updateCarriers(Math.min(0.033, p.deltaTime / 1000), x0, x1, topY, deviceH);
        drawCarriers(x0, x1, topY, deviceH);

        p.stroke(48, 57, 70);
        p.strokeWeight(1);
        p.line(x0, bandY - 28, x1, bandY - 28);

        drawPanelTitle('에너지 밴드', '전도대 Ec, 가전자대 Ev, 페르미 준위 EF', x0, bandY - 12, x1 - x0, compact);
        drawBands(x0, x1, bandY + (compact ? 34 : 40), Math.max(70, bandH - 34), compact);

        p.noStroke();
        p.fill(237, 243, 248);
        p.textAlign(p.RIGHT, p.TOP);
        p.textSize(13);
        p.text(`V = ${st.V.toFixed(2)} V`, x1, 18);
      };
    });
  </script>
</body>

</html>
