<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>크로스 필드: 입자 가속 시뮬레이터</title>
    <style>
        @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

        :root {
            --bg-color: #050a14;
            --panel-bg: rgba(15, 23, 42, 0.85);
            --text-color: #e0e6ed;
            --accent-color: #00f2fe;
            /* Cyan */
            --danger-color: #ff4757;
            /* Electric */
            --warning-color: #ffa502;
            /* Magnetic */
            --success-color: #2ed573;
            --obstacle-color: #ff6b6b;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: var(--text-color);
            font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
        }

        /* 게임 컨테이너: 전체 화면 */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #0b1021 0%, #000000 100%);
        }

        /* 캔버스 */
        #simCanvas {
            display: block;
            width: 100%;
            height: 100%;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            cursor: crosshair;
        }

        /* [가로 모드 유도 화면] */
        #rotate-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050a14;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .phone-icon {
            font-size: 3rem;
            animation: rotatePhone 1.5s infinite;
            margin-bottom: 20px;
        }

        @keyframes rotatePhone {
            0% {
                transform: rotate(0deg);
            }

            50% {
                transform: rotate(-90deg);
            }

            100% {
                transform: rotate(0deg);
            }
        }

        @media screen and (orientation: portrait) {
            #rotate-warning {
                display: flex;
            }

            #game-container {
                display: none;
            }
        }

        /* --- UI 요소 스타일 --- */

        /* 상단: 수식 대시보드 (HUD) */
        #hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            z-index: 10;
        }

        .hud-box {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'Space Mono', monospace;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            min-width: 140px;
        }

        .hud-label {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 5px;
        }

        .hud-val {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .force-eq {
            font-size: 1.5rem;
            font-weight: bold;
            color: #555;
            align-self: center;
        }

        .force-eq.balanced {
            color: var(--success-color);
            text-shadow: 0 0 10px var(--success-color);
        }

        /* 좌측 상단: 입자 선택기 */
        #particleSelector {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            z-index: 20;
        }

        .p-option {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            opacity: 0.6;
            transition: 0.2s;
        }

        .p-option:hover,
        .p-option.active {
            opacity: 1;
        }

        .p-option.active {
            color: var(--accent-color);
            font-weight: bold;
        }

        .p-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 10px;
            background: #fff;
        }

        /* 우측 상단: 게임 모드 버튼 */
        #gameModePanel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* 레벨 배지 */
        .level-badge {
            display: none;
            background: var(--warning-color);
            color: #000;
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
            box-shadow: 0 0 10px var(--warning-color);
        }

        /* 버튼 공통 스타일 */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            font-weight: 800;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
        }

        #challengeBtn {
            background: transparent;
            border: 2px solid var(--warning-color);
            color: var(--warning-color);
        }

        #challengeBtn:hover,
        #challengeBtn.active {
            background: var(--warning-color);
            color: #000;
            box-shadow: 0 0 20px var(--warning-color);
        }

        #auroraBtn {
            background: transparent;
            border: 2px solid #a29bfe;
            color: #a29bfe;
        }

        #auroraBtn:hover {
            background: #a29bfe;
            color: #000;
            box-shadow: 0 0 20px #a29bfe;
            transform: translateY(-2px);
        }

        /* 하단 컨트롤 패널 (완전 복구됨) */
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;

            /* 핵심 변경: 투명도를 0.2로 낮춰서 뒤가 훤히 비치게 함 */
            background: rgba(15, 23, 42, 0.2);

            /* 배경을 흐리게 처리해서 글씨 가독성 확보 (유리 같은 느낌) */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            /* 사파리 호환 */

            padding: 20px 40px;
            border-radius: 20px;

            /* 테두리도 더 연하게 */
            border: 1px solid rgba(255, 255, 255, 0.08);

            display: flex;
            gap: 30px;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            /* 그림자도 연하게 */
            z-index: 100;
        }

        .control-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .control-group label {
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        /* 슬라이더 스타일 (중앙 정렬 완벽 해결) */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin: 10px 0;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            margin-top: -6px;
            /* (4px - 16px) / 2 = -6px (중앙 정렬) */
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .value-display {
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            color: #fff;
            margin-top: 5px;
        }

        #launchBtn {
            background: var(--accent-color);
            color: #000;
            padding: 15px 30px;
            font-size: 1.1rem;
        }

        #launchBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px var(--accent-color);
        }

        /* 메시지 */
        #message {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
            z-index: 200;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        /* [모바일/작은 화면 전용 스타일] */
        @media screen and (max-width: 900px),
        screen and (max-height: 600px) {
            #hud {
                top: 5px;
                gap: 8px;
            }

            .hud-box {
                padding: 4px 8px;
                min-width: 60px;
                border-radius: 5px;
            }

            .hud-label {
                font-size: 0.55rem;
                margin-bottom: 2px;
            }

            .hud-val {
                font-size: 0.8rem;
            }

            .force-eq {
                font-size: 0.9rem;
            }

            #particleSelector {
                top: 5px;
                left: 5px;
                padding: 6px;
                border-radius: 10px;
            }

            .p-option {
                font-size: 0.65rem;
                margin-bottom: 3px;
            }

            .p-dot {
                width: 6px;
                height: 6px;
                margin-right: 4px;
            }

            #gameModePanel {
                top: 5px;
                right: 5px;
                gap: 5px;
            }

            .button-container {
                gap: 5px;
            }

            .btn {
                padding: 6px 12px;
                font-size: 0.7rem;
                border-radius: 15px;
                border-width: 1.5px;
            }

            .level-badge {
                font-size: 0.65rem;
                padding: 2px 5px;
            }

            #controls {
                bottom: 10px;
                padding: 10px 15px;
                gap: 10px;
                width: 95%;
                border-radius: 15px;
            }

            .control-group label {
                font-size: 0.65rem;
                margin-bottom: 2px;
            }

            .value-display {
                font-size: 0.7rem;
                margin-top: 2px;
            }

            #launchBtn {
                padding: 8px 16px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body>
    <div id="rotate-warning">
        <div class="phone-icon">📱</div>
        <p>가로 모드로 돌려주세요<br>(Please Rotate Your Device)</p>
    </div>

    <div id="game-container">

        <div id="hud">
            <div class="hud-box" style="border-color: var(--danger-color);">
                <div class="hud-label">ELECTRIC FORCE (Fe = qE)</div>
                <div class="hud-val" id="hudFe" style="color: var(--danger-color);">0.00</div>
            </div>
            <div class="force-eq" id="eqSign">≠</div>
            <div class="hud-box" style="border-color: var(--warning-color);">
                <div class="hud-label">MAGNETIC FORCE (Fb = qvB)</div>
                <div class="hud-val" id="hudFb" style="color: var(--warning-color);">0.00</div>
            </div>
        </div>

        <div id="particleSelector">
            <div class="hud-label" style="margin-bottom:10px;">PARTICLE TYPE</div>
            <div class="p-option active" onclick="setParticle('proton', this)">
                <div class="p-dot" style="background: #ff4757;"></div> Proton (p+)
            </div>
            <div class="p-option" onclick="setParticle('electron', this)">
                <div class="p-dot" style="background: #00f2fe;"></div> Electron (e-)
            </div>
            <div class="p-option" onclick="setParticle('alpha', this)">
                <div class="p-dot" style="background: #2ed573;"></div> Alpha (He2+)
            </div>
        </div>

        <div id="gameModePanel">
            <div id="levelBadge" class="level-badge">LEVEL 1</div>
            <div class="button-container">
                <button id="challengeBtn" class="btn">CHALLENGE MODE</button>
                <button id="auroraBtn" class="btn">PROJECT: AURORA</button>
            </div>
        </div>

        <div id="message"></div>

        <canvas id="simCanvas"></canvas>

        <div id="controls">
            <div class="control-group">
                <label style="color:var(--danger-color)">E-FIELD</label>
                <input type="range" id="eSlider" min="-5" max="5" step="0.1" value="0">
                <div class="value-display" id="eVal">0.0</div>
            </div>
            <div class="control-group">
                <label style="color:var(--warning-color)">B-FIELD</label>
                <input type="range" id="bSlider" min="-2" max="2" step="0.1" value="0">
                <div class="value-display" id="bVal">0.0</div>
            </div>
            <div class="control-group">
                <label style="color:var(--accent-color)">VELOCITY</label>
                <input type="range" id="vSlider" min="1" max="10" step="0.5" value="5">
                <div class="value-display" id="vVal">5.0</div>
            </div>
            <button id="launchBtn" class="btn">LAUNCH</button>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        let width, height; // 전역 변수
        let animationId;

        // --- 1. 상태 및 물리 설정 ---
        const physics = {
            proton: { m: 2.0, q: 1, color: '#ff4757', name: 'Proton' },
            electron: { m: 0.5, q: -1, color: '#00f2fe', name: 'Electron' },
            alpha: { m: 8.0, q: 2, color: '#2ed573', name: 'Alpha' }
        };

        const state = {
            E: 0, B: 0, v0: 5,
            running: false,
            mode: 'free',
            level: 1,
            particleType: 'proton'
        };

        let particle = { x: 0, y: 0, vx: 0, vy: 0, trail: [] };
        let target = { x: 0, y: 0, radius: 30, active: false };
        let obstacles = [];

        // --- 2. 초기화 ---
        function init() {
            window.addEventListener('resize', resize);

            document.getElementById('eSlider').addEventListener('input', updateUI);
            document.getElementById('bSlider').addEventListener('input', updateUI);
            document.getElementById('vSlider').addEventListener('input', updateUI);
            document.getElementById('launchBtn').addEventListener('click', launch);
            document.getElementById('challengeBtn').addEventListener('click', toggleChallenge);
            document.getElementById('auroraBtn').addEventListener('click', function () {
                window.location.href = '오로라.html';
            });

            updateUI();

            // 화면 크기 설정 및 최초 드로우 (중요: 까만 화면 방지)
            resize();

            // 루프 시작
            requestAnimationFrame(loop);
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;

            canvas.width = width;
            canvas.height = height;

            const container = document.getElementById('game-container');
            if (container) container.style.transform = 'none';

            if (state.mode === 'challenge') {
                setupLevel(state.level);
            } else {
                target.x = width - 100;
                target.y = height / 2;
            }

            resetSystem();
            draw(); // 리사이즈 즉시 화면 갱신
        }

        // --- 3. 로직 제어 ---
        function setParticle(type, el) {
            state.particleType = type;
            document.querySelectorAll('.p-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');

            if (state.running) launch();
            else resetSystem();
        }

        function updateUI() {
            state.E = parseFloat(document.getElementById('eSlider').value);
            state.B = parseFloat(document.getElementById('bSlider').value);
            state.v0 = parseFloat(document.getElementById('vSlider').value);

            document.getElementById('eVal').textContent = state.E.toFixed(1);
            document.getElementById('bVal').textContent = state.B.toFixed(1);
            document.getElementById('vVal').textContent = state.v0.toFixed(1);

            updateHUD();
        }

        function updateHUD() {
            const p = physics[state.particleType];
            // 화면 높이 스케일(전기장) 적용하여 표시값과 실제 힘 싱크 맞춤
            const scaleY = Math.min(1.0, height / 700);
            const Fe = Math.abs(p.q * state.E * scaleY);
            const Fb = Math.abs(p.q * state.v0 * state.B);

            document.getElementById('hudFe').textContent = Fe.toFixed(2);
            document.getElementById('hudFb').textContent = Fb.toFixed(2);

            const eqSign = document.getElementById('eqSign');
            if (state.running && Math.abs(Fe - Fb) < 0.1 && Fe > 0) {
                eqSign.textContent = "=";
                eqSign.classList.add('balanced');
            } else {
                eqSign.textContent = "vs";
                eqSign.classList.remove('balanced');
            }
        }

        function toggleChallenge() {
            const btn = document.getElementById('challengeBtn');
            const badge = document.getElementById('levelBadge');

            if (state.mode === 'free') {
                state.mode = 'challenge';
                state.level = 1;
                btn.classList.add('active');
                btn.textContent = "EXIT CHALLENGE";
                badge.style.display = 'block';
                setupLevel(1);
                showMsg("LEVEL 1 START", "#fff");
            } else {
                state.mode = 'free';
                btn.classList.remove('active');
                btn.textContent = "CHALLENGE MODE";
                badge.style.display = 'none';
                target.active = false;
                obstacles = [];
            }
            resetSystem();
        }

        function setupLevel(lvl) {
            target.active = true;
            obstacles = [];
            document.getElementById('levelBadge').textContent = `LEVEL ${lvl}`;

            // 화면의 중앙 좌표
            const cx = width / 2;
            const cy = height / 2;

            if (lvl === 1) {
                // [LEVEL 1: 계단형 터널]
                // 화면 높이의 30% 지점(상단)에 터널 생성
                const tunnelY = height * 0.3;

                target.x = width * 0.9; // 오른쪽 90% 지점
                target.y = tunnelY;

                // 1. 아래쪽 벽 (터널 바닥)
                obstacles.push({
                    x: width * 0.25, // 왼쪽 25% 지점부터 시작
                    y: tunnelY + 40,
                    w: width * 0.75, // 나머지 길이 꽉 채움
                    h: height
                });

                // 2. 위쪽 벽 (터널 천장)
                obstacles.push({
                    x: width * 0.25,
                    y: 0,
                    w: width * 0.75,
                    h: tunnelY - 40
                });

            } else if (lvl === 2) {
                // [LEVEL 2: 지그재그 익스트림]
                target.x = width * 0.95;
                target.y = cy - (height * 0.15); // 약간 위쪽

                // 벽 배치 간격 (전체 너비의 25% 지점부터 시작)
                const startX = width * 0.25;
                const interval = (width * 0.6) / 3; // 60% 공간을 3등분
                const wallW = width * 0.025; // 벽 두께는 화면 너비의 2.5%
                const holeSize = height * 0.2; // 구멍 크기는 화면 높이의 20%

                // 1. 첫 번째 벽 (아래에서 솟음)
                obstacles.push({
                    x: startX,
                    y: cy - holeSize / 2,
                    w: wallW,
                    h: height
                });

                // 2. 두 번째 벽 (위에서 내려옴)
                obstacles.push({
                    x: startX + interval,
                    y: 0,
                    w: wallW,
                    h: cy + holeSize / 2
                });

                // 3. 세 번째 벽 (아래에서 솟음)
                obstacles.push({
                    x: startX + interval * 2,
                    y: cy - holeSize / 2,
                    w: wallW,
                    h: height
                });

                // 천장/바닥 안전턱 (화면 높이의 5%)
                const borderH = height * 0.05;
                obstacles.push({ x: 0, y: 0, w: width, h: borderH });
                obstacles.push({ x: 0, y: height - borderH, w: width, h: borderH });

            } else if (lvl === 3) {
                // [LEVEL 3: U-Turn]
                target.x = cx;
                target.y = cy;

                // 감옥 크기 (화면 높이 기준 15%)
                const boxSize = height * 0.15;
                const wallThick = 20;

                // 'ㄷ'자 감옥 (화면 중앙 기준)
                // 왼쪽 벽 (막힘)
                obstacles.push({
                    x: cx - boxSize,
                    y: cy - boxSize,
                    w: wallThick,
                    h: boxSize * 2
                });
                // 위쪽 벽
                obstacles.push({
                    x: cx - boxSize,
                    y: cy - boxSize,
                    w: boxSize * 2,
                    h: wallThick
                });
                // 아래쪽 벽
                obstacles.push({
                    x: cx - boxSize,
                    y: cy + boxSize - wallThick,
                    w: boxSize * 2,
                    h: wallThick
                });

                // 위아래 중앙 가이드 벽
                obstacles.push({ x: cx, y: 0, w: wallThick, h: height * 0.2 });
                obstacles.push({ x: cx, y: height * 0.8, w: wallThick, h: height * 0.2 });
            }
        }

        function resetSystem() {
            particle.x = 80;
            particle.y = height / 2;
            particle.vx = state.v0;
            particle.vy = 0;
            particle.trail = [];
            state.running = false;

            if (state.mode === 'free') target.active = false;

            document.getElementById('message').style.opacity = 0;
            document.getElementById('eqSign').classList.remove('balanced');

            // 리셋 시에도 화면 한번 그림
            draw();
        }

        function launch() {
            resetSystem();

            // [수정] 속도는 '너비' 기준 스케일 (가로가 좁으면 느리게)
            const scaleX = Math.min(1.0, width / 1200);
            particle.vx = state.v0 * scaleX;
            state.running = true;
        }

        // --- 4. 물리 엔진 (FPS 60 고정 + 스케일 분리) ---
        function updatePhysics() {
            if (!state.running) return;

            // [중요] 전기장은 '높이' 기준, 속도는 '너비' 기준
            const scaleY = Math.min(1.0, height / 700);

            const originalDt = 0.2;
            const steps = 20;
            const dt = originalDt / steps;

            const pProp = physics[state.particleType];

            for (let i = 0; i < steps; i++) {
                const scaledE = state.E * scaleY; // 전기장만 Y스케일 적용
                const Fe_y = pProp.q * scaledE;

                const Fb_x = pProp.q * particle.vy * state.B;
                const Fb_y = -pProp.q * particle.vx * state.B;

                const Fnet_x = Fb_x;
                const Fnet_y = Fe_y + Fb_y;

                const ax = Fnet_x / pProp.m;
                const ay = Fnet_y / pProp.m;

                particle.vx += ax * dt;
                particle.vy += ay * dt;
                particle.x += particle.vx * dt;
                particle.y += particle.vy * dt;
            }

            particle.trail.push({ x: particle.x, y: particle.y });

            // 화면 이탈
            if (particle.x > width + 50 || particle.x < -50 || particle.y > height + 50 || particle.y < -50) {
                state.running = false;
                if (state.mode === 'challenge') failLevel();
            }

            if (state.mode === 'challenge') checkCollisions();
            updateHUD();
        }

        function checkCollisions() {
            const dx = particle.x - target.x;
            const dy = particle.y - target.y;
            if (Math.hypot(dx, dy) < target.radius) {
                winLevel();
                return;
            }
            for (let obs of obstacles) {
                if (particle.x > obs.x && particle.x < obs.x + obs.w &&
                    particle.y > obs.y && particle.y < obs.y + obs.h) {
                    failLevel("CRASHED!");
                    return;
                }
            }
        }

        function winLevel() {
            state.running = false;
            if (state.level < 3) {
                showMsg(`LEVEL ${state.level} CLEARED!`, "var(--success-color)");
                setTimeout(() => {
                    state.level++;
                    setupLevel(state.level);
                    resetSystem();
                    showMsg(`LEVEL ${state.level} START`, "#fff");
                }, 2000);
            } else {
                showMsg("ALL LEVELS COMPLETED!", "var(--accent-color)");
            }
        }

        function failLevel(text = "MISSED!") {
            state.running = false;
            showMsg(text, "var(--obstacle-color)");
        }

        function showMsg(text, color) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.style.color = color;
            msg.style.opacity = 1;
            msg.style.textShadow = `0 0 30px ${color}`;
        }

        // --- 5. 렌더링 ---
        function draw() {
            if (!width || !height) return; // 안전장치

            ctx.clearRect(0, 0, width, height);

            drawGrid();
            drawFields();

            if (state.mode === 'challenge') {
                drawTarget();
                drawObstacles();
            }

            drawTrail();
            drawParticle();
        }

        function drawGrid() {
            ctx.strokeStyle = "rgba(0, 242, 254, 0.05)";
            ctx.lineWidth = 1;
            const size = 60;
            ctx.beginPath();
            for (let x = 0; x < width; x += size) { ctx.moveTo(x, 0); ctx.lineTo(x, height); }
            for (let y = 0; y < height; y += size) { ctx.moveTo(0, y); ctx.lineTo(width, y); }
            ctx.stroke();
        }

        function drawFields() {
            // 전기장 (Plate)
            if (state.E !== 0) {
                const color = state.E > 0 ? "255, 71, 87" : "0, 242, 254";
                ctx.fillStyle = `rgba(${color}, 0.1)`;
                ctx.fillRect(0, 0, width, 20);
                ctx.fillRect(0, height - 20, width, 20);

                ctx.strokeStyle = `rgba(${color}, 0.5)`;
                ctx.beginPath();
                // [수정] 전기장 방향: 양수면 위->아래, 음수면 아래->위
                for (let x = 50; x < width; x += 100) {
                    if (state.E > 0) drawArrow(x, 30, x, height - 30, 8);
                    else drawArrow(x, height - 30, x, 30, 8);
                }
                ctx.stroke();
            }
            // 자기장
            if (state.B !== 0) {
                ctx.fillStyle = "rgba(255, 165, 2, 0.3)";
                ctx.font = "20px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                const symbol = state.B > 0 ? "✕" : "●";
                for (let x = 50; x < width; x += 100) {
                    for (let y = 50; y < height; y += 100) {
                        ctx.fillText(symbol, x, y);
                    }
                }
            }
        }

        function drawObstacles() {
            ctx.save();
            for (let obs of obstacles) {
                ctx.beginPath();
                ctx.rect(obs.x, obs.y, obs.w, obs.h);
                ctx.clip();
                ctx.fillStyle = "rgba(255, 107, 107, 0.2)";
                ctx.fill();
                ctx.strokeStyle = "var(--obstacle-color)";
                ctx.lineWidth = 2;
                ctx.beginPath();
                for (let i = -obs.h; i < obs.w + obs.h; i += 15) {
                    ctx.moveTo(obs.x + i, obs.y);
                    ctx.lineTo(obs.x + i + obs.h + 20, obs.y + obs.h + 20);
                }
                ctx.stroke();
                ctx.strokeStyle = "var(--obstacle-color)";
                ctx.lineWidth = 3;
                ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
                ctx.restore();
                ctx.save();
            }
            ctx.restore();
        }

        function drawTarget() {
            if (!target.active) return;
            const color = "var(--success-color)";
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.shadowBlur = 15;
            ctx.shadowColor = color;
            ctx.beginPath();
            // 타겟 애니메이션 (시간값 필요하므로 date 사용)
            const t = Date.now() / 300;
            ctx.arc(target.x, target.y, target.radius, t, t + Math.PI * 1.5);
            ctx.stroke();
            ctx.font = "12px sans-serif";
            ctx.fillStyle = color;
            ctx.fillText("GOAL", target.x - 18, target.y + 4);
            ctx.shadowBlur = 0;
        }

        function drawTrail() {
            if (particle.trail.length < 2) return;
            // 시각 효과는 '너비' 기준
            const scaleX = Math.min(1.0, width / 1200);
            const color = physics[state.particleType].color;
            ctx.strokeStyle = color;
            ctx.lineWidth = Math.max(1, 3 * scaleX);
            ctx.lineCap = 'round';
            ctx.shadowBlur = 10 * scaleX;
            ctx.shadowColor = color;
            ctx.beginPath();
            ctx.moveTo(particle.trail[0].x, particle.trail[0].y);
            for (let p of particle.trail) ctx.lineTo(p.x, p.y);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function drawParticle() {
            const scaleX = Math.min(1.0, width / 1200);
            const pProp = physics[state.particleType];
            const baseR = pProp.name === 'Alpha' ? 10 : 6;
            const r = Math.max(3, baseR * scaleX);

            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(particle.x, particle.y, r, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 20 * scaleX;
            ctx.shadowColor = pProp.color;
            ctx.beginPath();
            ctx.arc(particle.x, particle.y, r + (4 * scaleX), 0, Math.PI * 2);
            ctx.fillStyle = pProp.color;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawArrow(x1, y1, x2, y2, head) {
            const angle = Math.atan2(y2 - y1, x2 - x1);
            ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
            ctx.lineTo(x2 - head * Math.cos(angle - Math.PI / 6), y2 - head * Math.sin(angle - Math.PI / 6));
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2 - head * Math.cos(angle + Math.PI / 6), y2 - head * Math.sin(angle + Math.PI / 6));
        }

        // --- 6. 애니메이션 루프 (FPS 60 고정) ---
        let lastTime = 0;
        const fpsInterval = 1000 / 60; // 60FPS

        function loop(timestamp) {
            animationId = requestAnimationFrame(loop);

            if (!lastTime) { lastTime = timestamp; return; }
            const elapsed = timestamp - lastTime;

            if (elapsed > fpsInterval) {
                lastTime = timestamp - (elapsed % fpsInterval);
                updatePhysics();
                draw();
            }
        }

        // 실행
        init();
    </script>
</body>
