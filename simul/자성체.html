}

function drawMaglevPrinciplePanel(x,y,w,h){
  ctx.save();

  // Panel background
  ctx.fillStyle='rgba(255,255,255,0.82)';
  ctx.strokeStyle='rgba(37,99,235,0.16)';
  ctx.lineWidth=1;
  ctx.shadowColor='rgba(30,64,175,0.10)';
  ctx.shadowBlur=14;
  rrect(x,y,w,h,10);
  ctx.fill();
  ctx.shadowBlur=0;
  ctx.stroke();

  ctx.fillStyle='#172f4a';
  ctx.font='bold 12px Pretendard,sans-serif';
  ctx.textAlign='left';
  ctx.fillText('원리 확대',x+12,y+20);

  const pad=14;
  const iX=x+pad, iW=w-pad*2;

  // Train sweeps left→right, looping
  const sweep=((ph*0.52)%1+1)%1;

  const trackY=y+h*0.68;
  const trackH=18;
  const nMag=4;               // N-S-N-S 자석 4개
  const nC=8;
  const cStep=iW/nC;
  const cW=Math.max(13,cStep*0.58);
  const cH=12;

  // Train: 4 magnets wide
  const magBarH=11;
  const tH=20;
  const magPitch=cStep*1.12;   // one magnet = ~one coil spacing
  const tW=magPitch*nMag;
  const tX=iX-tW*0.3+(iW+tW*0.3)*sweep;
  const tY=trackY-tH-magBarH-10;

  // Clip interior
  ctx.beginPath();
  ctx.rect(iX,y+22,iW,h-26);
  ctx.clip();

  // Track surface
  ctx.fillStyle='rgba(226,232,240,0.95)';
  rrect(iX,trackY,iW,trackH+4,3);
  ctx.fill();
  ctx.strokeStyle='rgba(100,116,139,0.28)';
  ctx.lineWidth=1;
  ctx.stroke();

  // ── Coils: polarity = same pole as the train magnet directly above (→ repulsion = 부상)
  //          ahead of train: continues N-S-N-S pattern  → first coil ahead is opposite
  //          of the last train magnet (S) → N → attracts S-leading-magnet → 추진
  for(let i=0;i<nC;i++){
    const cx=iX+cStep*(i+0.5);
    const cX=cx-cW/2;
    const cY=trackY+3;
    const dist=cx-tX;            // distance from left edge of train (>0 inside/ahead)

    let pole=null, alpha=0, isUnder=false;

    if(dist>=0 && dist<tW){
      // Under the train: pole = same as train magnet directly above
      const mIdx=Math.min(nMag-1,Math.floor(dist/magPitch));
      pole=mIdx%2===0?'N':'S';  // N,S,N,S from left
      alpha=0.85;
      isUnder=true;
    } else if(dist>=tW && dist<tW+magPitch*2.2){
      // Just ahead: continue the N-S-N-S pattern
      // (last train magnet idx=3 is S; so first coil ahead = N, then S, ...)
      const aIdx=Math.floor((dist-tW)/magPitch);
      pole=aIdx%2===0?'N':'S';
      alpha=0.72-(dist-tW)/(magPitch*2.2)*0.40;
    } else {
      ctx.fillStyle='rgba(203,213,225,0.25)';
      rrect(cX,cY,cW,cH,3);
      ctx.fill();
      continue;
    }

    const isN=pole==='N';
    ctx.shadowColor=isN?'rgba(239,68,68,0.22)':'rgba(37,99,235,0.22)';
    ctx.shadowBlur=alpha>0.55?5:0;
    ctx.fillStyle=isN?`rgba(239,68,68,${Math.max(0.22,alpha)})`:`rgba(37,99,235,${Math.max(0.22,alpha)})`;
    rrect(cX,cY,cW,cH,3);
    ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff';
    ctx.font='bold 8px sans-serif';
    ctx.textAlign='center';
    ctx.fillText(pole,cx,cY+8.5);

    // Levitation arrows (under-train coils only): same-pole repulsion → upward
    if(isUnder){
      // Find the centre of the matching train magnet for this coil
      const mIdx=Math.min(nMag-1,Math.floor((cx-tX)/magPitch));
      const mCX=tX+(mIdx+0.5)*magPitch;
      arrowLine(mCX,cY-1,mCX,tY+tH+magBarH+2,`rgba(22,163,74,0.62)`,1.5,5);
    }
  }

  // Propulsion arrow: leading S-magnet attracted to N-coil just ahead
  for(let i=0;i<nC;i++){
    const cx=iX+cStep*(i+0.5);
    const dist=cx-tX;
    if(dist>=tW && dist<tW+magPitch*1.5){
      const aEnd=cx-cW/2-3;
      const aStart=tX+tW+2;
      if(aEnd>aStart+10){
        arrowLine(aStart,tY+tH*0.5+magBarH*0.4,aEnd,tY+tH*0.5+magBarH*0.4,
                  'rgba(245,158,11,0.88)',2.0,7);
        ctx.fillStyle='rgba(146,64,14,0.85)';
        ctx.font='bold 8px Pretendard,sans-serif';
        ctx.textAlign='center';
        ctx.fillText('S↔N 흡인 → 추진',(aStart+aEnd)/2,tY+tH*0.22);
      }
      break;
    }
  }

  // ── Train body ──
  ctx.fillStyle='rgba(219,234,254,0.94)';
  ctx.shadowColor='rgba(37,99,235,0.18)';
  ctx.shadowBlur=8;
  rrect(tX,tY,tW,tH,5);
  ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(37,99,235,0.40)';
  ctx.lineWidth=1.5;
  ctx.stroke();

  // N-S-N-S magnet bars at bottom of train (face down toward track)
  for(let i=0;i<nMag;i++){
    const isN=i%2===0;
    const mX=tX+i*magPitch+1.5;
    const mW=magPitch-3;
    ctx.fillStyle=isN?'rgba(220,38,38,0.86)':'rgba(37,99,235,0.86)';
    ctx.shadowBlur=0;
    rrect(mX,tY+tH,mW,magBarH,3);
    ctx.fill();
    ctx.strokeStyle=isN?'rgba(185,28,28,0.28)':'rgba(30,64,175,0.28)';
    ctx.lineWidth=1;
    ctx.stroke();
    ctx.fillStyle='#fff';
    ctx.font='bold 8px sans-serif';
    ctx.textAlign='center';
    ctx.fillText(isN?'N':'S',mX+mW/2,tY+tH+magBarH-2);
  }

  // Direction arrow to the right of train
  const arE=Math.min(tX+tW+28,iX+iW-4);
  if(arE>tX+tW+10){
    arrowLine(tX+tW+2,tY+tH*0.38,arE,tY+tH*0.38,'rgba(245,158,11,0.90)',2.2,7);
    ctx.fillStyle='rgba(146,64,14,0.88)';
    ctx.font='bold 8px Pretendard,sans-serif';
    ctx.textAlign='center';
    ctx.fillText('진행',(tX+tW+2+arE)/2,tY+tH*0.18);
  }

  // ── Labels (outside clip) ──
  ctx.restore();
  ctx.save();
  ctx.font='8.5px Pretendard,sans-serif';
  ctx.textAlign='center';
  ctx.fillStyle='rgba(22,101,52,0.85)';
  ctx.fillText('같은 극 반발 ↑ (부상)',x+w*0.30,trackY-8);
  ctx.fillStyle='rgba(146,64,14,0.85)';
  ctx.fillText('반대 극 흡인 → (추진)',x+w*0.73,trackY-8);
  ctx.fillStyle='rgba(51,65,85,0.72)';
  ctx.fillText('선로 코일 (N-S-N-S)',x+w*0.50,trackY+trackH+16);

  // Mini legend
  const ly=y+h-10;
  ctx.fillStyle='rgba(239,68,68,0.75)'; ctx.fillRect(iX+2,ly-7,8,8);
  ctx.fillStyle='rgba(51,65,85,0.70)'; ctx.font='7.5px Pretendard,sans-serif'; ctx.textAlign='left';
  ctx.fillText('N극',iX+13,ly);
  ctx.fillStyle='rgba(37,99,235,0.75)'; ctx.fillRect(iX+30,ly-7,8,8);
  ctx.fillText('S극  |  차체·선로 모두 N-S-N-S 교번',iX+41,ly);

  ctx.restore();
}

function drawSpeakerRealistic(W,H){
  const st=appStage(W,H);
  drawAppTitle('실제 스피커 구조','진동판이 앞뒤로 움직이며 공기를 밀고 당겨 소리를 만듭니다',W);

  const compact=st.w<520;
  const cx=compact?st.cx:st.x+st.w*0.38;
  const cy=H*0.52;
  const R=Math.min(st.w*(compact?0.34:0.25),H*0.31,150);
  const pulse=Math.sin(ph*3.2);
  const conePulse=1+pulse*0.018;

  ctx.save();
  ctx.shadowColor='rgba(15,23,42,0.22)';
  ctx.shadowBlur=24;
  const frameGrad=ctx.createRadialGradient(cx-R*.2,cy-R*.28,R*.18,cx,cy,R*1.08);
  frameGrad.addColorStop(0,'#f8fafc');
  frameGrad.addColorStop(0.38,'#94a3b8');
  frameGrad.addColorStop(0.72,'#334155');
  frameGrad.addColorStop(1,'#0f172a');
  ctx.fillStyle=frameGrad;
  ctx.beginPath();
  ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.fill();
  ctx.shadowBlur=0;

  ctx.strokeStyle='rgba(255,255,255,0.65)';
  ctx.lineWidth=Math.max(2,R*0.018);
  ctx.beginPath();
  ctx.arc(cx,cy,R*.94,0,Math.PI*2);
  ctx.stroke();

  for(let i=0;i<6;i++){
    const a=i*Math.PI/3+Math.PI/6;
    const sx=cx+Math.cos(a)*R*.84;
    const sy=cy+Math.sin(a)*R*.84;
    ctx.fillStyle='rgba(226,232,240,0.92)';
    ctx.beginPath();
    ctx.arc(sx,sy,R*.055,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='rgba(51,65,85,0.78)';
    ctx.beginPath();
    ctx.arc(sx,sy,R*.025,0,Math.PI*2);
    ctx.fill();
  }

  ctx.fillStyle='#111827';
  ctx.beginPath();
  ctx.arc(cx,cy,R*.77,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='rgba(15,23,42,0.55)';
  ctx.lineWidth=R*.09;
  ctx.beginPath();
  ctx.arc(cx,cy,R*.68,0,Math.PI*2);
  ctx.stroke();

  const coneGrad=ctx.createRadialGradient(cx-R*.18,cy-R*.2,R*.06,cx,cy,R*.65);
  coneGrad.addColorStop(0,'#dbeafe');
  coneGrad.addColorStop(0.22,'#64748b');
  coneGrad.addColorStop(0.62,'#1e293b');
  coneGrad.addColorStop(1,'#020617');
  ctx.fillStyle=coneGrad;
  ctx.beginPath();
  ctx.ellipse(cx,cy,R*.53*conePulse,R*.53*conePulse,0,0,Math.PI*2);
  ctx.fill();

  for(let i=0;i<8;i++){
    const a=i*Math.PI/4+ph*.08;
    ctx.strokeStyle='rgba(255,255,255,0.10)';
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*R*.18,cy+Math.sin(a)*R*.18);
    ctx.lineTo(cx+Math.cos(a)*R*.50,cy+Math.sin(a)*R*.50);
    ctx.stroke();
  }

  const capGrad=ctx.createRadialGradient(cx-R*.08,cy-R*.10,R*.02,cx,cy,R*.22);
  capGrad.addColorStop(0,'#e2e8f0');
  capGrad.addColorStop(0.55,'#475569');
  capGrad.addColorStop(1,'#0f172a');
  ctx.fillStyle=capGrad;
  ctx.beginPath();
  ctx.arc(cx,cy,R*.22*(1+pulse*.025),0,Math.PI*2);
  ctx.fill();

  const waveX=cx+R+24;
  for(let i=0;i<4;i++){
    const alpha=0.46-i*.08;
    ctx.strokeStyle=`rgba(37,99,235,${alpha})`;
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.arc(waveX+i*18+Math.abs(pulse)*5,cy,R*.28+i*R*.12,-Math.PI*.42,Math.PI*.42);
    ctx.stroke();
  }

  if(!compact){
    const sx=st.x+st.w*0.72;
    const sy=cy;
    const coneX=sx-58+pulse*5;
    ctx.fillStyle='rgba(255,255,255,0.72)';
    ctx.strokeStyle='rgba(37,99,235,0.16)';
    ctx.lineWidth=1;
    rrect(sx-105,sy-R*.58,210,R*1.16,10);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle='rgba(148,163,184,0.26)';
    ctx.strokeStyle='rgba(71,85,105,0.55)';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(coneX,sy-R*.38);
    ctx.lineTo(coneX+92,sy-R*.08);
    ctx.lineTo(coneX+92,sy+R*.08);
    ctx.lineTo(coneX,sy+R*.38);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    ctx.strokeStyle='#f59e0b';
    ctx.lineWidth=4;
    ctx.beginPath();
    ctx.rect(coneX-16,sy-R*.22,18,R*.44);
    ctx.stroke();

    ctx.fillStyle='#334155';
    rrect(sx-105,sy-R*.30,42,R*.60,8);
    ctx.fill();
    ctx.fillStyle='#ef4444';
    rrect(sx-102,sy-R*.24,16,R*.48,5);
    ctx.fill();
    ctx.fillStyle='#2563eb';
    rrect(sx-83,sy-R*.24,16,R*.48,5);
    ctx.fill();

    arrowLine(coneX-4,sy,coneX-4+pulse*34,sy,'rgba(245,158,11,0.85)',2.2,7);

    ctx.fillStyle='#334155';
    ctx.font='bold 11px Pretendard,sans-serif';
    ctx.textAlign='center';
    ctx.fillText('보이스 코일',coneX-7,sy+R*.36);
    ctx.fillText('영구자석',sx-84,sy+R*.42);
    ctx.fillText('진동판',coneX+62,sy-R*.42);
  }

  ctx.fillStyle='rgba(51,65,85,0.9)';
  ctx.font='bold 12px Pretendard,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('실제 스피커 유닛',cx,cy+R+24);

  const panelW=compact?Math.min(st.w-36,380):Math.min(st.w*.40,330);
  const panelH=compact?128:152;
  const panelX=compact?st.x+(st.w-panelW)/2:st.x+st.w*.58;
  const panelY=compact?Math.max(58,Math.min(H-panelH-16,cy+R+36)):68;
  drawSpeakerPrinciplePanel(panelX,panelY,panelW,panelH,pulse);
  ctx.restore();
}

function drawMaglevRealistic(W,H){
  const st=appStage(W,H);
  drawAppTitle('실제 자기부상열차 구조','차체 아래 자석과 선로 코일 사이의 힘으로 떠서 움직입니다',W);

  const trainW=Math.min(st.w*.82,620);
  const trainH=Math.min(H*.17,92);
  const trainX=st.cx-trainW/2;
  const guideY=H*.66;
  const lift=16+Math.sin(ph*.9)*2.2;
  const trainY=guideY-trainH-lift;
  const nose=trainW*.22;

  ctx.save();
  ctx.fillStyle='rgba(203,213,225,0.38)';
  for(let i=0;i<7;i++){
    const bx=st.x+i*(st.w/6);
    const bh=20+(i%3)*14;
    ctx.fillRect(bx,H*.73-bh,36,bh);
  }

  ctx.shadowColor='rgba(15,23,42,0.18)';
  ctx.shadowBlur=16;
  ctx.fillStyle='rgba(100,116,139,0.72)';
  rrect(st.x+st.w*.06,guideY,st.w*.88,22,4);
  ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(226,232,240,0.96)';
  rrect(st.x+st.w*.09,guideY+22,st.w*.82,34,6);
  ctx.fill();
  ctx.strokeStyle='rgba(100,116,139,0.42)';
  ctx.stroke();

  // Coil polarity shifts with time to show the traveling wave (LSM principle)
  const coilCount=12;
  const wavePhase=Math.floor(ph*3);
  for(let i=0;i<coilCount;i++){
    const x=st.x+st.w*.13+i*(st.w*.74/(coilCount-1));
    // Two-pole traveling wave: N-N-S-S repeating, shifted by wavePhase
    const pat=(i+wavePhase)%4;
    const isN=pat<2;
    ctx.fillStyle=isN?'rgba(239,68,68,0.38)':'rgba(37,99,235,0.38)';
    rrect(x-10,guideY+5,20,12,3);
    ctx.fill();
    ctx.fillStyle=isN?'rgba(127,29,29,0.70)':'rgba(30,64,175,0.70)';
    ctx.font='bold 7px sans-serif';
    ctx.textAlign='center';
    ctx.fillText(isN?'N':'S',x,guideY+14);
  }

  for(let i=0;i<6;i++){
    const x=trainX+trainW*.18+i*(trainW*.58/5);
    arrowLine(x,guideY-3,x,guideY-lift+4,'rgba(22,163,74,0.55)',1.8,6);
  }

  const trainGrad=ctx.createLinearGradient(0,trainY,0,trainY+trainH);
  trainGrad.addColorStop(0,'#ffffff');
  trainGrad.addColorStop(0.45,'#dbeafe');
  trainGrad.addColorStop(1,'#60a5fa');
  ctx.fillStyle=trainGrad;
  ctx.shadowColor='rgba(37,99,235,0.22)';
  ctx.shadowBlur=20;
  ctx.beginPath();
  ctx.moveTo(trainX+18,trainY+trainH*.88);
  ctx.quadraticCurveTo(trainX+trainW*.10,trainY+trainH*.12,trainX+nose,trainY+trainH*.08);
  ctx.lineTo(trainX+trainW*.84,trainY+trainH*.08);
  ctx.quadraticCurveTo(trainX+trainW*.98,trainY+trainH*.12,trainX+trainW+18,trainY+trainH*.48);
  ctx.quadraticCurveTo(trainX+trainW*.93,trainY+trainH*.90,trainX+trainW*.78,trainY+trainH*.94);
  ctx.lineTo(trainX+34,trainY+trainH*.94);
  ctx.quadraticCurveTo(trainX+10,trainY+trainH*.94,trainX+18,trainY+trainH*.88);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(37,99,235,0.38)';
  ctx.lineWidth=1.5;
  ctx.stroke();

  ctx.strokeStyle='#2563eb';
  ctx.lineWidth=4;
  ctx.beginPath();
  ctx.moveTo(trainX+nose*.55,trainY+trainH*.62);
  ctx.lineTo(trainX+trainW*.86,trainY+trainH*.62);
  ctx.stroke();
  ctx.strokeStyle='#ef4444';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(trainX+nose*.62,trainY+trainH*.70);
  ctx.lineTo(trainX+trainW*.82,trainY+trainH*.70);
  ctx.stroke();

  ctx.fillStyle='rgba(15,23,42,0.72)';
  for(let i=0;i<7;i++){
    const x=trainX+nose+i*(trainW*.50/6);
    rrect(x,trainY+trainH*.22,trainW*.055,trainH*.22,6);
    ctx.fill();
  }
  ctx.fillStyle='rgba(15,23,42,0.64)';
  rrect(trainX+trainW*.82,trainY+trainH*.24,trainW*.06,trainH*.20,6);
  ctx.fill();

  ctx.strokeStyle='rgba(14,165,233,0.72)';
  ctx.lineWidth=3;
  for(let i=0;i<4;i++){
    const x=trainX+trainW*.22+i*(trainW*.14);
    ctx.beginPath();
    ctx.rect(x,trainY+trainH*.84,trainW*.085,8);
    ctx.stroke();
  }

  ctx.strokeStyle='rgba(22,163,74,0.72)';
  ctx.setLineDash([5,5]);
  ctx.lineWidth=1.4;
  ctx.beginPath();
  ctx.moveTo(trainX+trainW+26,trainY+trainH);
  ctx.lineTo(trainX+trainW+26,guideY);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(22,101,52,0.88)';
  ctx.font='bold 11px Pretendard,sans-serif';
  ctx.textAlign='left';
  ctx.fillText('부상 간격',trainX+trainW+34,(trainY+trainH+guideY)/2+4);

  arrowLine(trainX+trainW*.08,trainY+trainH*.38,trainX+trainW*.22,trainY+trainH*.38,'rgba(245,158,11,0.78)',2.4,8);
  ctx.fillStyle='rgba(146,64,14,0.92)';
  ctx.font='bold 11px Pretendard,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('추진',trainX+trainW*.15,trainY+trainH*.25);

  ctx.fillStyle='rgba(51,65,85,0.9)';
  ctx.font='bold 12px Pretendard,sans-serif';
  ctx.fillText('가이드웨이 코일',st.cx,guideY+75);

  const panelW=st.w<560?st.w-36:Math.min(st.w*.58,430);
  const panelH=st.w<560?132:148;
  const panelX=st.w<560?st.x+18:st.x+st.w*.08;
  const panelY=62;
  drawMaglevPrinciplePanel(panelX,panelY,panelW,panelH);
  ctx.restore();
}

function drawSpeakerCutaway(W,H){
  const st=appStage(W,H);
  drawAppTitle('스피커 단면과 작동 원리','보이스 코일이 자기장 속에서 힘을 받아 진동판을 앞뒤로 움직입니다',W);

  const compact=st.w<560;
  const s=Math.max(0.72,Math.min(1.08,st.w/720,H/560));
  const cy=H*.55;
  const backX=st.x+st.w*(compact?0.20:0.24);
  const rimX=st.x+st.w*(compact?0.68:0.62);
  const rimH=132*s;
  const rimW=24*s;
  const throatX=backX+132*s+Math.sin(ph*3.2)*8*s;
  const throatH=40*s;
  const pulse=Math.sin(ph*3.2);

  ctx.save();

  // Speaker basket and front rim
  ctx.strokeStyle='rgba(51,65,85,0.58)';
  ctx.lineWidth=5*s;
  ctx.lineCap='round';
  [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(([a,b])=>{
    ctx.beginPath();
    ctx.moveTo(backX+74*s,cy+b*32*s);
    ctx.lineTo(rimX-rimW*.45,cy+a*rimH*.42);
    ctx.stroke();
  });

  ctx.shadowColor='rgba(15,23,42,0.18)';
  ctx.shadowBlur=18;
  const coneGrad=ctx.createLinearGradient(throatX,cy-rimH/2,rimX,cy+rimH/2);
  coneGrad.addColorStop(0,'#475569');
  coneGrad.addColorStop(0.42,'#cbd5e1');
  coneGrad.addColorStop(1,'#eff6ff');
  ctx.fillStyle=coneGrad;
  ctx.strokeStyle='rgba(51,65,85,0.64)';
  ctx.lineWidth=2*s;
  ctx.beginPath();
  ctx.moveTo(throatX,cy-throatH/2);
  ctx.lineTo(rimX,cy-rimH/2);
  ctx.quadraticCurveTo(rimX+rimW*.45,cy,rimX,cy+rimH/2);
  ctx.lineTo(throatX,cy+throatH/2);
  ctx.quadraticCurveTo(throatX+16*s,cy,throatX,cy-throatH/2);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur=0;
  ctx.stroke();

  ctx.strokeStyle='rgba(15,23,42,0.48)';
  ctx.lineWidth=11*s;
  ctx.beginPath();
  ctx.ellipse(rimX,cy,rimW,rimH/2,0,0,Math.PI*2);
  ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.70)';
  ctx.lineWidth=3*s;
  ctx.beginPath();
  ctx.ellipse(rimX,cy,rimW*.56,rimH*.36,0,0,Math.PI*2);
  ctx.stroke();

  // Dust cap / cone center
  ctx.fillStyle='rgba(30,41,59,0.72)';
  ctx.beginPath();
  ctx.ellipse(throatX+34*s,cy,24*s,31*s,0,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.28)';
  ctx.lineWidth=1.5*s;
  ctx.stroke();

  // Magnet assembly and pole gap
  ctx.fillStyle='#334155';
  rrect(backX-32*s,cy-58*s,86*s,116*s,8*s);
  ctx.fill();
  ctx.fillStyle='#ef4444';
  rrect(backX-25*s,cy-46*s,24*s,92*s,5*s);
  ctx.fill();
  ctx.fillStyle='#2563eb';
  rrect(backX+24*s,cy-46*s,24*s,92*s,5*s);
  ctx.fill();
  ctx.fillStyle='#fff';
  ctx.font=`bold ${12*s}px sans-serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('N',backX-13*s,cy);
  ctx.fillText('S',backX+36*s,cy);
  ctx.textBaseline='alphabetic';

  // Voice coil
  const coilX=throatX-12*s;
  ctx.strokeStyle='#f59e0b';
  ctx.lineWidth=5*s;
  ctx.beginPath();
  ctx.rect(coilX-13*s,cy-34*s,24*s,68*s);
  ctx.stroke();
  for(let i=-1;i<=1;i++){
    arrowLine(backX+2*s,cy+i*20*s,backX+28*s,cy+i*20*s,'rgba(37,99,235,0.52)',1.4*s,5*s);
  }

  // Signal wire and force
  ctx.strokeStyle='rgba(37,99,235,0.82)';
  ctx.lineWidth=1.8*s;
  ctx.beginPath();
  const wireStartX=st.x+24*s;
  const wireY=cy+92*s;
  for(let i=0;i<70;i++){
    const t=i/69;
    const x=wireStartX+t*(coilX-wireStartX);
    const y=wireY+Math.sin(t*Math.PI*6+ph*3.2)*9*s;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();
  arrowLine(coilX+22*s,cy,coilX+22*s+pulse*54*s,cy,'rgba(245,158,11,0.9)',2.8*s,8*s);

  // Sound waves from moving cone
  for(let i=0;i<4;i++){
    const alpha=0.46-i*.08;
    ctx.strokeStyle=`rgba(37,99,235,${alpha})`;
    ctx.lineWidth=2*s;
    ctx.beginPath();
    ctx.ellipse(rimX+42*s+i*30*s+Math.abs(pulse)*6*s,cy,12*s+i*15*s,42*s+i*15*s,0,-Math.PI*.45,Math.PI*.45);
    ctx.stroke();
  }

  // Labels
  ctx.fillStyle='rgba(51,65,85,0.95)';
  ctx.font=`bold ${11*s}px Pretendard,sans-serif`;
  ctx.textAlign='center';
  ctx.fillText('영구자석',backX+10*s,cy-70*s);
  ctx.fillText('보이스 코일',coilX,cy+54*s);
  ctx.fillText('진동판',rimX-66*s,cy-rimH*.45);
  ctx.fillText('공기 진동',rimX+124*s,cy-rimH*.44);
  ctx.fillStyle='rgba(37,99,235,0.92)';
  ctx.fillText('자기장 B',backX+16*s,cy-55*s);
  ctx.fillStyle='rgba(37,99,235,0.92)';
  ctx.fillText('음성 전류 I',wireStartX+55*s,wireY+28*s);
  ctx.fillStyle='rgba(146,64,14,0.95)';
  ctx.fillText('힘 F = BIL',coilX+Math.sign(pulse||1)*42*s,cy-15*s);

  const panelW=compact?Math.min(st.w-30,420):Math.min(360,st.w*.34);
  const panelH=compact?112:130;
  const panelX=compact?st.x+(st.w-panelW)/2:st.x+st.w-panelW-18;
  const panelY=compact?H-panelH-16:72;
  drawSpeakerPrinciplePanel(panelX,panelY,panelW,panelH,pulse);

  ctx.restore();
}

function drawSpeakerSectionClean(W,H){
  const st=appStage(W,H);
  drawAppTitle('스피커 단면 원리','자기장 속 보이스 코일이 힘을 받아 진동판을 앞뒤로 움직입니다',W);

  const compact=st.w<590;
  const s=Math.max(0.76,Math.min(1.08,st.w/760,H/560));
  const cy=H*.56;
  const motorX=st.x+st.w*(compact?0.22:0.24);
  const rimX=st.x+st.w*(compact?0.66:0.61);
  const pulse=Math.sin(ph*3.2);
  const motion=pulse*9*s;
  const coilX=motorX+112*s+motion;
  const coneThroat=coilX+15*s;
  const rimRx=22*s;
  const rimRy=105*s;

  ctx.save();

  // Back magnet motor: steel yoke, permanent magnet, pole piece.
  ctx.shadowColor='rgba(15,23,42,0.18)';
  ctx.shadowBlur=18;
  ctx.fillStyle='#334155';
  rrect(motorX-52*s,cy-78*s,104*s,156*s,12*s);
  ctx.fill();
  ctx.shadowBlur=0;

  ctx.fillStyle='#475569';
  rrect(motorX-35*s,cy-54*s,70*s,108*s,8*s);
  ctx.fill();
  ctx.fillStyle='#ef4444';
  rrect(motorX-28*s,cy-46*s,25*s,92*s,5*s);
  ctx.fill();
  ctx.fillStyle='#2563eb';
  rrect(motorX+4*s,cy-46*s,25*s,92*s,5*s);
  ctx.fill();
  ctx.fillStyle='#e2e8f0';
  rrect(motorX+39*s,cy-30*s,56*s,60*s,8*s);
  ctx.fill();
  ctx.fillStyle='#64748b';
  rrect(motorX+83*s,cy-19*s,34*s,38*s,5*s);
  ctx.fill();

  ctx.fillStyle='#fff';
  ctx.font=`bold ${12*s}px sans-serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('N',motorX-15*s,cy);
  ctx.fillText('S',motorX+17*s,cy);
  ctx.textBaseline='alphabetic';

  // Basket frame.
  ctx.strokeStyle='rgba(71,85,105,0.54)';
  ctx.lineWidth=5*s;
  ctx.lineCap='round';
  [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(([side,dy])=>{
    ctx.beginPath();
    ctx.moveTo(motorX+70*s,cy+dy*42*s);
    ctx.lineTo(rimX-rimRx*.6,cy+side*rimRy*.78);
    ctx.stroke();
  });

  // Cone and surround.
  const coneGrad=ctx.createLinearGradient(coneThroat,cy-rimRy,rimX,cy+rimRy);
  coneGrad.addColorStop(0,'#475569');
  coneGrad.addColorStop(0.48,'#cbd5e1');
  coneGrad.addColorStop(1,'#f8fafc');
  ctx.fillStyle=coneGrad;
  ctx.strokeStyle='rgba(51,65,85,0.58)';
  ctx.lineWidth=2*s;
  ctx.beginPath();
  ctx.moveTo(coneThroat,cy-30*s);
  ctx.quadraticCurveTo(rimX-120*s,cy-82*s,rimX,cy-rimRy);
  ctx.quadraticCurveTo(rimX+rimRx*.85,cy,rimX,cy+rimRy);
  ctx.quadraticCurveTo(rimX-120*s,cy+82*s,coneThroat,cy+30*s);
  ctx.quadraticCurveTo(coneThroat+12*s,cy,coneThroat,cy-30*s);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.strokeStyle='rgba(15,23,42,0.62)';
  ctx.lineWidth=13*s;
  ctx.beginPath();
  ctx.ellipse(rimX,cy,rimRx,rimRy,0,0,Math.PI*2);
  ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.76)';
  ctx.lineWidth=3*s;
  ctx.beginPath();
  ctx.ellipse(rimX,cy,rimRx*.45,rimRy*.78,0,0,Math.PI*2);
  ctx.stroke();

  // Dust cap and voice coil former.
  ctx.fillStyle='rgba(30,41,59,0.78)';
  ctx.beginPath();
  ctx.ellipse(coneThroat+38*s,cy,25*s,35*s,0,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.26)';
  ctx.lineWidth=1.4*s;
  ctx.stroke();

  ctx.fillStyle='rgba(226,232,240,0.86)';
  rrect(coilX-7*s,cy-43*s,14*s,86*s,5*s);
  ctx.fill();
  ctx.strokeStyle='#f59e0b';
  ctx.lineWidth=5*s;
  ctx.beginPath();
  ctx.rect(coilX-16*s,cy-35*s,28*s,70*s);
  ctx.stroke();

  // B field and force on coil.
  for(let i=-1;i<=1;i++){
    arrowLine(motorX+34*s,cy+i*22*s,motorX+83*s,cy+i*22*s,'rgba(37,99,235,0.50)',1.5*s,5*s);
  }
  arrowLine(coilX+20*s,cy,coilX+20*s+pulse*54*s,cy,'rgba(245,158,11,0.90)',2.7*s,8*s);

  // AC signal wire.
  const wireStartX=st.x+28*s;
  const wireY=cy+105*s;
  ctx.strokeStyle='rgba(37,99,235,0.85)';
  ctx.lineWidth=1.8*s;
  ctx.beginPath();
  for(let i=0;i<76;i++){
    const t=i/75;
    const x=wireStartX+t*(coilX-wireStartX);
    const y=wireY+Math.sin(t*Math.PI*6+ph*3.2)*8*s;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();

  // Sound waves.
  for(let i=0;i<4;i++){
    ctx.strokeStyle=`rgba(37,99,235,${0.48-i*.08})`;
    ctx.lineWidth=2*s;
    ctx.beginPath();
    ctx.ellipse(rimX+52*s+i*31*s+Math.abs(pulse)*5*s,cy,11*s+i*15*s,44*s+i*16*s,0,-Math.PI*.42,Math.PI*.42);
    ctx.stroke();
  }

  // Labels kept close to the actual parts.
  ctx.fillStyle='rgba(51,65,85,0.96)';
  ctx.font=`bold ${11*s}px Pretendard,sans-serif`;
  ctx.textAlign='center';
  ctx.fillText('영구자석',motorX,cy-92*s);
  ctx.fillText('보이스 코일',coilX,cy+57*s);
  ctx.fillText('진동판',rimX-78*s,cy-rimRy*.58);
  ctx.fillText('소리',rimX+128*s,cy-rimRy*.50);
  ctx.fillStyle='rgba(37,99,235,0.92)';
  ctx.fillText('자기장 B',motorX+64*s,cy-42*s);
  ctx.fillText('교류 전류 I',wireStartX+66*s,wireY+28*s);
  ctx.fillStyle='rgba(146,64,14,0.95)';
  ctx.fillText('힘 F = BIL',coilX+Math.sign(pulse||1)*44*s,cy-17*s);

  // A small, clean sequence strip for the principle.
  const stripW=Math.min(st.w-30,compact?430:520);
  const stripH=48*s;
  const stripX=st.x+(st.w-stripW)/2;
  const stripY=H-stripH-18;
  ctx.fillStyle='rgba(255,255,255,0.78)';
  ctx.strokeStyle='rgba(37,99,235,0.14)';
  ctx.lineWidth=1;
  rrect(stripX,stripY,stripW,stripH,9*s);
  ctx.fill();
  ctx.stroke();
  const steps=['전류 I','자기장 B','코일 힘 F','진동판','소리'];
  steps.forEach((txt,i)=>{
    const x=stripX+stripW*(0.10+i*0.20);
    ctx.fillStyle=i===2?'#d97706':'#334155';
    ctx.font=`bold ${10*s}px Pretendard,sans-serif`;
    ctx.fillText(txt,x,stripY+stripH*.58);
    if(i<steps.length-1) arrowLine(x+32*s,stripY+stripH*.50,x+stripW*.15,stripY+stripH*.50,'rgba(37,99,235,0.38)',1.2*s,4*s);
  });

  ctx.restore();
}

function drawSpeakerDriver(cx,cy,r,pulse){
  ctx.save();
  ctx.shadowColor='rgba(2,6,23,0.28)';
  ctx.shadowBlur=18;
  const outer=ctx.createRadialGradient(cx-r*.22,cy-r*.28,r*.08,cx,cy,r);
  outer.addColorStop(0,'#f8fafc');
  outer.addColorStop(0.30,'#64748b');
  outer.addColorStop(0.72,'#1e293b');
  outer.addColorStop(1,'#020617');
  ctx.fillStyle=outer;
  ctx.beginPath();
  ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fill();
  ctx.shadowBlur=0;

  ctx.strokeStyle='rgba(255,255,255,0.60)';
  ctx.lineWidth=Math.max(2,r*.025);
  ctx.beginPath();
  ctx.arc(cx,cy,r*.90,0,Math.PI*2);
  ctx.stroke();

  ctx.strokeStyle='rgba(15,23,42,0.92)';
  ctx.lineWidth=r*.12;
  ctx.beginPath();
  ctx.arc(cx,cy,r*.72,0,Math.PI*2);
  ctx.stroke();

  const coneScale=1+pulse*.018;
  const cone=ctx.createRadialGradient(cx-r*.18,cy-r*.18,r*.04,cx,cy,r*.60);
  cone.addColorStop(0,'#e2e8f0');
  cone.addColorStop(0.30,'#64748b');
  cone.addColorStop(0.70,'#1e293b');
  cone.addColorStop(1,'#020617');
  ctx.fillStyle=cone;
  ctx.beginPath();
  ctx.arc(cx,cy,r*.58*coneScale,0,Math.PI*2);
  ctx.fill();

  for(let i=0;i<10;i++){
    const a=i*Math.PI*2/10+ph*.05;
    ctx.strokeStyle='rgba(255,255,255,0.08)';
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*r*.20,cy+Math.sin(a)*r*.20);
    ctx.lineTo(cx+Math.cos(a)*r*.54,cy+Math.sin(a)*r*.54);
    ctx.stroke();
  }

  const cap=ctx.createRadialGradient(cx-r*.07,cy-r*.08,r*.02,cx,cy,r*.23);
  cap.addColorStop(0,'#f8fafc');
  cap.addColorStop(0.52,'#64748b');
  cap.addColorStop(1,'#0f172a');
  ctx.fillStyle=cap;
  ctx.beginPath();
  ctx.arc(cx,cy,r*.23*(1+pulse*.025),0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle='rgba(226,232,240,0.95)';
  for(let i=0;i<4;i++){
    const a=Math.PI/4+i*Math.PI/2;
    const sx=cx+Math.cos(a)*r*.82;
    const sy=cy+Math.sin(a)*r*.82;
    ctx.beginPath();
    ctx.arc(sx,sy,r*.045,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='rgba(51,65,85,0.8)';
    ctx.beginPath();
    ctx.arc(sx,sy,r*.019,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='rgba(226,232,240,0.95)';
  }
  ctx.restore();
}

function drawSpeakerMechanismPanel(x,y,w,h,pulse){
  ctx.save();
  ctx.fillStyle='rgba(255,255,255,0.86)';
  ctx.strokeStyle='rgba(37,99,235,0.16)';
  ctx.lineWidth=1;
  ctx.shadowColor='rgba(30,64,175,0.12)';
  ctx.shadowBlur=16;
  rrect(x,y,w,h,12);
  ctx.fill();
  ctx.shadowBlur=0;
  ctx.stroke();

  ctx.fillStyle='#172f4a';
  ctx.font='bold 13px Pretendard,sans-serif';
  ctx.textAlign='left';
  ctx.fillText('원리 단면',x+14,y+23);

  const cy=y+h*.52;
  const magnetX=x+w*.20;
  const coilX=x+w*.39+pulse*5;
  const coneX=x+w*.52+pulse*7;
  const rimX=x+w*.75+pulse*8;
  const rimRy=Math.min(58,h*.28);

  ctx.fillStyle='#334155';
  rrect(magnetX-38,cy-56,72,112,8);
  ctx.fill();
  ctx.fillStyle='#ef4444';
  rrect(magnetX-30,cy-44,22,88,5);
  ctx.fill();
  ctx.fillStyle='#2563eb';
  rrect(magnetX+8,cy-44,22,88,5);
  ctx.fill();
  ctx.fillStyle='#fff';
  ctx.font='bold 11px sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('N',magnetX-19,cy);
  ctx.fillText('S',magnetX+19,cy);
  ctx.textBaseline='alphabetic';

  for(let i=-1;i<=1;i++){
    const yy=cy+i*22;
    arrowLine(magnetX-5,yy,magnetX+32,yy,'rgba(37,99,235,0.50)',1.4,5);
  }
  ctx.fillStyle='#2563eb';
  ctx.font='10px Pretendard,sans-serif';
  ctx.fillText('자기장 B',magnetX+14,cy-64);

  drawVoiceCoilDetail(coilX,cy,0.92);
  ctx.fillStyle='#92400e';
  ctx.font='10px Pretendard,sans-serif';
  ctx.fillText('보이스 코일',coilX,cy+56);

  ctx.strokeStyle='rgba(37,99,235,0.85)';
  ctx.lineWidth=1.7;
  ctx.beginPath();
  for(let i=0;i<52;i++){
    const t=i/51;
    const px=x+15+t*(coilX-x-28);
    const py=y+h*.80+Math.sin(t*Math.PI*6+ph*3.2)*8;
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.stroke();
  ctx.fillStyle='#2563eb';
  ctx.font='10px Pretendard,sans-serif';
  ctx.textAlign='left';
  ctx.fillText('전류 I',x+16,y+h*.88);

  arrowLine(coilX+18,cy,coilX+18+Math.sign(pulse||1)*40,cy,'rgba(245,158,11,0.90)',2.4,7);
  ctx.fillStyle='#92400e';
  ctx.font='bold 10px Pretendard,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('힘 F',coilX+Math.sign(pulse||1)*34,cy-12);

  const coneGrad=ctx.createLinearGradient(coneX,cy-rimRy,rimX,cy+rimRy);
  coneGrad.addColorStop(0,'rgba(71,85,105,0.68)');
  coneGrad.addColorStop(0.55,'rgba(203,213,225,0.70)');
  coneGrad.addColorStop(1,'rgba(248,250,252,0.92)');
  ctx.fillStyle=coneGrad;
  ctx.strokeStyle='rgba(71,85,105,0.72)';
  ctx.lineWidth=1.8;
  ctx.beginPath();
  ctx.moveTo(coneX,cy-32);
  ctx.quadraticCurveTo(coneX+(rimX-coneX)*.46,cy-rimRy*.78,rimX,cy-rimRy);
  ctx.quadraticCurveTo(rimX+13,cy,rimX,cy+rimRy);
  ctx.quadraticCurveTo(coneX+(rimX-coneX)*.46,cy+rimRy*.78,coneX,cy+32);
  ctx.quadraticCurveTo(coneX+12,cy,coneX,cy-32);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.strokeStyle='rgba(15,23,42,0.48)';
  ctx.lineWidth=5;
  ctx.beginPath();
  ctx.ellipse(rimX,cy,10,rimRy,0,0,Math.PI*2);
  ctx.stroke();
  ctx.fillStyle='rgba(30,41,59,0.74)';
  ctx.beginPath();
  ctx.ellipse(coneX+24,cy,16,24,0,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#334155';
  ctx.font='10px Pretendard,sans-serif';
  ctx.fillText('진동판',rimX-24,cy+rimRy+18);

  for(let i=0;i<3;i++){
    ctx.strokeStyle=`rgba(37,99,235,${0.42-i*.08})`;
    ctx.lineWidth=1.6;
    ctx.beginPath();
    ctx.arc(rimX+22+i*17,cy,18+i*9,-Math.PI*.42,Math.PI*.42);
    ctx.stroke();
  }
  ctx.fillStyle='#2563eb';
  ctx.font='10px Pretendard,sans-serif';
  ctx.fillText('소리',x+w-26,cy-35);
  ctx.restore();
}

function drawVoiceCoilDetail(cx,cy,scale){

  grad.addColorStop(0,'#b45309');
  grad.addColorStop(0.28,'#f59e0b');
  grad.addColorStop(0.50,'#fde68a');
  grad.addColorStop(0.72,'#f59e0b');
  grad.addColorStop(1,'#92400e');
  ctx.strokeStyle=grad;
  ctx.lineWidth=3.4*scale;

  }

  ctx.strokeStyle='rgba(120,53,15,0.70)';
  ctx.lineWidth=1.1*scale;
  for(let i=0;i<9;i++){
    const xx=cx-32*scale+i*8*scale;
    ctx.beginPath();
    ctx.moveTo(xx,cy-17*scale);
    ctx.lineTo(xx+6*scale,cy+17*scale);
    ctx.stroke();
  }

  ctx.strokeStyle='rgba(255,247,237,0.70)';
  ctx.lineWidth=1.1*scale;
  ctx.beginPath();
  ctx.moveTo(cx-39*scale,cy-8*scale);
  ctx.lineTo(cx-39*scale,cy+8*scale);

  ctx.beginPath();
  ctx.moveTo(cx+39*scale,cy-8*scale);
  ctx.lineTo(cx+39*scale,cy+8*scale);
  ctx.stroke();
  ctx.restore();
}

function drawSpeakerPolished(W,H){
  const st=appStage(W,H);
  drawAppTitle('스피커 구조와 작동 원리','왼쪽은 원리 단면, 오른쪽은 실제 스피커 모습입니다',W);
  drawAppSurface(st,H);

  const compact=st.w<640;
  const pulse=Math.sin(ph*3.2);
  const cabH=Math.min(H*(compact?0.43:0.56),compact?230:330);
  const cabW=cabH*.62;
  const cabX=compact?st.cx-cabW/2:st.x+st.w*.75-cabW/2;
  const cabY=compact?74:H*.54-cabH/2+14;
  const r=Math.min(cabW*.34,cabH*.23);
  const wooferX=cabX+cabW/2;
  const wooferY=cabY+cabH*.64;
  const tweeterY=cabY+cabH*.26;

  ctx.save();
  ctx.shadowColor='rgba(15,23,42,0.24)';
  ctx.shadowBlur=22;
  const cabGrad=ctx.createLinearGradient(cabX,cabY,cabX,cabY+cabH);
  cabGrad.addColorStop(0,'#334155');
  cabGrad.addColorStop(0.46,'#172033');
  cabGrad.addColorStop(1,'#020617');
  ctx.fillStyle=cabGrad;
  rrect(cabX,cabY,cabW,cabH,18);
  ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(255,255,255,0.18)';
  ctx.lineWidth=2;
  ctx.stroke();

  ctx.fillStyle='rgba(15,23,42,0.50)';
  rrect(cabX+cabW*.09,cabY+cabH*.08,cabW*.82,cabH*.84,14);
  ctx.fill();

  drawSpeakerDriver(wooferX,wooferY,r*1.28,pulse);
  drawSpeakerDriver(wooferX,tweeterY,r*.55,-pulse*.7);

  ctx.fillStyle='rgba(226,232,240,0.86)';
  ctx.font='bold 12px Pretendard,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('스피커 유닛',wooferX,cabY+cabH+22);

  const waveX=cabX+cabW+18;
  for(let i=0;i<4;i++){
    ctx.strokeStyle=`rgba(37,99,235,${0.38-i*.07})`;
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.arc(waveX+i*20+Math.abs(pulse)*5,wooferY,36+i*16,-Math.PI*.36,Math.PI*.36);
    ctx.stroke();
  }

  const panelW=compact?Math.min(st.w-42,430):Math.min(st.w*.46,430);
  const panelH=compact?Math.min(170,H-cabY-cabH-58):Math.min(246,H*.50);
  const panelX=compact?st.x+(st.w-panelW)/2:st.x+34;
  const panelY=compact?Math.max(cabY+cabH+38,H-panelH-18):H*.54-panelH/2+14;
  drawSpeakerMechanismPanel(panelX,panelY,panelW,Math.max(146,panelH),pulse);

  ctx.restore();
}

function drawMaglevMoving(W,H){
  const st=appStage(W,H);
  drawAppTitle('움직이는 자기부상열차','선로 코일의 자기장이 차체를 띄우고 앞으로 밀어냅니다',W);
  drawAppSurface(st,H);

  const trainW=Math.min(st.w*.58,460);
  const trainH=Math.min(H*.15,86);
  const guideY=H*.72;
  const lift=18+Math.sin(ph*.9)*2.5;
  const travel=st.w+trainW*1.35;
  const trainX=st.x-trainW*.78+((ph*130)%travel);
  const trainY=guideY-trainH-lift;
  const nose=trainW*.22;
  const coilPhase=Math.floor(ph*5);

  ctx.save();
  ctx.beginPath();
  ctx.rect(st.x+18,64,st.w-36,H-98);
  ctx.clip();

  // Moving background posts make the train's motion easier to read.
  const bgOffset=(ph*110)%84;
  ctx.fillStyle='rgba(148,163,184,0.26)';
  for(let x=st.x-bgOffset;x<st.x+st.w+90;x+=84){
    const bh=28+((Math.floor(x/84)%3+3)%3)*18;
    ctx.fillRect(x,guideY+50-bh,28,bh);
  }

  ctx.shadowColor='rgba(15,23,42,0.16)';
  ctx.shadowBlur=14;
  ctx.fillStyle='rgba(100,116,139,0.70)';
  rrect(st.x+st.w*.07,guideY,st.w*.86,22,4);
  ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(226,232,240,0.96)';
  rrect(st.x+st.w*.09,guideY+22,st.w*.82,34,6);
  ctx.fill();
  ctx.strokeStyle='rgba(100,116,139,0.38)';
  ctx.stroke();

  const coilSpacing=42;
  const magPitch=trainW/4;      // each of the 4 N-S-N-S magnets
  for(let cx=st.x+st.w*.10;cx<st.x+st.w*.90;cx+=coilSpacing){
    const dist=cx-trainX;       // distance from left edge of train
    let pole,alpha;
    if(dist>=0 && dist<trainW){
      // Under the train: coil pole = same as the train magnet directly above
      // → same-pole repulsion → 부상
      const mIdx=Math.min(3,Math.floor(dist/magPitch));
      pole=mIdx%2===0?'N':'S';  // N,S,N,S from left
      alpha=0.50;
    } else if(dist>=trainW && dist<trainW+magPitch*2.2){
      // Just ahead: continue the N-S-N-S pattern
      // (last magnet idx=3 is S → first ahead coil = N → attracts S → 추진)
      const aIdx=Math.floor((dist-trainW)/magPitch);
      pole=aIdx%2===0?'N':'S';
      alpha=0.40-(dist-trainW)/(magPitch*2.2)*0.16;
    } else {
      // Inactive — faint N-S-N-S to hint at traveling wave
      const iStep=Math.round(dist/coilSpacing);
      pole=iStep%2===0?'N':'S';
      alpha=0.16;
    }
    ctx.fillStyle=pole==='N'?`rgba(239,68,68,${alpha})`:`rgba(37,99,235,${alpha})`;
    rrect(cx-12,guideY+5,24,12,3);
    ctx.fill();
    ctx.fillStyle=pole==='N'?`rgba(127,29,29,${Math.min(alpha*1.6,0.9)})`:`rgba(30,64,175,${Math.min(alpha*1.6,0.9)})`;
    ctx.font='bold 8px sans-serif';
    ctx.textAlign='center';
    ctx.fillText(pole,cx,guideY+14);
  }

  // Levitation arrows follow the moving train.
  for(let i=0;i<6;i++){
    const x=trainX+trainW*.18+i*(trainW*.56/5);
    if(x<st.x || x>st.x+st.w) continue;
    arrowLine(x,guideY-2,x,trainY+trainH+4,'rgba(22,163,74,0.58)',1.9,6);
  }

  // Motion streaks
  for(let i=0;i<4;i++){
    ctx.strokeStyle=`rgba(37,99,235,${0.20-i*.04})`;
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(trainX-24-i*26,trainY+trainH*(.33+i*.09));
    ctx.lineTo(trainX-78-i*30,trainY+trainH*(.33+i*.09));
    ctx.stroke();
  }

  // Train body
  const grad=ctx.createLinearGradient(0,trainY,0,trainY+trainH);
  grad.addColorStop(0,'#ffffff');
  grad.addColorStop(.45,'#dbeafe');
  grad.addColorStop(1,'#60a5fa');
  ctx.fillStyle=grad;
  ctx.shadowColor='rgba(37,99,235,0.24)';
  ctx.shadowBlur=20;
  ctx.beginPath();
  ctx.moveTo(trainX+16,trainY+trainH*.88);
  ctx.quadraticCurveTo(trainX+trainW*.09,trainY+trainH*.12,trainX+nose,trainY+trainH*.08);
  ctx.lineTo(trainX+trainW*.84,trainY+trainH*.08);
  ctx.quadraticCurveTo(trainX+trainW*.98,trainY+trainH*.12,trainX+trainW+18,trainY+trainH*.48);
  ctx.quadraticCurveTo(trainX+trainW*.93,trainY+trainH*.90,trainX+trainW*.78,trainY+trainH*.94);
  ctx.lineTo(trainX+34,trainY+trainH*.94);
  ctx.quadraticCurveTo(trainX+10,trainY+trainH*.94,trainX+16,trainY+trainH*.88);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(37,99,235,0.42)';
  ctx.lineWidth=1.5;
  ctx.stroke();

  ctx.strokeStyle='#2563eb';
  ctx.lineWidth=4;
  ctx.beginPath();
  ctx.moveTo(trainX+nose*.55,trainY+trainH*.62);
  ctx.lineTo(trainX+trainW*.86,trainY+trainH*.62);
  ctx.stroke();
  ctx.strokeStyle='#ef4444';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(trainX+nose*.62,trainY+trainH*.70);
  ctx.lineTo(trainX+trainW*.82,trainY+trainH*.70);
  ctx.stroke();

  ctx.fillStyle='rgba(15,23,42,0.74)';
  for(let i=0;i<7;i++){
    const wx=trainX+nose+i*(trainW*.50/6);
    rrect(wx,trainY+trainH*.22,trainW*.055,trainH*.22,6);
    ctx.fill();
  }
  ctx.fillStyle='rgba(15,23,42,0.64)';
  rrect(trainX+trainW*.82,trainY+trainH*.24,trainW*.06,trainH*.20,6);
  ctx.fill();

  ctx.strokeStyle='rgba(14,165,233,0.78)';
  ctx.lineWidth=3;
  for(let i=0;i<4;i++){
    const mx=trainX+trainW*.22+i*(trainW*.14);
    ctx.beginPath();
    ctx.rect(mx,trainY+trainH*.84,trainW*.085,8);
    ctx.stroke();
  }

  arrowLine(trainX+trainW*.10,trainY+trainH*.36,trainX+trainW*.26,trainY+trainH*.36,'rgba(245,158,11,0.82)',2.4,8);
  ctx.fillStyle='rgba(146,64,14,0.92)';
  ctx.font='bold 11px Pretendard,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('진행 방향',trainX+trainW*.18,trainY+trainH*.22);

  ctx.restore();

  ctx.save();
  ctx.fillStyle='rgba(51,65,85,0.92)';
  ctx.font='bold 12px Pretendard,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('가이드웨이 코일',st.cx,guideY+76);

  const panelW=st.w<560?st.w-42:Math.min(st.w*.48,390);
  const panelH=st.w<560?128:142;
  const panelX=st.w<560?st.x+21:st.x+34;
  const panelY=76;
  drawMaglevPrinciplePanel(panelX,panelY,panelW,panelH);
  ctx.restore();
}

function drawTab1(){
  const W=sim.width, H=sim.height;
  ctx.clearRect(0,0,W,H);
  const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.7);
  g.addColorStop(0,'#f8fbff'); g.addColorStop(0.62,'#edf7ff'); g.addColorStop(1,'#e9fbf7');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  if(emApp!=='speaker' && emApp!=='maglev') emApp='speaker';
  if(emApp==='speaker') drawSpeakerPolished(W,H);
  else                  drawMaglevMoving(W,H);
}

// ─────────────────────────────────────────────
// MAIN LOOP
// ─────────────────────────────────────────────
function loop(){
  ph+=0.018;
  if(tab===0) drawTab0();
  else        drawTab1();
  requestAnimationFrame(loop);
}

function init(){
  resize();
  initTab0();
  selApp('speaker');
  loop();
}
window.addEventListener('load',init);
</script>
