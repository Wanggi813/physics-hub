<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https: wss:; media-src 'self' https: blob: data:; worker-src 'self' blob:; frame-src 'self' https:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self';">
  <meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>자성체</title>
<style>
@import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");
:root{
  --bg:#edf7ff;--panel:rgba(255,255,255,0.9);--border:rgba(14,148,136,0.22);
  --text:#142033;--muted:#64748b;--accent:#0e9488;
  --deep:#0f4c81;--warm:#f59e0b;
  --ferro:#ef4444;--para:#0f4c81;--dia:#7c3aed;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:"Pretendard",-apple-system,"Noto Sans KR",sans-serif;
  touch-action:none;-webkit-user-select:none;user-select:none}
header{position:fixed;top:0;left:0;right:0;height:50px;
  background:rgba(248,252,255,0.96);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:100;gap:10px}
.brand{font-weight:800;font-size:16px;white-space:nowrap;
  background:linear-gradient(120deg,#0f4c81,#0e9488 62%,#f59e0b);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tabs{display:flex;gap:3px;background:rgba(14,148,136,0.09);border-radius:9px;padding:3px;flex-shrink:0}
.tab-btn{padding:5px 16px;border-radius:6px;border:none;background:transparent;
  color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.tab-btn.active{background:var(--accent);color:#fff}
canvas#sim{position:fixed;top:50px;left:0;right:0;bottom:0;width:100%;height:calc(100% - 50px)}
.hud{position:fixed;left:12px;top:62px;width:260px;
  background:var(--panel);backdrop-filter:blur(14px);
  border:1px solid var(--border);border-radius:13px;box-shadow:0 14px 34px rgba(15,76,129,0.12);
  padding:13px;z-index:50;max-height:calc(100vh - 74px);overflow-y:auto}
.hud h3{font-size:13px;font-weight:700;color:var(--accent);
  margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.bgroup{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0}
.btn{flex:1;padding:9px 6px;border-radius:7px;border:1px solid var(--border);
  background:rgba(255,255,255,0.72);color:var(--text);font-size:11px;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:inherit;text-align:center;min-width:50px}
.btn:hover{background:rgba(14,148,136,.10);border-color:var(--accent)}
.btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.on{background:#16a34a;border-color:#16a34a;color:#fff}
.btn.ferro{border-color:var(--ferro)} .btn.ferro.active{background:var(--ferro)}
.btn.para{border-color:var(--para)}   .btn.para.active{background:var(--para)}
.btn.dia{border-color:var(--dia)}     .btn.dia.active{background:var(--dia)}
.mdesc{margin-top:10px;font-size:11px;color:var(--muted);line-height:1.7;white-space:pre-line}
.sep{border-top:1px solid var(--border);margin:10px 0}
.app-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.app-card{background:rgba(255,255,255,0.72);border:1px solid var(--border);
  border-radius:9px;padding:9px;text-align:center;cursor:pointer;transition:all .2s}
.app-card:hover,.app-card.active{border-color:var(--accent);background:rgba(14,148,136,.10)}
.app-card .ai{font-size:24px}.app-card .an{font-size:11px;color:var(--muted);margin-top:3px}
.app-card.active .an{color:var(--accent)}
.rpanel{position:fixed;right:12px;top:62px;width:270px;
  background:var(--panel);backdrop-filter:blur(14px);
  border:1px solid var(--border);border-radius:13px;padding:13px;z-index:50;box-shadow:0 14px 34px rgba(15,76,129,0.12);
  max-height:calc(100vh - 74px);overflow-y:auto}
.rpanel h3{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:10px;
  padding-bottom:8px;border-bottom:1px solid var(--border)}
.rpanel-info{font-size:11px;color:var(--muted);line-height:1.7;white-space:pre-line}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(14,148,136,.28);border-radius:4px}
@media(max-width:768px){
  .brand{font-size:13px} .tab-btn{padding:4px 10px;font-size:11px}
  canvas#sim{top:50px;bottom:46vh;height:calc(54vh - 50px)}
  .hud,.rpanel{position:fixed!important;top:auto!important;bottom:0!important;
    left:0!important;right:0!important;width:100%!important;
    height:46vh!important;border-radius:13px 13px 0 0;max-height:46vh}
  .rpanel{display:none}
}
</style>
</head>
<body>
<header>
  <div class="brand">🧲 자성체</div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab(0)">자성체 종류</button>
    <button class="tab-btn"        onclick="switchTab(1)">전자석 응용</button>
  </div>
</header>
<canvas id="sim"></canvas>

<!-- TAB 0 HUD -->
<div class="hud" id="hud0">
  <h3>🔬 자성체 종류 비교</h3>
  <div class="bgroup">
    <button class="btn on" id="mag-btn" onclick="toggleMagnet()">🧲 자기장 ON</button>
    <button class="btn on" id="line-btn" onclick="toggleFieldLines()">자기력선 ON</button>
  </div>
  <div class="sep"></div>
  <div style="font-size:11px;color:var(--muted);margin-bottom:6px">자성체 소환</div>
  <div class="bgroup">
    <button class="btn ferro" onclick="spawnMaterial('ferro')">강자성체 +</button>
    <button class="btn para"  onclick="spawnMaterial('para')">상자성체 +</button>
    <button class="btn dia"   onclick="spawnMaterial('dia')">반자성체 +</button>
  </div>
  <div class="bgroup">
    <button class="btn" onclick="resetSandbox()">초기화</button>
  </div>
  <div class="sep"></div>
  <div style="font-size:11px;color:var(--muted);margin-bottom:6px">물질 설명 보기</div>
  <div class="bgroup">
    <button class="btn ferro active" id="b-ferro" onclick="selInfo('ferro')">강자성체</button>
    <button class="btn para"         id="b-para"  onclick="selInfo('para')">상자성체</button>
    <button class="btn dia"          id="b-dia"   onclick="selInfo('dia')">반자성체</button>
  </div>
  <div class="mdesc" id="mat-desc"></div>
</div>

<!-- TAB 1 HUD -->
<div class="hud" id="hud1" style="display:none">
  <h3>⚡ 전자석 응용 선택</h3>
  <div class="app-grid">
    <div class="app-card active" onclick="selApp('speaker')"><div class="ai">🔊</div><div class="an">스피커</div></div>
    <div class="app-card"        onclick="selApp('maglev')" ><div class="ai">🚄</div><div class="an">자기부상</div></div>
  </div>
</div>

<!-- Right panel: app info -->
<div class="rpanel" id="rp1" style="display:none">
  <h3 id="app-title">🔊 실제 스피커 구조</h3>
  <div class="rpanel-info" id="app-desc"></div>
</div>

<script>
// ─────────────────────────────────────────────
// CANVAS
// ─────────────────────────────────────────────
const sim = document.getElementById('sim');
const ctx = sim.getContext('2d');
function resize(){ sim.width=sim.offsetWidth; sim.height=sim.offsetHeight; }
window.addEventListener('resize', resize);

// ─────────────────────────────────────────────
// GLOBAL
// ─────────────────────────────────────────────
let tab = 0, ph = 0;
let magnetOn = true;
let showFieldLines = true;
const MAIN_FIELD_ANGLE = Math.PI/2;

// ─────────────────────────────────────────────
// MATERIAL DATA
// ─────────────────────────────────────────────

const APP_DATA = {

    title:'🔊 스피커 (동전형)',

        +'⑤ 이완 시 방출된 신호 수집 → 영상 재구성\n\n'
        +'【특징】 방사선 없음 / 연조직 고해상도\n'

  },

        +'① 자석이 만드는 균일 자기장 B 속에 코일\n'

        +'   AB 변: 위 방향 힘 (F = BIL, 왼손 법칙)\n'
        +'   CD 변: 아래 방향 힘 → 합쳐서 회전력(토크)\n'

        +'   전류 방향 전환 → 항상 같은 방향 회전\n\n'
        +'【응용】 전기차 구동 모터, 세탁기, 드론 BLDC',
  },
};

const APP_FOCUS = {
  speaker:{
    title:'🔊 실제 스피커 구조',
    desc:'스피커는 둥근 진동판, 고무 서라운드, 중앙 더스트캡, 뒤쪽의 보이스 코일과 영구자석으로 이루어집니다.\n\n교류 전류가 보이스 코일에 흐르면 자석의 자기장 속에서 코일이 앞뒤로 힘을 받고, 코일에 붙은 진동판이 공기를 밀고 당기며 소리를 만듭니다.'
  },
  maglev:{
    title:'🚄 실제 자기부상열차 구조',
    desc:'자기부상열차는 바퀴 대신 차체 아래 전자석 또는 초전도 자석과 선로 쪽 코일을 이용해 떠서 움직입니다.\n\n차체와 가이드웨이 사이에 작은 간격이 생기고, 선로 코일의 자기장이 차체를 들어 올리거나 옆에서 잡아 주며 앞으로 끌어갑니다.'
  }
};

// ─────────────────────────────────────────────
// TAB SWITCH
// ─────────────────────────────────────────────
function switchTab(i){
  tab=i;
  document.querySelectorAll('.tab-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  document.getElementById('hud0').style.display=i===0?'':'none';
  document.getElementById('hud1').style.display=i===1?'':'none';
  document.getElementById('rp1').style.display=i===1?'':'none';
  if(i===0) initTab0();
  if(i===1) selApp(emApp);
}

// ─────────────────────────────────────────────
// TAB 0 — 자성체 종류 비교
// ─────────────────────────────────────────────
const MAT_TYPES = {
  ferro:{ color:'#ff6b6b', label:'강자성체', forceLabel:'강한 인력' },
  para :{ color:'#6bbbff', label:'상자성체', forceLabel:'약한 인력' },
  dia  :{ color:'#b06bff', label:'반자성체', forceLabel:'약한 척력' },
};

let sandboxObjects = [];
let nailObjects = [];
let nextObjectId = 1;
let dragging = null;
let selectedObject = null;

// domain color pairs [inner, outer]
const DC=[['#c83030','#2255aa'],['#aa3399','#33aa55'],['#cc5511','#2266cc'],
          ['#119955','#993366'],['#aa2244','#2244aa'],['#6633cc','#33bb66']];

const NAIL_TYPES = {
  iron:{label:'철', color:'#64748b', head:'#334155', response:0.18, note:'강한 인력'},
  aluminum:{label:'알루미늄', color:'#94a3b8', head:'#64748b', response:0.036, note:'약한 인력'},
  copper:{label:'구리', color:'#d97706', head:'#92400e', response:-0.024, note:'매우 약한 척력'}
};

function initTab0(){
  if(sandboxObjects.length===0) spawnStarterObjects();
  selInfo('ferro');
}

function selInfo(type){
  ['ferro','para','dia'].forEach(t=>document.getElementById('b-'+t).classList.toggle('active',t===type));
  const m=MAT_INFO[type];
  document.getElementById('mat-desc').innerHTML=
    `<span style="color:${m.color};font-weight:700">${MAT_TYPES[type].label}</span>\n${m.desc}`;
}

function toggleMagnet(){
  magnetOn=!magnetOn;
  const btn=document.getElementById('mag-btn');
  btn.textContent=magnetOn?'🧲 자기장 ON':'🧲 자기장 OFF';
  btn.classList.toggle('on',magnetOn);
}

function toggleFieldLines(){
  showFieldLines=!showFieldLines;
  const btn=document.getElementById('line-btn');
  btn.textContent=showFieldLines?'자기력선 ON':'자기력선 OFF';
  btn.classList.toggle('on',showFieldLines);
}

function makeDipoles(count){
  const dipoles=[];
  const domainMap=[
    0,0,1,1,2,
    0,3,3,1,2,
    4,4,3,5,5
  ];
  for(let i=0;i<count;i++){
    const dom=domainMap[i%domainMap.length];
    const base=dom/DC.length*Math.PI*2;
    dipoles.push({
      angle:base+(Math.random()-.5)*0.35,
      target:base,
      locked:base+(Math.random()-.5)*0.18,
      dom
    });
  }
  return dipoles;
}

function createMaterial(type,x,y){
  const size=materialSize();
  return {
    id:nextObjectId++, type, x, y, vx:0, vy:0, w:size.w, h:size.h,
    dipoles:makeDipoles(15), mag:0, tempMag:0, inField:false,
    everMagnetized:false, dragging:false
  };
}

function spawnMaterial(type){
  const W=sim.width||900, H=sim.height||520;
  const mg=magnetGeom();
  const size=materialSize();
  const count=sandboxObjects.length;
  let x=mg.fieldX+mg.fieldW+size.w*.72+(count%3)*18;
  if(x>W-size.w/2) x=Math.max(mg.fieldX-size.w*.85, 330);
  const y=Math.min(H-size.h/2-12, Math.max(size.h/2+12, H*.32+(count%5)*(size.h*.66)));
  const obj=createMaterial(type,x,y);
  sandboxObjects.push(obj);
  selectedObject=obj;
  selInfo(type);
}

function spawnStarterObjects(){
  const W=sim.width||900, H=sim.height||520;
  const mg=magnetGeom();
  let x=mg.fieldX+mg.fieldW+105;
  if(x>W-95) x=Math.max(mg.fieldX-120, 330);
  ['ferro','para','dia'].forEach((t,i)=>{
    const obj=createMaterial(t, x, H*(.28+i*.23));
    sandboxObjects.push(obj);
    if(t==='ferro' && !selectedObject) selectedObject=obj;
  });
}

function resetSandbox(){
  sandboxObjects=[];
  selectedObject=null;
  spawnStarterObjects();
  resetNails();
  selInfo('ferro');
}

function magnetGeom(){
  const W=sim.width, H=sim.height;
  const compact=W<760;
  const fieldW=compact?Math.min(132,W*.34):Math.min(205,Math.max(155,W*.18));
  const fieldH=Math.min(Math.max(260,H*.62),Math.max(260,H-150));
  const fieldX=compact?18:Math.min(W-fieldW-250,Math.max(285,W*.30));
  const fieldY=Math.max(compact?104:128,(H-fieldH)/2+34);
  const mW=fieldW;
  const mH=compact?82:96;
  const mX=fieldX+fieldW/2;
  const mY=fieldY-mH/2-12;
  return {
    mX,mY,mW,mH,
    fieldX,fieldY,fieldW,fieldH
  };
}

function sandboxScale(){
  const W=sim.width||900, H=sim.height||520;
  const base=Math.min(W/1120,H/680);
  return Math.max(0.88,Math.min(1.08,base));
}

function materialSize(){
  const s=sandboxScale();
  return {
    w:Math.round(132*s),
    h:Math.round(66*s),
    scale:s
  };
}

function syncMaterialSizes(){
  const size=materialSize();
  sandboxObjects.forEach(o=>{
    o.w=size.w;
    o.h=size.h;
  });
}

function nailTrayGeom(){
  const W=sim.width, H=sim.height;
  const compact=W<820;
  const s=sandboxScale();
  const trayW=compact?Math.min(W-28,Math.round(300*s)):Math.round(320*s);
  const trayH=compact?Math.round(124*s):Math.round(152*s);
  return {
    x:compact?W-trayW-14:W-trayW-18,
    y:compact?Math.max(86,H-trayH-18):H-trayH-28,
    w:trayW,
    h:trayH,
    compact
  };
}

function nailBinGeom(tray){
  const s=sandboxScale();
  const pad=10*s;
  const top=(tray.compact?58:62)*s;
  const bottom=(tray.compact?12:16)*s;
  return {
    x:tray.x+pad,
    y:tray.y+top,
    w:tray.w-pad*2,
    h:Math.max(48,tray.h-top-bottom)
  };
}

function resetNails(){
  const g=nailTrayGeom();
  const bin=nailBinGeom(g);
  const mix=['iron','copper','aluminum','iron','aluminum','iron','copper','iron','aluminum',
             'copper','iron','aluminum','iron','copper','iron','aluminum','iron','copper'];
  const cols=6;
  nailObjects=[];
  mix.forEach((type,slot)=>{
    const c=slot%cols, r=Math.floor(slot/cols);
    const x=bin.x+bin.w*(0.10+c*0.16)+((r%2)-0.5)*8;
    const y=bin.y+bin.h*(0.55+r*0.12)+(c%2-0.5)*7;
    const homeAngle=-0.95+((slot*37)%120)/100;
    nailObjects.push({type, slot, x, y, vx:0, vy:0, angle:homeAngle, homeAngle});
  });
}

function syncNailRests(){
  if(nailObjects.length===0) resetNails();
}

function pointInRect(x,y,r){
  return x>=r.x && x<=r.x+r.w && y>=r.y && y<=r.y+r.h;
}

function hitObject(x,y){
  for(let i=sandboxObjects.length-1;i>=0;i--){
    const o=sandboxObjects[i];
    if(x>=o.x-o.w/2 && x<=o.x+o.w/2 && y>=o.y-o.h/2 && y<=o.y+o.h/2) return o;
  }
  return null;
}

function selectFallbackObject(){
  selectedObject=sandboxObjects.find(o=>o.type==='ferro') || sandboxObjects[0] || null;
}

function removeObject(obj){
  sandboxObjects=sandboxObjects.filter(o=>o!==obj);
  if(dragging && dragging.obj===obj) dragging=null;
  if(selectedObject===obj) selectFallbackObject();
}

function pointerPos(e){
  const rect=sim.getBoundingClientRect();
  return {x:e.clientX-rect.left,y:e.clientY-rect.top};
}

sim.addEventListener('pointerdown',e=>{
  if(tab!==0) return;
  const p=pointerPos(e);
  const obj=hitObject(p.x,p.y);
  if(!obj) return;
  dragging={obj,dx:p.x-obj.x,dy:p.y-obj.y};
  obj.dragging=true;
  selectedObject=obj;
  sandboxObjects=sandboxObjects.filter(o=>o!==obj).concat(obj);
  sim.setPointerCapture?.(e.pointerId);
  selInfo(obj.type);
});

sim.addEventListener('pointermove',e=>{
  if(!dragging) return;
  const p=pointerPos(e);
  dragging.obj.x=p.x-dragging.dx;
  dragging.obj.y=p.y-dragging.dy;
  dragging.obj.vx=0;
  dragging.obj.vy=0;
});

function endDrag(e){
  if(!dragging) return;
  dragging.obj.dragging=false;
  sim.releasePointerCapture?.(e.pointerId);
  dragging=null;
}
sim.addEventListener('pointerup',endDrag);
sim.addEventListener('pointercancel',endDrag);
sim.addEventListener('dblclick',e=>{
  if(tab!==0) return;
  const p=pointerPos(e);
  const obj=hitObject(p.x,p.y);
  if(!obj) return;
  removeObject(obj);
});

function nearestMagnetizedFerro(obj){
  let best=null, bestScore=0;
  sandboxObjects.forEach(other=>{
    if(other===obj || other.type!=='ferro' || other.mag<0.16) return;
    const dx=other.x-obj.x, dy=other.y-obj.y;
    const d2=dx*dx+dy*dy;
    const score=other.mag/(d2+1000);
    if(score>bestScore){ best=other; bestScore=score; }
  });
  return best;
}

function updateSandbox(){
  syncMaterialSizes();
  const W=sim.width, H=sim.height;
  const mg=magnetGeom();
  const field={x:mg.fieldX,y:mg.fieldY,w:mg.fieldW,h:mg.fieldH};

  sandboxObjects.forEach(o=>{
    o.inField=magnetOn && pointInRect(o.x,o.y,field);
    if(o.inField){
      if(o.type==='ferro'){
        o.mag+=(1-o.mag)*0.04;
        o.everMagnetized=o.mag>.35 || o.everMagnetized;
      } else if(o.type==='para') {
        o.tempMag+=(0.62-o.tempMag)*0.07;
      } else {
        o.tempMag+=(-0.56-o.tempMag)*0.07;
      }
    } else {
      if(o.type==='ferro' && o.mag>0){
        o.mag*=o.dragging?0.997:0.9985;
        if(o.mag<0.045){
          o.mag=0;
          o.everMagnetized=false;
        }
      }
      if(o.type==='para' || o.type==='dia') o.tempMag*=0.88;
    }
  });

  sandboxObjects.forEach(o=>{
    if(!o.dragging){
      if(o.inField){
        if(o.type==='ferro') o.vy-=0.18*(0.45+o.mag);
        if(o.type==='para')  o.vy-=0.038;
        if(o.type==='dia')   o.vy+=0.014;
      }

      sandboxObjects.forEach(src=>{
        if(src===o || src.type!=='ferro' || src.mag<0.16) return;
        const dx=src.x-o.x, dy=src.y-o.y;
        const d=Math.hypot(dx,dy);
        if(d<1 || d>280) return;
        let f=0;
        if(o.type==='ferro') f=0.13*src.mag*(1-d/300);
        if(o.type==='para')  f=0.036*src.mag*(1-d/300);
        if(o.type==='dia')   f=-0.024*src.mag*(1-d/300);
        o.vx+=dx/d*f;
        o.vy+=dy/d*f;
      });

      o.vx*=0.92;
      o.vy*=0.92;
      o.x+=o.vx;
      o.y+=o.vy;
      if(o.x<o.w/2){ o.x=o.w/2; o.vx=Math.abs(o.vx)*0.35; }
      if(o.x>W-o.w/2){ o.x=W-o.w/2; o.vx=-Math.abs(o.vx)*0.35; }
      if(o.y<o.h/2){ o.y=o.h/2; o.vy=Math.abs(o.vy)*0.35; }
      if(o.y>H-o.h/2){ o.y=H-o.h/2; o.vy=-Math.abs(o.vy)*0.35; }
    }

    const nearby=nearestMagnetizedFerro(o);
    const nearAngle=nearby?Math.atan2(o.y-nearby.y,o.x-nearby.x):0;
    const fieldAngle=o.inField?MAIN_FIELD_ANGLE:nearAngle;
    o.dipoles.forEach(d=>{
      if(o.type==='ferro'){
        if(o.inField){
          let da=MAIN_FIELD_ANGLE-d.locked;
          while(da>Math.PI) da-=Math.PI*2;
          while(da<-Math.PI) da+=Math.PI*2;
          d.locked+=da*0.045;
        } else if(o.mag<0.35){
          const base=d.dom/DC.length*Math.PI*2;
          let dda=base-d.locked;
          while(dda>Math.PI) dda-=Math.PI*2;
          while(dda<-Math.PI) dda+=Math.PI*2;
          d.locked+=dda*(0.004+(0.35-o.mag)*0.02);
        }
        d.target=d.locked+(Math.random()-.5)*(o.inField?0.10:(1-o.mag)*0.9);
      } else if(o.type==='para'){
        const align=o.inField || nearby;
        const jitter=o.inField?0.34:Math.PI*(1.1-Math.abs(o.tempMag));
        d.target=align?fieldAngle+(Math.random()-.5)*jitter:Math.random()*Math.PI*2;
      } else {
        const align=o.inField || nearby;
        const jitter=o.inField?0.34:Math.PI*(1.0-Math.abs(o.tempMag));
        d.target=align?fieldAngle+Math.PI+(Math.random()-.5)*jitter:Math.random()*Math.PI*2;
      }
      let da=d.target-d.angle;
      while(da>Math.PI) da-=Math.PI*2;
      while(da<-Math.PI) da+=Math.PI*2;
      d.angle+=da*(o.type==='ferro'?0.08:0.045);
    });
  });
}

function updateNails(){
  syncNailRests();
  const W=sim.width, H=sim.height;
  const tray=nailTrayGeom();
  const bin=nailBinGeom(tray);
  const floor=bin.y+bin.h-10;
  const left=bin.x+12, right=bin.x+bin.w-12;
  const sources=sandboxObjects.filter(o=>o.type==='ferro' && o.mag>0.16);
  nailObjects.forEach((n,i)=>{
    const meta=NAIL_TYPES[n.type];
    n.vy+=0.085;

    let targetAngle=n.homeAngle;
    let repelX=0, repelY=0, repelPower=0;
    sources.forEach(src=>{
      const dx=src.x-n.x, dy=src.y-n.y;
      const d=Math.hypot(dx,dy);
      if(d<1 || d>340) return;
      const falloff=1-d/360;
      const f=meta.response*src.mag*falloff;
      const ux=dx/d, uy=dy/d;
      n.vx+=ux*f;
      n.vy+=uy*f;
      if(meta.response<0){
        const repel=Math.abs(f);
        repelX-=ux*repel;
        repelY-=uy*repel;
        repelPower+=repel;
      }
      targetAngle=meta.response<0?Math.atan2(-dy,-dx):Math.atan2(dy,dx);
    });

    if(meta.response<0 && repelPower>0){
      const rl=Math.hypot(repelX,repelY);
      if(rl>0){
        const ax=repelX/rl, ay=repelY/rl;
        const toward=-(n.vx*ax+n.vy*ay);
        if(toward>0){
          n.vx+=ax*toward*1.08;
          n.vy+=ay*toward*1.08;
        }
        const awaySpeed=n.vx*ax+n.vy*ay;
        const minAway=Math.min(0.04,repelPower*0.85);
        if(awaySpeed<minAway){
          n.vx+=ax*(minAway-awaySpeed);
          n.vy+=ay*(minAway-awaySpeed);
        }
      }
    }

    n.vx*=0.94;
    n.vy*=0.94;
    n.x+=n.vx;
    n.y+=n.vy;

    if(n.x<left){
      n.x=left;
      n.vx=Math.abs(n.vx)*0.38;
    }
    if(n.x>right){
      n.x=right;
      n.vx=-Math.abs(n.vx)*0.38;
    }
    if(n.y>floor){
      n.y=floor;
      n.vy=-Math.abs(n.vy)*0.22;
      n.vx*=0.74;
    }
    if(n.y<70){
      n.y=70;
      n.vy=Math.abs(n.vy)*0.3;
    }
    n.x=Math.max(22,Math.min(W-22,n.x));
    n.y=Math.min(H-22,n.y);

    let da=targetAngle-n.angle;
    while(da>Math.PI) da-=Math.PI*2;
    while(da<-Math.PI) da+=Math.PI*2;
    n.angle+=da*0.08;
  });
}

function drawDipoleSmall(x,y,ang,sz,type,dom){
  ctx.save(); ctx.translate(x,y); ctx.rotate(ang);
  const h=sz*.5,w=sz*.22;
  if(type==='ferro'){
    const[ca,cb]=DC[dom%DC.length];
    ctx.fillStyle=cb; ctx.beginPath(); ctx.rect(-h,-w,h,w*2); ctx.fill();
    ctx.fillStyle=ca; ctx.beginPath(); ctx.rect(0,-w,h,w*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.beginPath(); ctx.moveTo(h+4,0); ctx.lineTo(h-3,-w*.85); ctx.lineTo(h-3,w*.85); ctx.fill();
  } else {
    const col=MAT_TYPES[type].color;
    ctx.strokeStyle=col; ctx.lineWidth=1.8; ctx.shadowColor=col; ctx.shadowBlur=4;
    ctx.beginPath(); ctx.moveTo(-h+1,0); ctx.lineTo(h-4,0); ctx.stroke();
    ctx.fillStyle=col;
    ctx.beginPath(); ctx.moveTo(h+3,0); ctx.lineTo(h-4,-w*.7); ctx.lineTo(h-4,w*.7); ctx.fill();
    ctx.shadowBlur=0;
  }
  ctx.restore();
}

function drawArrowH(x1,y,x2,col,lw,headSz){
  ctx.save(); ctx.strokeStyle=col; ctx.fillStyle=col;
  ctx.lineWidth=lw; ctx.shadowColor=col; ctx.shadowBlur=10;
  ctx.beginPath(); ctx.moveTo(x1,y); ctx.lineTo(x2-(x2>x1?headSz:-headSz),y); ctx.stroke();
  ctx.beginPath();
  const d=x2>x1?1:-1;
  ctx.moveTo(x2,y); ctx.lineTo(x2-d*headSz,y-headSz*.6); ctx.lineTo(x2-d*headSz,y+headSz*.6);
  ctx.fill(); ctx.shadowBlur=0; ctx.restore();
}

function cubicPoint(p0,p1,p2,p3,t){
  const u=1-t;
  return {
    x:u*u*u*p0.x+3*u*u*t*p1.x+3*u*t*t*p2.x+t*t*t*p3.x,
    y:u*u*u*p0.y+3*u*u*t*p1.y+3*u*t*t*p2.y+t*t*t*p3.y
  };
}

function cubicTangent(p0,p1,p2,p3,t){
  const u=1-t;
  return {
    x:3*u*u*(p1.x-p0.x)+6*u*t*(p2.x-p1.x)+3*t*t*(p3.x-p2.x),
    y:3*u*u*(p1.y-p0.y)+6*u*t*(p2.y-p1.y)+3*t*t*(p3.y-p2.y)
  };
}

function drawCurveArrowHead(p0,p1,p2,p3,t,col,sz){
  const p=cubicPoint(p0,p1,p2,p3,t);
  const v=cubicTangent(p0,p1,p2,p3,t);
  const a=Math.atan2(v.y,v.x);
  ctx.save();
  ctx.fillStyle=col;
  ctx.translate(p.x,p.y);
  ctx.rotate(a);
  ctx.beginPath();
  ctx.moveTo(sz,0);
  ctx.lineTo(-sz*.65,-sz*.42);
  ctx.lineTo(-sz*.65,sz*.42);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawFerroFieldLines(){
  if(!showFieldLines) return;
  sandboxObjects.forEach(o=>{
    if(o.type!=='ferro' || o.mag<0.16) return;
    const alpha=Math.min(0.55,0.14+o.mag*0.42);
    const col=`rgba(239,68,68,${alpha})`;
    const top={x:o.x,y:o.y-o.h/2+9};
    const bottom={x:o.x,y:o.y+o.h/2-9};
    const spreads=[58,82,108];
    ctx.save();
    ctx.strokeStyle=col;
    ctx.lineWidth=1.3;
    ctx.shadowColor='rgba(239,68,68,0.18)';
    ctx.shadowBlur=10;
    spreads.forEach((spread,i)=>{
      [-1,1].forEach(side=>{
        const p0={x:top.x+side*(12+i*5),y:top.y};
        const p3={x:bottom.x+side*(12+i*5),y:bottom.y};
        const p1={x:o.x+side*spread,y:o.y-o.h*.95};
        const p2={x:o.x+side*spread,y:o.y+o.h*.95};
        ctx.beginPath();
        ctx.moveTo(p0.x,p0.y);
        ctx.bezierCurveTo(p1.x,p1.y,p2.x,p2.y,p3.x,p3.y);
        ctx.stroke();
        drawCurveArrowHead(p0,p1,p2,p3,0.58,col,5.5);
      });
    });
    ctx.restore();
  });
}

function drawInteractionArrows(){
  sandboxObjects.forEach(src=>{
    if(src.type!=='ferro' || src.mag<0.16) return;
    sandboxObjects.forEach(o=>{
      if(o===src || (o.type!=='ferro' && o.type!=='para' && o.type!=='dia')) return;
      const dx=src.x-o.x, dy=src.y-o.y;
      const d=Math.hypot(dx,dy);
      if(d<40 || d>280) return;
      const col=o.type==='ferro'?'rgba(239,68,68,0.72)'
        :o.type==='para'?'rgba(2,132,199,0.42)':'rgba(139,92,246,0.64)';
      const ux=dx/d, uy=dy/d;
      if(o.type==='ferro' || o.type==='para'){
        const len=o.type==='ferro'?54:30;
        const lw=o.type==='ferro'?2.4:1.5;
        arrowLine(o.x+ux*62,o.y+uy*32,o.x+ux*(62+len),o.y+uy*(32+len),col,lw,o.type==='ferro'?8:6);
      } else {
        arrowLine(o.x-ux*38,o.y-uy*20,o.x-ux*58,o.y-uy*32,col,1.2,5);
      }
    });
  });
}

function drawSandboxObject(o){
  const t=o.type, meta=MAT_TYPES[t], bx=o.x-o.w/2, by=o.y-o.h/2;
  const os=o.w/132;
  const glow=t==='ferro' && o.mag>.18;
  if(glow){
    ctx.shadowColor='rgba(255,107,107,0.55)';
    ctx.shadowBlur=24;
  }
  ctx.fillStyle=`rgba(${t==='ferro'?'255,232,232':t==='para'?'224,242,254':'239,232,255'},0.92)`;
  ctx.beginPath();
  ctx.roundRect?ctx.roundRect(bx,by,o.w,o.h,8*os):ctx.rect(bx,by,o.w,o.h);
  ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle=o.dragging?'rgba(15,23,42,0.85)':meta.color+'88';
  ctx.lineWidth=o.dragging?2.4*os:1.5*os;
  ctx.stroke();
  if(selectedObject===o){
    ctx.strokeStyle='rgba(37,99,235,0.72)';
    ctx.lineWidth=2*os;
    ctx.setLineDash([6,4]);
    ctx.beginPath();
    const pad=5*os;
    ctx.roundRect?ctx.roundRect(bx-pad,by-pad,o.w+pad*2,o.h+pad*2,10*os):ctx.rect(bx-pad,by-pad,o.w+pad*2,o.h+pad*2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  const cols=5, rows=3;
  if(t==='ferro'){
    ctx.save();
    ctx.globalAlpha=0.16;
    o.dipoles.slice(0,cols*rows).forEach((d,i)=>{
      const dc=i%cols, dr=Math.floor(i/cols);
      const cellW=o.w/cols, cellH=o.h/rows;
      ctx.fillStyle=DC[d.dom%DC.length][0];
      ctx.fillRect(bx+dc*cellW+1*os,by+dr*cellH+1*os,cellW-2*os,cellH-2*os);
    });
    ctx.restore();
    ctx.strokeStyle='rgba(15,23,42,0.14)';
    ctx.lineWidth=1*os;
    for(let c=1;c<cols;c++){
      ctx.beginPath(); ctx.moveTo(bx+c*o.w/cols,by+4*os); ctx.lineTo(bx+c*o.w/cols,by+o.h-4*os); ctx.stroke();
    }
    for(let r=1;r<rows;r++){
      ctx.beginPath(); ctx.moveTo(bx+4*os,by+r*o.h/rows); ctx.lineTo(bx+o.w-4*os,by+r*o.h/rows); ctx.stroke();
    }
  }
  o.dipoles.slice(0,cols*rows).forEach((d,i)=>{
    const dc=i%cols, dr=Math.floor(i/cols);
    const marginX=18*os, marginY=15*os;
    const dx=bx+marginX+dc*(o.w-marginX*2)/(cols-1);
    const dy=by+marginY+dr*(o.h-marginY*2)/(rows-1);
    drawDipoleSmall(dx,dy,d.angle,13*os,t,d.dom);
  });

  ctx.fillStyle=meta.color;
  ctx.font=`bold ${Math.max(11,13*os)}px Pretendard,sans-serif`;
  ctx.textAlign='center';
  ctx.shadowColor=meta.color;
  ctx.shadowBlur=8;
  ctx.fillText(meta.label, o.x, by-9*os);
  ctx.shadowBlur=0;

  if(t==='ferro' && o.mag>.12){
    ctx.font=`bold ${Math.max(10,12*os)}px sans-serif`;
    ctx.textBaseline='middle';
    ctx.fillStyle='#ff6b6b'; ctx.fillText('N', o.x, by+11*os);
    ctx.fillStyle='#6bbbff'; ctx.fillText('S', o.x, by+o.h-11*os);
    ctx.textBaseline='alphabetic';
    ctx.fillStyle=`rgba(255,107,107,${0.36+Math.min(o.mag,1)*0.42})`;
    ctx.font='10px Pretendard,sans-serif';
    ctx.fillText(o.inField?'자화 중':'잔류자화 감소 중', o.x, by+o.h+15);
  } else if((t==='para' || t==='dia') && Math.abs(o.tempMag)>.12){
    ctx.fillStyle=meta.color;
    ctx.font='10px Pretendard,sans-serif';
    ctx.fillText(t==='para'?'유도 자화: 끌림':'유도 자화: 밀림', o.x, by+o.h+15);
  }

  if(o.inField){
    const len=(t==='ferro'?54:30)*os;
    const dir=t==='dia'?1:-1;
    arrowLine(o.x+o.w/2+16*os,o.y,o.x+o.w/2+16*os,o.y+dir*len,meta.color,t==='ferro'?2.8*os:1.6*os,t==='ferro'?8*os:6*os);
  }
}

function drawTapeLabel(cx,cy,text,opt){
  opt=opt||{};
  const rot=opt.rot ?? -0.035;
  const h=opt.h || 25;
  const pad=opt.pad || 12;
  const font=opt.font || 'bold 12px Pretendard,sans-serif';
  ctx.save();
  ctx.font=font;
  const w=Math.max(opt.minW||0,ctx.measureText(text).width+pad*2);
  ctx.translate(cx,cy);
  ctx.rotate(rot);
  ctx.shadowColor='rgba(120,85,20,0.13)';
  ctx.shadowBlur=8;
  ctx.fillStyle=opt.color || 'rgba(255,244,183,0.92)';
  ctx.strokeStyle=opt.stroke || 'rgba(217,119,6,0.24)';
  ctx.lineWidth=1;
  rrect(-w/2,-h/2,w,h,5);
  ctx.fill();
  ctx.shadowBlur=0;
  ctx.stroke();
  ctx.fillStyle=opt.textColor || '#334155';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(text,0,1);
  ctx.textBaseline='alphabetic';
  ctx.restore();
}

function drawMissionNote(tray){
  const noteW=Math.min(286,tray.w);
  const noteH=82;
  const x=tray.x;
  const y=Math.max(76,tray.y-noteH-12);
  const sources=sandboxObjects.filter(o=>o.type==='ferro' && o.mag>0.16);
  let ironNear=0, copperNear=0;
  if(sources.length){
    nailObjects.forEach(n=>{
      const d=Math.min(...sources.map(src=>Math.hypot(src.x-n.x,src.y-n.y)));
      if(n.type==='iron' && d<95) ironNear++;
      if(n.type==='copper' && d<72) copperNear++;
    });
  }
  const active=sources.length>0;
  const lines=active
    ? [`철 못 반응 ${ironNear}개 관찰`, copperNear?'구리 못이 너무 가까움':'구리 못은 밀려나는 중']
    : ['강자성체를 먼저 자화시키기','상자 옆으로 가져가 반응 보기'];

  ctx.save();
  ctx.fillStyle='rgba(255,252,224,0.92)';
  ctx.strokeStyle='rgba(217,119,6,0.22)';
  ctx.lineWidth=1;
  ctx.shadowColor='rgba(120,85,20,0.10)';
  ctx.shadowBlur=16;
  rrect(x,y,noteW,noteH,10);
  ctx.fill();
  ctx.shadowBlur=0;
  ctx.stroke();
  drawTapeLabel(x+72,y+4,'분류 미션',{rot:-0.02,h:22,minW:94});
  ctx.fillStyle='#334155';
  ctx.font='bold 11px Pretendard,sans-serif';
  ctx.textAlign='left';
  ctx.fillText('자화된 강자성체로 철 못만 골라내기',x+14,y+35);
  ctx.font='10px Pretendard,sans-serif';
  lines.forEach((line,i)=>{
    const yy=y+54+i*16;
    ctx.strokeStyle=i===1 && active && copperNear?'#ef4444':'#0e9488';
    ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.arc(x+18,yy-3,4,0,Math.PI*2);
    ctx.stroke();
    ctx.fillStyle='rgba(51,65,85,0.88)';
    ctx.fillText(line,x+29,yy);
  });
  ctx.restore();
}

function drawDomainZoomPanel(W,H){
  const obj=selectedObject && selectedObject.type==='ferro' ? selectedObject : null;
  if(!obj) return;

  const compact=W<820;
  const s=sandboxScale();
  const panelW=compact?Math.min(W-28,Math.round(290*s)):Math.round(300*s);
  const panelH=compact?Math.round(160*s):Math.round(210*s);
  const x=compact?14:W-panelW-18;
  const y=compact?H-panelH-18:70;
  const cols=5, rows=3;

  ctx.save();
  ctx.shadowColor='rgba(30,64,175,0.14)';
  ctx.shadowBlur=22;
  ctx.fillStyle='rgba(255,255,255,0.88)';
  ctx.strokeStyle='rgba(37,99,235,0.18)';
  ctx.lineWidth=1;
  rrect(x,y,panelW,panelH,12*s);
  ctx.fill();
  ctx.shadowBlur=0;
  ctx.stroke();

  drawTapeLabel(x+102,y+14,'자기구역 확대',{rot:0,h:22,minW:124});
  ctx.fillStyle='rgba(93,112,136,0.95)';
  ctx.font='11px Pretendard,sans-serif';
  ctx.textAlign='left';
  const status=obj.inField?'자기장 안: 구역 방향 정렬':'자기장 밖: 잔류자화 완화';
  ctx.fillText(status,x+14,y+43);

  const gridX=x+16*s;
  const gridY=y+(compact?57:64)*s;
  const gridW=panelW-32*s;
  const gridH=panelH-(compact?83:102)*s;
  const cellW=gridW/cols;
  const cellH=gridH/rows;
  ctx.lineWidth=1;
  obj.dipoles.slice(0,cols*rows).forEach((d,i)=>{
    const c=i%cols, r=Math.floor(i/cols);
    const cx=gridX+c*cellW+cellW/2;
    const cy=gridY+r*cellH+cellH/2;
    ctx.fillStyle=DC[d.dom%DC.length][0]+'26';
    ctx.strokeStyle='rgba(15,23,42,0.12)';
    ctx.beginPath();
    ctx.rect(gridX+c*cellW,gridY+r*cellH,cellW,cellH);
    ctx.fill();
    ctx.stroke();
    drawDipoleSmall(cx,cy,d.angle,(compact?19:24)*s,'ferro',d.dom);
  });

  const barX=gridX, barY=gridY+gridH+(compact?14:18)*s, barW=gridW, barH=8*s;
  ctx.fillStyle='rgba(226,232,240,0.9)';
  rrect(barX,barY,barW,barH,4); ctx.fill();
  const magW=barW*Math.min(1,obj.mag);
  const grad=ctx.createLinearGradient(barX,0,barX+barW,0);
  grad.addColorStop(0,'#fecaca');
  grad.addColorStop(1,'#ef4444');
  ctx.fillStyle=grad;
  rrect(barX,barY,magW,barH,4); ctx.fill();
  ctx.fillStyle='rgba(93,112,136,0.95)';
  ctx.font='10px Pretendard,sans-serif';
  ctx.fillText('자화 정도',barX,barY+22);

  ctx.restore();
}

  ctx.lineTo(16*scale,0);

  ctx.shadowBlur=0;
  ctx.fillStyle=meta.head;

  ctx.arc(-22*scale,0,5.6*scale,0,Math.PI*2);

function drawTab0(){
  const W=sim.width, H=sim.height;
  ctx.clearRect(0,0,W,H);
  const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.7);
  g.addColorStop(0,'#f8fbff'); g.addColorStop(0.62,'#edf7ff'); g.addColorStop(1,'#e9fbf7');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  updateSandbox();
  updateNails();

  const mg=magnetGeom();
  const {mX,mY,mW,mH,fieldX,fieldY,fieldW,fieldH}=mg;
  const gActive=magnetOn;

  if(gActive){
    ctx.fillStyle='rgba(251,191,36,0.16)';
    ctx.strokeStyle='rgba(217,119,6,0.34)';
    ctx.setLineDash([8,7]);
    rrect(fieldX,fieldY,fieldW,fieldH,14);
    ctx.fill();
    ctx.stroke();
    ctx.setLineDash([]);
    drawTapeLabel(fieldX+fieldW/2,fieldY+20,'자기장 영역',{rot:-0.018,minW:110});
  }

  if(gActive){
    ctx.shadowColor='rgba(251,191,36,0.42)';
    ctx.shadowBlur=40;
  }
  ctx.fillStyle=gActive?'#3060c0':'#1a2a4a';
  ctx.beginPath(); ctx.rect(mX-mW/2, mY-mH/2, mW, mH/2); ctx.fill();
  ctx.fillStyle=gActive?'#c03030':'#2a1a1a';
  ctx.beginPath(); ctx.rect(mX-mW/2, mY, mW, mH/2); ctx.fill();
  ctx.shadowBlur=0;

  ctx.strokeStyle='rgba(15,23,42,0.20)';
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.rect(mX-mW/2,mY-mH/2,mW,mH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(mX-mW/2,mY); ctx.lineTo(mX+mW/2,mY); ctx.stroke();

  ctx.font='bold 24px sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillStyle=gActive?'#6bbbff':'#334466'; ctx.fillText('S',mX,mY-mH/4);
  ctx.fillStyle=gActive?'#ff6b6b':'#443333'; ctx.fillText('N',mX,mY+mH/4);
  ctx.textBaseline='alphabetic';

  if(magnetOn){
    const numLines=9;
    for(let i=0;i<numLines;i++){
      const frac=i/(numLines-1);
      const xx=fieldX+frac*fieldW;
      const alpha=0.15-Math.abs(frac-.5)*0.08;
      ctx.strokeStyle=`rgba(217,119,6,${alpha+0.08})`;
      ctx.lineWidth=1;
      ctx.setLineDash([5,7]);
      ctx.beginPath();
      ctx.moveTo(xx, fieldY+18);
      ctx.lineTo(xx, fieldY+fieldH-18);
      ctx.stroke();
      if(i===Math.floor(numLines/2)){
        ctx.setLineDash([]);
        arrowLine(xx,fieldY+24,xx,fieldY+fieldH-24,'rgba(217,119,6,0.46)',1,6);
      }
    }
    ctx.setLineDash([]);
  }

  drawNailTray();
  drawFerroFieldLines();
  drawInteractionArrows();
  sandboxObjects.forEach(drawSandboxObject);
  drawDomainZoomPanel(W,H);

  ctx.fillStyle='rgba(30,41,59,0.52)';
  ctx.font='12px Pretendard,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('자성체를 소환한 뒤 드래그해서 자기장 영역에 넣고 빼 보세요', W/2, 20);

  if(sandboxObjects.some(o=>o.type==='ferro' && o.mag>.18)){
    ctx.fillStyle='rgba(185,28,28,0.58)';
    ctx.font='11px Pretendard,sans-serif';
    ctx.fillText('자화된 강자성체는 자기장 밖에서도 잠시 작은 자석처럼 작용하지만, 시간이 지나며 서서히 약해집니다', W/2, H-18);
  }
}

// ── helpers ──
function rrect(x,y,w,h,r){
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(x,y,w,h,r);
  else ctx.rect(x,y,w,h);
}
function arrowLine(x1,y1,x2,y2,col,lw,hs){
  hs=hs||7;
  ctx.save(); ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=lw||1.5;
  ctx.shadowColor=col; ctx.shadowBlur=8;
  const ang=Math.atan2(y2-y1,x2-x1);
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2-Math.cos(ang)*hs,y2-Math.sin(ang)*hs); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-Math.cos(ang-0.4)*hs*1.4,y2-Math.sin(ang-0.4)*hs*1.4);
  ctx.lineTo(x2-Math.cos(ang+0.4)*hs*1.4,y2-Math.sin(ang+0.4)*hs*1.4);
  ctx.closePath(); ctx.fill(); ctx.shadowBlur=0; ctx.restore();
}
function dot(x,y,r,col){ ctx.fillStyle=col; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); }
function label(txt,x,y,col,sz,align){
  ctx.save(); ctx.fillStyle=col||'rgba(255,255,255,0.5)';
  ctx.font=(sz||11)+'px Pretendard,sans-serif';
  ctx.textAlign=align||'center'; ctx.fillText(txt,x,y); ctx.restore();
}
function currentDot(x,y,r,intoPage,col){
  col=col||'rgba(255,165,50,0.85)';
  ctx.strokeStyle=col; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke();
  if(intoPage){
    // ⊗ cross
    ctx.beginPath();
    ctx.moveTo(x-r*.65,y-r*.65); ctx.lineTo(x+r*.65,y+r*.65);
    ctx.moveTo(x+r*.65,y-r*.65); ctx.lineTo(x-r*.65,y+r*.65);
    ctx.stroke();
  } else {
    // ⊙ dot
    ctx.fillStyle=col; ctx.beginPath(); ctx.arc(x,y,r*.4,0,Math.PI*2); ctx.fill();
  }
}

// ── SPEAKER ──
function drawSpeaker(W,H){
  const cx=W/2+20, cy=H/2;
  const gapW=18, gapH=110;
  const poleW=40, outerH=160, outerW=20;
  const coneLen=200, coneHalf=80;

  // ── Permanent magnet assembly ──
  // Top outer pole (S)
  ctx.fillStyle='#1a3a6a';
  rrect(cx-poleW/2-gapW/2-outerW, cy-outerH/2, outerW, (outerH-gapH)/2, 3);
  ctx.fill();
  // Bottom outer pole (S)
  rrect(cx-poleW/2-gapW/2-outerW, cy+gapH/2, outerW, (outerH-gapH)/2, 3);
  ctx.fill();
  // Center pole piece (N)
  ctx.fillStyle='#6a1a1a';
  rrect(cx-poleW/2-gapW/2-outerW-poleW, cy-gapH/2, poleW, gapH, 3);
  ctx.fill();

  // Pole labels
  ctx.font='bold 14px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#ff8080'; ctx.fillText('N', cx-poleW/2-gapW/2-outerW-poleW/2, cy);
  ctx.fillStyle='#8080ff'; ctx.fillText('S', cx-poleW/2-gapW/2-outerW/2, cy-gapH/2-12);
  ctx.fillStyle='#8080ff'; ctx.fillText('S', cx-poleW/2-gapW/2-outerW/2, cy+gapH/2+12);
  ctx.textBaseline='alphabetic';

  // Radial B field in gap (arrows: from N outward = right)
  const numB=5;
  for(let i=0;i<numB;i++){
    const yy=cy-gapH/2+14+i*(gapH-28)/(numB-1);
    arrowLine(cx-poleW/2-gapW/2-outerW-2, yy, cx-poleW/2-gapW/2+4, yy,'rgba(255,160,80,0.6)',1.2,5);
  }
  label('B →', cx-poleW/2-gapW/2-outerW/2, cy+gapH/2+28,'rgba(255,160,80,0.5)',10);

  // Voice coil oscillation
  const coilOff=Math.sin(ph*3)*22;
  const coilX=cx-poleW/2-gapW/2+gapW/2;
  const coilY=cy+coilOff;

  // Coil rectangle
  ctx.strokeStyle='rgba(255,165,50,0.9)'; ctx.lineWidth=4;
  ctx.beginPath();
  ctx.rect(coilX-gapW/2, coilY-gapH/2+6, gapW, gapH-12);
  ctx.stroke();

  // Current indicators (⊗/⊙) on top and bottom of coil cross-section
  const iDir=Math.sin(ph*3)>0; // true = current→right in top wire (⊙ top, ⊗ bottom)
  currentDot(coilX, coilY-gapH/2+18, 9, !iDir, 'rgba(255,165,50,0.9)');
  currentDot(coilX, coilY+gapH/2-18, 9,  iDir, 'rgba(255,165,50,0.9)');
  label(iDir?'⊙':'⊗', coilX+18, coilY-gapH/2+22,'rgba(255,200,80,0.6)',9);
  label(iDir?'⊗':'⊙', coilX+18, coilY+gapH/2-14,'rgba(255,200,80,0.6)',9);

  // Force arrow on coil
  const fDir=Math.sign(Math.sin(ph*3));
  if(Math.abs(fDir)>0.1){
    arrowLine(coilX+gapW+5, coilY, coilX+gapW+5+fDir*35, coilY,'#ffdd00',2.5,8);
    label('F=BIL', coilX+gapW+22+fDir*20, coilY-12,'#ffdd00',10);
  }

  // Cone (attached to coil)
  const coneBaseX=cx-poleW/2-gapW/2+gapW+4;
  ctx.fillStyle='rgba(180,200,230,0.18)';
  ctx.strokeStyle='rgba(180,200,230,0.70)'; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(coneBaseX, coilY-gapH/2+6);
  ctx.lineTo(coneBaseX+coneLen, cy-coneHalf);
  ctx.lineTo(coneBaseX+coneLen, cy+coneHalf);
  ctx.lineTo(coneBaseX, coilY+gapH/2-6);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  label('진동판(콘)', coneBaseX+coneLen*.55, cy+coneHalf+16,'rgba(180,200,230,0.55)',10);

  // Sound wave lines to the right
  const sw=coneBaseX+coneLen+12;
  for(let w=0;w<4;w++){
    const wph=ph*4+w*1.2;
    const amp=12+w*8, freq=0.05;
    ctx.strokeStyle=`rgba(100,200,255,${0.5-w*0.1})`; ctx.lineWidth=1.5;
    ctx.beginPath();
    for(let yy=cy-coneHalf;yy<=cy+coneHalf;yy+=2){
      const wx=sw+w*22+Math.sin((yy-cy)*freq*2+wph)*amp;
      yy===cy-coneHalf?ctx.moveTo(wx,yy):ctx.lineTo(wx,yy);
    }
    ctx.stroke();
  }
  label('음파', sw+90, cy-coneHalf-8,'rgba(100,200,255,0.5)',10);

  // Labels
  label('영구자석', cx-poleW/2-gapW/2-outerW-poleW-18, cy,'rgba(255,255,255,0.4)',10,'right');
  label('보이스 코일', coilX, cy+gapH/2+22,'rgba(255,165,50,0.6)',10);

  // Title
  ctx.font='bold 16px Pretendard,sans-serif'; ctx.textAlign='center';
  ctx.fillStyle='#4f9eff'; ctx.shadowColor='#4f9eff'; ctx.shadowBlur=10;
  ctx.fillText('동전형 스피커 단면도', W/2, 26); ctx.shadowBlur=0;
}

// ── MRI ──
function drawMRI(W,H){
  const cx=W/2, cy=H/2;
  const boreW=360, boreH=200;
  const wallT=55;

  // Main solenoid body (side view)
  // Outer body
  ctx.fillStyle='rgba(40,60,100,0.7)';
  rrect(cx-boreW/2-wallT, cy-boreH/2-wallT, boreW+wallT*2, boreH+wallT*2, 18);
  ctx.fill();
  ctx.strokeStyle='rgba(80,140,255,0.3)'; ctx.lineWidth=1.5; ctx.stroke();

  // Bore (patient tunnel) - inner cutout
  ctx.fillStyle='rgba(10,18,35,0.95)';
  rrect(cx-boreW/2, cy-boreH/2, boreW, boreH, 5);
  ctx.fill();

  // Superconducting coil rings (shown as vertical bands)
  const coilPositions=[-150,-90,-30,30,90,150];
  coilPositions.forEach(dx=>{
    const grad=ctx.createLinearGradient(cx+dx-12,0,cx+dx+12,0);
    grad.addColorStop(0,'rgba(50,100,200,0.5)');
    grad.addColorStop(.5,'rgba(80,160,255,0.8)');
    grad.addColorStop(1,'rgba(50,100,200,0.5)');
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.rect(cx+dx-10, cy-boreH/2-wallT, 20, boreH+wallT*2);
    ctx.fill();
  });
  label('초전도 코일', cx, cy-boreH/2-wallT-12,'rgba(80,160,255,0.6)',10);

  // Uniform B₀ field lines inside bore (horizontal, left→right)
  const numLines=7;
  for(let i=0;i<numLines;i++){
    const yy=cy-boreH/2+18+i*(boreH-36)/(numLines-1);
    ctx.strokeStyle='rgba(79,158,255,0.25)'; ctx.lineWidth=1; ctx.setLineDash([8,6]);
    ctx.beginPath(); ctx.moveTo(cx-boreW/2+10,yy); ctx.lineTo(cx+boreW/2-10,yy); ctx.stroke();
    // arrowhead
    if(i===numLines>>1){
      ctx.setLineDash([]);
      arrowLine(cx-boreW/2+10,yy,cx+boreW/2-10,yy,'rgba(79,158,255,0.4)',1,6);
    }
  }
  ctx.setLineDash([]);
  label('B₀ (균일 자기장)', cx, cy-boreH/2+9,'rgba(79,158,255,0.55)',10);

  // Patient body (simplified oval)
  const patW=200, patH=90;
  ctx.fillStyle='rgba(255,220,180,0.18)';
  ctx.strokeStyle='rgba(255,220,180,0.4)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(cx,cy,patW/2,patH/2,0,0,Math.PI*2);
  ctx.fill(); ctx.stroke();
  label('환자 (수소 원자핵 ¹H)', cx, cy+patH/2+14,'rgba(255,220,180,0.4)',10);

  // Precessing spin vectors (inside patient body)
  const spinCount=8;
  for(let i=0;i<spinCount;i++){
    const sx=cx+(i%4-1.5)*44;
    const sy=cy+(i<4?-22:22);
    const tilt=0.5;
    const spinPh=ph*2.5+i*0.7;
    const px=Math.cos(spinPh)*14, py=Math.sin(spinPh)*5;
    // spin axis (tilted from B₀)
    ctx.strokeStyle='rgba(255,200,100,0.7)'; ctx.lineWidth=2;
    ctx.shadowColor='#ffcc40'; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.moveTo(sx,sy+8); ctx.lineTo(sx+px,sy+py-26); ctx.stroke();
    ctx.shadowBlur=0;
    dot(sx+px,sy+py-26,2.5,'rgba(255,200,100,0.8)');
  }
  label('¹H 핵스핀 세차운동', cx, cy-patH/2-8,'rgba(255,200,100,0.55)',10);

  // Larmor frequency label
  label('f = γB₀/2π (라모어 주파수)', cx+boreW/2+10, cy,'rgba(255,255,255,0.3)',10,'left');

  // Liquid helium cryostat label
  ctx.fillStyle='rgba(100,200,255,0.3)'; ctx.font='10px Pretendard,sans-serif';
  ctx.textAlign='left';
  ctx.fillText('액체 헬륨 냉각 (4 K)', cx-boreW/2-wallT+6, cy-boreH/2-wallT+14);

  // Title
  ctx.font='bold 16px Pretendard,sans-serif'; ctx.textAlign='center';
  ctx.fillStyle='#4f9eff'; ctx.shadowColor='#4f9eff'; ctx.shadowBlur=10;
  ctx.fillText('MRI 스캐너 단면도 (초전도 솔레노이드)', W/2, 24); ctx.shadowBlur=0;
}

// ── MAGLEV ──
function drawMaglev(W,H){
  const cy=H*.55;
  const trackY=cy+80;
  const trainW=280, trainH=60;
  const trackH=22, trackW=W*.72;
  const trackX=W*.14;
  const lift=Math.abs(Math.sin(ph*0.5))*4+8; // slowly breathing oscillation for visual
  const trainY=trackY-trainH-lift;
  const trainX=W/2-trainW/2;

  // background city/landscape hint
  ctx.fillStyle='rgba(30,50,100,0.15)';
  for(let b=0;b<8;b++){
    const bx=W*.04+b*(W*.12);
    const bh=30+b%3*25;
    ctx.fillRect(bx, trackY+trackH-bh, 30, bh);
  }

  // Guideway track (T-shape)
  ctx.fillStyle='rgba(60,80,120,0.85)';
  ctx.beginPath(); ctx.rect(trackX, trackY, trackW, trackH); ctx.fill();
  // Track coil pattern (guideway coils)
  const coilSpacing=30;
  for(let xi=trackX+15; xi<trackX+trackW-15; xi+=coilSpacing){
    const side=Math.floor((xi-trackX)/coilSpacing)%2;
    ctx.fillStyle=side?'rgba(255,100,100,0.35)':'rgba(100,100,255,0.35)';
    ctx.beginPath(); ctx.rect(xi-8, trackY+2, 16, trackH-4); ctx.fill();
    ctx.strokeStyle=side?'rgba(255,100,100,0.5)':'rgba(100,100,255,0.5)';
    ctx.lineWidth=1; ctx.stroke();
    // N/S label
    ctx.fillStyle=side?'rgba(255,100,100,0.7)':'rgba(100,100,255,0.7)';
    ctx.font='8px sans-serif'; ctx.textAlign='center';
    ctx.fillText(side?'N':'S', xi, trackY+trackH/2+4);
  }
  label('가이드웨이 (지상 코일)', W/2, trackY+trackH+14,'rgba(180,190,220,0.4)',10);

  // Repulsion force arrows (between track and train bottom)
  const numForce=5;
  for(let i=0;i<numForce;i++){
    const fx=trainX+30+i*(trainW-60)/(numForce-1);
    const flen=lift*2.2;
    arrowLine(fx, trackY-2, fx, trackY-2-flen,'rgba(79,255,150,0.7)',1.5,6);
    arrowLine(fx, trainY+trainH+2, fx, trainY+trainH+2+flen,'rgba(79,255,150,0.5)',1.5,5);
  }
  label('반발력 (부상)', trainX-60, trainY+trainH/2,'rgba(79,255,150,0.6)',10,'right');

  // Train body
  const trainGrad=ctx.createLinearGradient(trainX,trainY,trainX,trainY+trainH);
  trainGrad.addColorStop(0,'rgba(140,180,240,0.9)');
  trainGrad.addColorStop(1,'rgba(60,100,180,0.85)');
  ctx.fillStyle=trainGrad;
  rrect(trainX, trainY, trainW, trainH, 14);
  ctx.fill();
  ctx.strokeStyle='rgba(180,220,255,0.5)'; ctx.lineWidth=1.5; ctx.stroke();

  // Train windows
  for(let w=0;w<5;w++){
    ctx.fillStyle='rgba(200,230,255,0.4)';
    ctx.beginPath(); ctx.rect(trainX+35+w*48, trainY+12, 30, 22); ctx.fill();
  }
  // Nose
  ctx.fillStyle='rgba(100,150,220,0.9)';
  ctx.beginPath();
  ctx.moveTo(trainX, trainY+5);
  ctx.quadraticCurveTo(trainX-30, trainY+trainH/2, trainX, trainY+trainH-5);
  ctx.fill();

  // Superconducting coils on train bottom
  const scCount=4;
  for(let i=0;i<scCount;i++){
    const sx=trainX+30+i*(trainW-60)/(scCount-1)-20;
    ctx.strokeStyle='rgba(100,200,255,0.7)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.rect(sx, trainY+trainH-10, 40, 9); ctx.stroke();
  }
  label('초전도 전자석', W/2, trainY-10,'rgba(100,200,255,0.55)',10);

  // levitation gap indicator
  const gapMidY=(trainY+trainH+trackY)/2;
  ctx.strokeStyle='rgba(79,255,150,0.4)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(trainX+trainW+12,trainY+trainH); ctx.lineTo(trainX+trainW+12,trackY); ctx.stroke();
  ctx.setLineDash([]);
  label(`≈ ${(lift+2).toFixed(0)} cm 부상`, trainX+trainW+22, gapMidY,'rgba(79,255,150,0.6)',10,'left');

  // Speed label
  label('600+ km/h', W/2, trainY+trainH/2+5,'rgba(255,255,255,0.5)',14);

  // Propulsion arrow
  arrowLine(trainX-25,trainY+trainH*.3,trainX-80,trainY+trainH*.3,'rgba(255,200,50,0.7)',2.5,8);
  label('추진력 (LIM)', trainX-55, trainY+trainH*.3-12,'rgba(255,200,50,0.5)',10);

  // Title
  ctx.font='bold 16px Pretendard,sans-serif'; ctx.textAlign='center';
  ctx.fillStyle='#4f9eff'; ctx.shadowColor='#4f9eff'; ctx.shadowBlur=10;
  ctx.fillText('초전도 자기부상열차 (SCMaglev)', W/2, 26); ctx.shadowBlur=0;
}

// ── DC MOTOR ──
function drawMotor(W,H){
  const cx=W/2+30, cy=H/2+10;
  const poleGap=130; // distance between N and S pole inner faces
  const poleW=55, poleH=200;
  const coilW=100, coilH=80;
  const coilAngle=ph*1.2; // rotation angle

  // Draw horseshoe magnet poles (N left, S right)
  // N pole (left)
  ctx.fillStyle='rgba(180,40,40,0.8)';
  rrect(cx-poleGap/2-poleW, cy-poleH/2, poleW, poleH, 6); ctx.fill();
  // connecting top yoke
  ctx.fillStyle='rgba(140,40,40,0.6)';
  ctx.beginPath(); ctx.rect(cx-poleGap/2-poleW, cy-poleH/2-30, poleW*2+poleGap, 30); ctx.fill();
  ctx.beginPath(); ctx.rect(cx-poleGap/2-poleW, cy+poleH/2, poleW*2+poleGap, 30); ctx.fill();
  // S pole (right)
  ctx.fillStyle='rgba(40,40,180,0.8)';
  rrect(cx+poleGap/2, cy-poleH/2, poleW, poleH, 6); ctx.fill();

  // Labels
  ctx.font='bold 26px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#ff8080'; ctx.fillText('N', cx-poleGap/2-poleW/2, cy);
  ctx.fillStyle='#8080ff'; ctx.fillText('S', cx+poleGap/2+poleW/2, cy);
  ctx.textBaseline='alphabetic';

  // B field arrows (from N to S = left to right)
  const numBf=6;
  for(let i=0;i<numBf;i++){
    const yy=cy-80+i*32;
    arrowLine(cx-poleGap/2+4,yy,cx+poleGap/2-4,yy,'rgba(255,100,100,0.3)',1,6);
  }
  label('B →', cx, cy-90,'rgba(255,160,80,0.45)',10);

  // Rotating rectangular coil
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(coilAngle);

  // Coil sides
  const hw=coilW/2, hh=coilH/2;
  // AB side (top in initial position) — coming out of page (⊙) when going up
  const abDir = Math.cos(coilAngle)>=0; // current in AB: depends on rotation phase
  ctx.strokeStyle='rgba(255,165,50,0.95)'; ctx.lineWidth=5;
  ctx.shadowColor='#ffa532'; ctx.shadowBlur=10;
  // AB (top conductor)
  ctx.beginPath(); ctx.moveTo(-hw,-hh); ctx.lineTo(hw,-hh); ctx.stroke();
  // CD (bottom conductor)
  ctx.beginPath(); ctx.moveTo(-hw,hh); ctx.lineTo(hw,hh); ctx.stroke();
  // Left/right end connectors
  ctx.strokeStyle='rgba(255,165,50,0.4)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(-hw,-hh); ctx.lineTo(-hw,hh); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( hw,-hh); ctx.lineTo( hw,hh); ctx.stroke();
  ctx.shadowBlur=0;

  // Current direction on AB and CD
  currentDot(0,-hh, 10, !abDir, 'rgba(255,165,50,0.9)');
  currentDot(0, hh, 10,  abDir, 'rgba(255,165,50,0.9)');

  // Force arrows on AB and CD
  const fmag=38;
  const fAB=abDir?-1:1; // force direction on AB
  arrowLine(40,-hh,40,-hh+fAB*fmag,'rgba(79,255,150,0.9)',2.5,8);
  arrowLine(40, hh,40, hh-fAB*fmag,'rgba(79,255,150,0.9)',2.5,8);
  label('F=BIL',52,-hh+fAB*fmag/2,'rgba(79,255,150,0.7)',9,'left');

  ctx.restore(); // end rotation

  // Axle dot
  dot(cx,cy,7,'rgba(255,200,100,0.9)');
  dot(cx,cy,3,'rgba(255,240,180,1.0)');

  // Commutator (below center)
  const comY=cy+130;
  ctx.fillStyle='rgba(200,150,60,0.5)';
  rrect(cx-20,comY-15,18,30,4); ctx.fill();
  rrect(cx+2, comY-15,18,30,4); ctx.fill();
  // brushes
  ctx.fillStyle='rgba(150,150,160,0.6)';
  ctx.beginPath(); ctx.rect(cx-28,comY-8,8,16); ctx.fill();
  ctx.beginPath(); ctx.rect(cx+20,comY-8,8,16); ctx.fill();
  label('정류자', cx, comY+22,'rgba(200,150,60,0.5)',10);
  label('브러시',cx+34,comY,'rgba(150,150,160,0.5)',9,'left');

  // Torque rotation arc
  ctx.strokeStyle='rgba(79,255,150,0.35)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(cx,cy,60,coilAngle,coilAngle+Math.PI*.8); ctx.stroke();
  arrowLine(cx+Math.cos(coilAngle+Math.PI*.8)*60,cy+Math.sin(coilAngle+Math.PI*.8)*60,
            cx+Math.cos(coilAngle+Math.PI*.83)*58,cy+Math.sin(coilAngle+Math.PI*.83)*58,
            'rgba(79,255,150,0.5)',1.5,5);
  label('토크',cx+72,cy-40,'rgba(79,255,150,0.5)',10);

  // Formula label
  label('τ = NBIA (N: 권수)', cx, cy+poleH/2+50,'rgba(255,255,255,0.25)',11);

  // Title
  ctx.font='bold 16px Pretendard,sans-serif'; ctx.textAlign='center';
  ctx.fillStyle='#4f9eff'; ctx.shadowColor='#4f9eff'; ctx.shadowBlur=10;
  ctx.fillText('DC 전동기 작동 원리', W/2, 26); ctx.shadowBlur=0;
}

  ctx.fillStyle='#92400e';
  ctx.font='bold 10px Pretendard,sans-serif';

  ctx.fillStyle='rgba(148,163,184,0.25)';
  ctx.strokeStyle='rgba(71,85,105,0.72)';

  ctx.beginPath();
  ctx.moveTo(coneX,cy-38);
