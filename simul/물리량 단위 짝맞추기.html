<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>단위 짝꿍을 찾아라! | 시(물리)에이션</title>
  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");

    :root {
      --purple: #7c3aed;
      --purple-mid: #a78bfa;
      --teal: #059669;
      --teal-mid: #34d399;
      --ink: #1a1535;
      --sub: #64748b;
      --muted: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: "Pretendard", 'Segoe UI', 'Noto Sans KR', system-ui, sans-serif;
      background: #f0f4ff;
      color: var(--ink);
    }

    /* ── 헤더 ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 57px;
      background: #fff;
      border-bottom: 2px solid #ede9fe;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 200;
      box-shadow: 0 2px 10px rgba(124,58,237,.07);
    }
    .back-btn {
      background: #f5f3ff;
      border: 2px solid #ddd6fe;
      color: #6d28d9;
      padding: 6px 16px;
      border-radius: 99px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: all 0.15s;
      font-family: inherit;
    }
    .back-btn:hover { background: #ede9fe; }
    .header-title { font-size: 17px; font-weight: 800; color: var(--ink); }
    .header-sub   { font-size: 11px; color: var(--muted); margin-top: 1px; font-weight: 600; }

    /* ── 공통 화면 ── 헤더 아래 고정 위치에 겹쳐서 하나씩만 표시 */
    .screen {
      display: none;
      position: fixed;
      top: 57px; left: 0; right: 0; bottom: 0;
      overflow-y: auto;
      width: 100%;
    }
    .screen.active { display: block; }

    /* ══════════════════════════════════════════
       인트로 화면  —  밝고 활기찬 테마
    ══════════════════════════════════════════ */
    #intro-screen {
      background: linear-gradient(160deg, #fef9c3 0%, #fce7f3 45%, #ede9fe 100%);
      overflow: hidden;
    }
    #intro-screen.active { display: flex; align-items: center; justify-content: center; }

    /* 배경 장식 원들 */
    #intro-screen::before {
      content: '';
      position: absolute;
      width: 520px; height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(167,139,250,.22) 0%, transparent 70%);
      top: -120px; right: -100px;
      pointer-events: none;
    }
    #intro-screen::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(52,211,153,.18) 0%, transparent 70%);
      bottom: -80px; left: -80px;
      pointer-events: none;
    }

    #intro-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .intro-content {
      position: relative;
      z-index: 1;
      max-width: 600px;
      width: 100%;
      padding: 48px 24px;
      text-align: center;
    }

    /* 탑 배지 */
    .intro-top-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fff;
      border: 2px solid #ddd6fe;
      color: var(--purple);
      font-size: 12px;
      font-weight: 800;
      padding: 5px 16px;
      border-radius: 99px;
      margin-bottom: 18px;
      box-shadow: 0 2px 10px rgba(124,58,237,.1);
    }

    /* 메인 타이틀 */
    .intro-title {
      font-size: clamp(34px, 6.5vw, 56px);
      font-weight: 900;
      color: var(--ink);
      line-height: 1.1;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
    }
    /* "짝꿍" 강조: 노란 마커 효과 */
    .intro-title .mark {
      position: relative;
      display: inline-block;
      color: var(--purple);
      z-index: 0;
    }
    .intro-title .mark::before {
      content: '';
      position: absolute;
      left: -3px; right: -3px;
      bottom: 4px;
      height: 40%;
      background: #fde68a;
      border-radius: 4px;
      z-index: -1;
      transform: rotate(-1deg);
    }

    .intro-subtitle {
      font-size: 14px;
      color: var(--sub);
      font-weight: 700;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    .intro-desc {
      color: var(--sub);
      font-size: 14px;
      margin-bottom: 30px;
      line-height: 1.8;
      background: rgba(255,255,255,.6);
      border-radius: 14px;
      padding: 12px 20px;
      border: 1.5px solid rgba(255,255,255,.9);
    }

    /* 범례 */
    .legend-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    .legend-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 800;
      padding: 5px 14px;
      border-radius: 99px;
    }
    .legend-chip.name { background: #ede9fe; color: #6d28d9; border: 1.5px solid #ddd6fe; }
    .legend-chip.unit { background: #d1fae5; color: #065f46; border: 1.5px solid #a7f3d0; }

    /* ── 난이도 버튼 ── */
    .diff-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

    .diff-btn {
      position: relative;
      border: none;
      border-radius: 20px;
      padding: 0;
      cursor: pointer;
      font-family: inherit;
      overflow: hidden;
      transition: transform 0.2s cubic-bezier(0.22,1,0.36,1), box-shadow 0.2s;
      box-shadow: 0 6px 20px rgba(0,0,0,.1);
    }
    /* 각 버튼 배경 색상 */
    .diff-btn:nth-child(1) { background: linear-gradient(160deg, #d1fae5, #a7f3d0); }
    .diff-btn:nth-child(2) { background: linear-gradient(160deg, #ede9fe, #ddd6fe); }
    .diff-btn:nth-child(3) { background: linear-gradient(160deg, #fce7f3, #fbcfe8); }

    .diff-btn:hover {
      transform: translateY(-7px) scale(1.03);
    }
    .diff-btn:nth-child(1):hover { box-shadow: 0 18px 40px rgba(52,211,153,.35); }
    .diff-btn:nth-child(2):hover { box-shadow: 0 18px 40px rgba(124,58,237,.3); }
    .diff-btn:nth-child(3):hover { box-shadow: 0 18px 40px rgba(236,72,153,.3); }

    .diff-btn-body { padding: 32px 16px 30px; text-align: center; }

    .diff-icon {
      font-size: 56px;
      line-height: 1;
      margin-bottom: 14px;
      display: block;
    }
    .diff-name { font-size: 22px; font-weight: 900; margin-bottom: 8px; }
    .diff-btn:nth-child(1) .diff-name { color: #064e3b; }
    .diff-btn:nth-child(2) .diff-name { color: #4c1d95; }
    .diff-btn:nth-child(3) .diff-name { color: #831843; }

    .diff-info { font-size: 13px; font-weight: 700; margin-bottom: 0; opacity: .7; }
    .diff-btn:nth-child(1) .diff-info { color: #065f46; }
    .diff-btn:nth-child(2) .diff-info { color: #5b21b6; }
    .diff-btn:nth-child(3) .diff-info { color: #9d174d; }

    /* ══════════════════════════════════════════
       게임 화면  —  한 화면에 카드 전체 표시
    ══════════════════════════════════════════ */
    #game-screen {
      padding: 10px 14px 8px;
      background: #f0f4ff;
      overflow: hidden;
    }
    #game-screen.active {
      display: flex;
      flex-direction: column;
      /* top:57px; bottom:0 으로 이미 높이 확정 — height 별도 지정 불필요 */
    }

    .game-topbar {
      display: flex; align-items: center; justify-content: space-between;
      max-width: 900px; width: 100%; margin: 0 auto 8px; gap: 10px; flex-wrap: wrap;
      flex-shrink: 0;
    }
    .stat-group { display: flex; gap: 8px; }
    .stat {
      text-align: center;
      background: #fff;
      border-radius: 12px;
      padding: 6px 16px;
      border: 2px solid #ede9fe;
      box-shadow: 0 2px 8px rgba(124,58,237,.06);
      min-width: 60px;
    }
    .stat-val   { font-size: 20px; font-weight: 900; font-variant-numeric: tabular-nums; color: var(--ink); }
    .stat-label { font-size: 9px; color: var(--muted); margin-top: 1px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; }
    .stat-val.timer-val { color: var(--purple); }

    .restart-btn {
      background: #fff; border: 2px solid #ddd6fe; padding: 7px 16px;
      border-radius: 99px; cursor: pointer; font-size: 13px; font-weight: 700;
      color: var(--purple); transition: all 0.15s; font-family: inherit;
      flex-shrink: 0;
    }
    .restart-btn:hover { background: #f5f3ff; }

    /* 진행 바 */
    .progress-wrap {
      max-width: 900px; width: 100%; margin: 0 auto 8px; height: 8px;
      background: #e8e4f8; border-radius: 99px; overflow: hidden;
      flex-shrink: 0;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #a78bfa, #34d399);
      border-radius: 99px;
      transition: width 0.4s cubic-bezier(0.22,1,0.36,1);
      width: 0%;
    }

    /* ── 카운트다운 오버레이 ── */
    #preview-overlay {
      position: fixed; inset: 0;
      background: rgba(240,238,255,.15);
      display: flex; flex-direction: column; align-items: center;
      justify-content: flex-start; padding-top: 80px;
      gap: 8px; z-index: 999; pointer-events: none;
    }
    #preview-overlay.hidden { display: none; }
    .preview-msg {
      color: #5b21b6; font-size: 15px; font-weight: 800;
      background: #fff; padding: 7px 22px; border-radius: 99px;
      border: 2px solid #ddd6fe; box-shadow: 0 4px 16px rgba(124,58,237,.15);
    }
    .preview-count {
      font-size: 68px; font-weight: 900; color: var(--purple); line-height: 1;
      filter: drop-shadow(0 4px 12px rgba(124,58,237,.3));
    }
    .preview-count.pop { animation: count-pop 0.35s cubic-bezier(0.22,1,0.36,1); }
    @keyframes count-pop {
      0%   { transform: scale(1.6); opacity: .5; }
      100% { transform: scale(1);   opacity: 1;  }
    }

    /* ── 카드 그리드 ── */
    #card-grid {
      display: grid;
      grid-auto-rows: 1fr;   /* 남은 높이를 행이 균등 분배 */
      gap: 8px;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      flex: 1;               /* 게임화면 남은 공간 모두 차지 */
      min-height: 0;
    }

    /* ── 카드 ── */
    .card-wrap {
      perspective: 700px;
      min-height: 0;         /* aspect-ratio 제거 → 그리드 행 높이에 맞춤 */
    }
    .card-inner {
      width: 100%; height: 100%; position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
      cursor: pointer; border-radius: 12px;
    }
    .card-inner.flipped { transform: rotateY(180deg); }

    .card-face, .card-reveal {
      position: absolute; inset: 0; border-radius: 12px;
      backface-visibility: hidden;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 5px; user-select: none;
    }

    .card-face {
      background: linear-gradient(145deg, #ddd6fe, #c7d2fe);
      border: 2px solid rgba(255,255,255,.7);
      box-shadow: 0 4px 14px rgba(124,58,237,.14), inset 0 1px 0 rgba(255,255,255,.6);
    }
    .card-face-pattern { font-size: clamp(20px, 3.5vw, 32px); opacity: .45; }

    .card-reveal { transform: rotateY(180deg); }
    .card-reveal.type-name {
      background: linear-gradient(145deg, #f5f3ff, #ede9f8);
      border: 2px solid #c4b5fd;
      box-shadow: 0 4px 14px rgba(124,58,237,.13);
    }
    .card-reveal.type-unit {
      background: linear-gradient(145deg, #f0fdf4, #d1fae5);
      border: 2px solid #6ee7b7;
      box-shadow: 0 4px 14px rgba(5,150,105,.11);
    }
    .card-text { font-size: clamp(13px, 2.8vw, 22px); font-weight: 900; text-align: center; line-height: 1.2; padding: 0 6px; }
    .card-badge { font-size: clamp(8px, 1.2vw, 10px); font-weight: 700; padding: 2px 8px; border-radius: 99px; }
    .type-name .card-text  { color: #5b21b6; }
    .type-name .card-badge { background: #ddd6fe; color: #6d28d9; }
    .type-unit .card-text  { color: #065f46; }
    .type-unit .card-badge { background: #a7f3d0; color: #047857; }

    .card-inner.matched { cursor: default; pointer-events: none; animation: match-pop 0.5s cubic-bezier(0.22,1,0.36,1); }
    .card-inner.matched .card-reveal { background: linear-gradient(145deg,#ecfdf5,#d1fae5) !important; border-color: #34d399 !important; box-shadow: 0 0 0 3px rgba(52,211,153,.25) !important; }
    .card-inner.matched .card-text  { color: #065f46 !important; }
    .card-inner.matched .card-badge { background: #a7f3d0 !important; color: #047857 !important; }

    @keyframes match-pop {
      0%   { transform: rotateY(180deg) scale(1); }
      40%  { transform: rotateY(180deg) scale(1.12); }
      100% { transform: rotateY(180deg) scale(1); }
    }
    .card-inner.shake { animation: card-shake 0.38s ease; }
    @keyframes card-shake {
      0%,100% { transform: rotateY(180deg) translateX(0); }
      25%     { transform: rotateY(180deg) translateX(-7px); }
      75%     { transform: rotateY(180deg) translateX(7px); }
    }

    /* ══════════════════════════════════════════
       모바일 반응형
    ══════════════════════════════════════════ */
    @media (max-width: 520px) {
      /* 헤더 */
      header { padding: 10px 14px; }
      .header-title { font-size: 15px; }

      /* 인트로 */
      .intro-content { padding: 32px 16px 28px; }
      .intro-title { font-size: clamp(30px, 9vw, 44px); }
      .intro-desc { font-size: 13px; padding: 10px 14px; }
      .diff-grid { gap: 8px; }
      .diff-btn-body { padding: 22px 10px 20px; }
      .diff-icon { font-size: 40px; margin-bottom: 10px; }
      .diff-name { font-size: 18px; }
      .diff-info { font-size: 12px; }
      .legend-row { gap: 6px; margin-bottom: 20px; }

      /* 게임 화면 */
      #game-screen { padding: 8px 8px 6px; }
      .game-topbar { margin-bottom: 6px; gap: 6px; }
      .stat { padding: 5px 10px; min-width: 52px; }
      .stat-val { font-size: 17px; }
      .stat-label { font-size: 8px; }
      .restart-btn { padding: 6px 12px; font-size: 12px; }
      .progress-wrap { margin-bottom: 6px; height: 6px; }
      #card-grid { gap: 5px; }
      .card-text { font-size: clamp(10px, 3.5vw, 16px); }
      .card-badge { font-size: clamp(7px, 1.8vw, 9px); }
      .card-inner { border-radius: 8px; }
      .card-face, .card-reveal { border-radius: 8px; }
    }

    @media (max-width: 360px) {
      .diff-grid { grid-template-columns: 1fr; max-width: 240px; margin: 0 auto; }
      .diff-btn-body { padding: 16px 24px; }
      .diff-icon { display: inline; margin-right: 8px; font-size: 28px; }
      .diff-name { display: inline; font-size: 18px; }
      .diff-info { margin-top: 4px; }
    }

    /* ══════════════════════════════════════════
       완료 화면
    ══════════════════════════════════════════ */
    #complete-screen { overflow-y: auto; background: #f0f4ff; }
    .complete-inner { max-width: 520px; margin: 0 auto; padding: 52px 24px; text-align: center; }
    .complete-emoji { font-size: 72px; margin-bottom: 10px; line-height: 1; }
    .stars-row { font-size: 40px; letter-spacing: 6px; margin-bottom: 16px; }
    .complete-title { font-size: 32px; font-weight: 900; margin-bottom: 6px; color: var(--ink); letter-spacing: -0.03em; }
    .complete-sub { color: var(--sub); font-size: 15px; margin-bottom: 28px; font-weight: 600; }

    .score-display {
      background: linear-gradient(135deg, #ede9fe, #d1fae5);
      border: 2px solid rgba(124,58,237,.2);
      border-radius: 24px; padding: 28px 40px; margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(124,58,237,.1);
    }
    .score-label { font-size: 11px; font-weight: 800; color: var(--purple); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
    .score-value {
      font-size: 58px; font-weight: 900;
      background: linear-gradient(125deg, #7c3aed, #34d399);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1.1;
      animation: score-pop 0.6s cubic-bezier(0.22,1,0.36,1);
    }
    @keyframes score-pop { 0% { transform: scale(.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .score-save-msg { font-size: 13px; margin-top: 6px; font-weight: 700; min-height: 20px; }
    .score-save-msg.new-best { color: var(--teal); }
    .score-save-msg.no-login { color: var(--muted); }

    .result-cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 28px; }
    .result-card { background: #fff; border: 2px solid #ede9fe; border-radius: 16px; padding: 18px 8px; }
    .result-val   { font-size: 20px; font-weight: 900; color: var(--ink); }
    .result-label { font-size: 11px; color: var(--muted); margin-top: 4px; font-weight: 700; }

    .btn-row { display: flex; gap: 10px; justify-content: center; }
    .btn-primary {
      background: linear-gradient(125deg, #7c3aed, #a78bfa); color: #fff; border: none;
      padding: 14px 36px; border-radius: 99px; font-size: 15px; font-weight: 800;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
      box-shadow: 0 4px 20px rgba(124,58,237,.3);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(124,58,237,.4); }
    .btn-secondary {
      background: #fff; border: 2px solid #ddd6fe; color: var(--purple);
      padding: 14px 28px; border-radius: 99px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .btn-secondary:hover { background: #f5f3ff; }
  </style>
</head>
<body>

<header>
  <button class="back-btn" onclick="goBack()">← 뒤로</button>
  <div>
    <div class="header-title">단위 짝꿍을 찾아라!</div>
    <div class="header-sub">물리량 단위 짝맞추기 카드 게임</div>
  </div>
</header>

<!-- 난이도 선택 -->
<div id="intro-screen" class="screen active">
  <canvas id="intro-canvas"></canvas>
  <div class="intro-content">
    <div class="intro-top-badge">⚛ Physics Card Match</div>
    <h1 class="intro-title">단위 <span class="mark">짝꿍</span>을<br>찾아라!</h1>
    <div class="intro-subtitle">물리량 단위 짝맞추기</div>
    <div class="intro-desc">
      카드를 뒤집어 물리량 이름 🟣 과 SI 단위 🟢 짝을 맞춰보세요<br>
      빠르고 정확할수록 높은 점수!
    </div>
    <div class="legend-row">
      <div class="legend-chip name">🟣 물리량 이름</div>
      <div class="legend-chip unit">🟢 SI 단위</div>
    </div>
    <div class="diff-grid">
      <button class="diff-btn" onclick="startGame(8)">
        <div class="diff-btn-body">
          <span class="diff-icon">🌱</span>
          <div class="diff-name">쉬움</div>
          <div class="diff-info">8쌍 · 16장</div>
        </div>
      </button>
      <button class="diff-btn" onclick="startGame(12)">
        <div class="diff-btn-body">
          <span class="diff-icon">⚡</span>
          <div class="diff-name">보통</div>
          <div class="diff-info">12쌍 · 24장</div>
        </div>
      </button>
      <button class="diff-btn" onclick="startGame(18)">
        <div class="diff-btn-body">
          <span class="diff-icon">🔥</span>
          <div class="diff-name">어려움</div>
          <div class="diff-info">18쌍 · 36장</div>
        </div>
      </button>
    </div>
  </div>
</div>

<!-- 게임 화면 -->
<div id="game-screen" class="screen">
  <div class="game-topbar">
    <div class="stat-group">
      <div class="stat">
        <div class="stat-val timer-val" id="timer">0:00</div>
        <div class="stat-label">시간</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="moves">0</div>
        <div class="stat-label">시도</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="matched-count">0</div>
        <div class="stat-label">완료</div>
      </div>
    </div>
    <button class="restart-btn" onclick="restart()">↺ 다시하기</button>
  </div>
  <div class="progress-wrap">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <div id="card-grid"></div>
</div>

<!-- 카운트다운 오버레이 -->
<div id="preview-overlay" class="hidden">
  <div class="preview-msg">잘 기억해두세요! 👀</div>
  <div class="preview-count" id="preview-count">5</div>
</div>

<!-- 완료 화면 -->
<div id="complete-screen" class="screen">
  <div class="complete-inner">
    <div class="complete-emoji">🎉</div>
    <div class="stars-row" id="stars"></div>
    <div class="complete-title">완성!</div>
    <div class="complete-sub" id="complete-sub"></div>
    <div class="score-display">
      <div class="score-label">이번 점수</div>
      <div class="score-value" id="r-score">0</div>
      <div class="score-save-msg" id="score-save-msg"></div>
    </div>
    <div class="result-cards">
      <div class="result-card">
        <div class="result-val" id="r-time">-</div>
        <div class="result-label">걸린 시간</div>
      </div>
      <div class="result-card">
        <div class="result-val" id="r-moves">-</div>
        <div class="result-label">시도 횟수</div>
      </div>
      <div class="result-card">
        <div class="result-val" id="r-acc">-</div>
        <div class="result-label">정확도</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="goIntro()">← 메뉴</button>
      <button class="btn-primary"   onclick="restart()">다시하기</button>
    </div>
  </div>
</div>

<script>
const ALL_PAIRS = [
  { name: "힘",           unit: "N"    },
  { name: "에너지",       unit: "J"    },
  { name: "속력",         unit: "m/s"  },
  { name: "가속도",       unit: "m/s²" },
  { name: "질량",         unit: "kg"   },
  { name: "압력",         unit: "Pa"   },
  { name: "전하량",       unit: "C"    },
  { name: "전압",         unit: "V"    },
  { name: "전류",         unit: "A"    },
  { name: "온도",         unit: "K"    },
  { name: "저항",         unit: "Ω"   },
  { name: "진동수",       unit: "Hz"   },
  { name: "전력",         unit: "W"    },
  { name: "자기선속밀도", unit: "T"    },
  { name: "방사능",       unit: "Bq"   },
  { name: "넓이",         unit: "m²"  },
  { name: "부피",         unit: "m³"  },
  { name: "물질량",       unit: "mol"  },
];

let pairCount = 0, cards = [], flipped = [], matchedCount = 0, moves = 0;
let locked = false, timerInterval = null, previewTick = null, seconds = 0;

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function show(id) {
  ['intro-screen','game-screen','complete-screen'].forEach(s =>
    document.getElementById(s).classList.toggle('active', s === id));
}

function startGame(n) {
  pairCount = n;
  flipped = []; matchedCount = 0; moves = 0; locked = true;
  clearInterval(timerInterval);
  clearInterval(previewTick);   // 이전 프리뷰 타이머 초기화
  previewTick = null;
  seconds = 0; updateTimer();
  updateStats();
  buildGrid(n);
  show('game-screen');
  startPreview();
}

function startPreview() {
  document.querySelectorAll('.card-inner').forEach(c => c.classList.add('flipped'));
  const overlay = document.getElementById('preview-overlay');
  const countEl = document.getElementById('preview-count');
  overlay.classList.remove('hidden');
  let count = 5;
  countEl.textContent = count;

  clearInterval(previewTick);   // 혹시 남아있는 것 제거
  previewTick = setInterval(() => {
    count--;
    if (count <= 0) {
      clearInterval(previewTick);
      previewTick = null;
      overlay.classList.add('hidden');
      document.querySelectorAll('.card-inner').forEach(c => c.classList.remove('flipped'));
      setTimeout(() => {
        locked = false;
        timerInterval = setInterval(() => { seconds++; updateTimer(); }, 1000);
      }, 450);
    } else {
      countEl.textContent = count;
      countEl.classList.remove('pop');
      void countEl.offsetWidth;
      countEl.classList.add('pop');
    }
  }, 1000);
}

function buildGrid(n) {
  const pairs = shuffle(ALL_PAIRS).slice(0, n);
  cards = shuffle(
    pairs.flatMap((p, i) => [
      { id: i*2,   pairId: i, type: 'name', text: p.name },
      { id: i*2+1, pairId: i, type: 'unit', text: p.unit },
    ])
  );

  const cols = n <= 8 ? 4 : 6;
  const grid = document.getElementById('card-grid');
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.innerHTML = '';
  document.getElementById('progress-fill').style.width = '0%';

  cards.forEach((card, idx) => {
    const wrap  = document.createElement('div');
    wrap.className = 'card-wrap';
    const inner = document.createElement('div');
    inner.className = 'card-inner';
    inner.innerHTML = `
      <div class="card-face"><div class="card-face-pattern">✦</div></div>
      <div class="card-reveal type-${card.type}">
        <div class="card-text">${card.text}</div>
        <div class="card-badge">${card.type === 'name' ? '물리량' : 'SI 단위'}</div>
      </div>`;
    inner.addEventListener('click', () => flip(idx, inner));
    wrap.appendChild(inner);
    grid.appendChild(wrap);
  });
}

function flip(idx, el) {
  if (locked || el.classList.contains('flipped') || el.classList.contains('matched')) return;
  el.classList.add('flipped');
  flipped.push({ idx, el });
  if (flipped.length === 2) { locked = true; moves++; updateStats(); checkMatch(); }
}

function checkMatch() {
  const [a, b] = flipped;
  if (cards[a.idx].pairId === cards[b.idx].pairId) {
    setTimeout(() => {
      a.el.classList.add('matched');
      b.el.classList.add('matched');
      matchedCount++;
      updateStats();
      flipped = []; locked = false;
      if (matchedCount === pairCount) setTimeout(showComplete, 600);
    }, 280);
  } else {
    setTimeout(() => {
      a.el.classList.add('shake');
      b.el.classList.add('shake');
      setTimeout(() => {
        a.el.classList.remove('flipped','shake');
        b.el.classList.remove('flipped','shake');
        flipped = []; locked = false;
      }, 380);
    }, 650);
  }
}

function updateStats() {
  document.getElementById('moves').textContent = moves;
  document.getElementById('matched-count').textContent = matchedCount;
  document.getElementById('progress-fill').style.width =
    (pairCount > 0 ? matchedCount / pairCount * 100 : 0) + '%';
}

function updateTimer() {
  const m = Math.floor(seconds/60), s = seconds%60;
  document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
}

// ── 점수 계산 ──
const SCORE_CFG = {
  8:  { base: 0,    timeBonus: 300, timeLimit: 150, accBonus: 200 },
  12: { base: 501,  timeBonus: 420, timeLimit: 200, accBonus: 279 },
  18: { base: 1201, timeBonus: 480, timeLimit: 300, accBonus: 319 },
};

function calcScore(n, secs, mv) {
  const c = SCORE_CFG[n];
  if (!c) return 0;
  const timePct = Math.max(0, 1 - secs / c.timeLimit);
  const accPct  = Math.min(1, n / mv);
  return c.base + Math.round(c.timeBonus * timePct + c.accBonus * accPct);
}

function showComplete() {
  clearInterval(timerInterval);
  const m = Math.floor(seconds/60), s = seconds%60;
  const timeStr = m > 0 ? `${m}분 ${s}초` : `${s}초`;
  const acc   = Math.round(pairCount / moves * 100);
  const stars = moves <= pairCount*1.4 ? 3 : moves <= pairCount*2.2 ? 2 : 1;
  const score = calcScore(pairCount, seconds, moves);

  document.getElementById('r-time').textContent  = timeStr;
  document.getElementById('r-moves').textContent = moves + '번';
  document.getElementById('r-acc').textContent   = acc + '%';
  document.getElementById('r-score').textContent = score.toLocaleString() + '점';
  document.getElementById('stars').textContent   = '⭐'.repeat(stars) + '☆'.repeat(3-stars);
  document.getElementById('complete-sub').textContent =
    ['','한 번 더 도전해봐요!','훌륭해요! 잘 했어요!','완벽해요! 물리 고수! 🏆'][stars];
  document.getElementById('score-save-msg').textContent = '';
  document.getElementById('score-save-msg').className  = 'score-save-msg';

  show('complete-screen');
  saveScore(score);
}

// ── Firebase 점수 저장 (최고 점수만) ──
async function saveScore(score) {
  const msgEl = document.getElementById('score-save-msg');
  if (!window._fbUser) {
    msgEl.textContent = '로그인하면 점수가 저장됩니다.';
    msgEl.classList.add('no-login');
    return;
  }
  try {
    const ref  = window._fbDoc(window._fbDb, 'users', window._fbUser.uid, 'simulations', '물리량_단위_짝맞추기');
    const snap = await window._fbGetDoc(ref);
    const best = snap.exists() ? (snap.data().score ?? 0) : 0;
    if (score > best) {
      await window._fbSetDoc(ref, { score, updatedAt: window._fbServerTimestamp() });
      msgEl.textContent = '🎉 새 최고 점수! 저장되었습니다.';
      msgEl.classList.add('new-best');
    } else {
      msgEl.textContent = `최고 기록: ${best.toLocaleString()}점`;
    }
  } catch (e) {
    console.error('점수 저장 오류', e);
  }
}

function stopPreview() {
  clearInterval(previewTick);
  previewTick = null;
  document.getElementById('preview-overlay').classList.add('hidden');
  document.querySelectorAll('.card-inner').forEach(c => c.classList.remove('flipped'));
}

function restart() { startGame(pairCount); }

function goIntro() {
  clearInterval(timerInterval);
  stopPreview();
  show('intro-screen');
  startIntroCanvas();
}

function goBack() {
  const onIntro = document.getElementById('intro-screen').classList.contains('active');
  if (onIntro) window.close();
  else         goIntro();
}

// ── 인트로 배경 캔버스 ──
let introRAF = null;

function startIntroCanvas() {
  const canvas = document.getElementById('intro-canvas');
  if (!canvas) return;
  cancelAnimationFrame(introRAF);

  const ctx    = canvas.getContext('2d');
  const resize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
  resize();
  window.addEventListener('resize', resize);

  const NAMES = ['힘','에너지','속력','가속도','질량','압력','전하량','전압','전류','온도','저항','진동수','전력','자기선속밀도','방사능','넓이','부피','물질량'];
  const UNITS = ['N','J','m/s','m/s²','kg','Pa','C','V','A','K','Ω','Hz','W','T','Bq','m²','m³','mol'];
  const ALL   = [
    ...NAMES.map(t => ({ text: t, isName: true  })),
    ...UNITS.map(t => ({ text: t, isName: false })),
  ];

  const COUNT = 40;
  const particles = Array.from({ length: COUNT }, () => {
    const item = ALL[Math.floor(Math.random() * ALL.length)];
    return {
      text:   item.text,
      isName: item.isName,
      x:      Math.random(),
      y:      Math.random(),
      size:   13 + Math.random() * 20,
      alpha:  0.10 + Math.random() * 0.15,
      vx:     (Math.random() - 0.5) * 0.00018,
      vy:     (Math.random() - 0.5) * 0.00018,
      angle:  (Math.random() - 0.5) * 0.3,
    };
  });

  function draw() {
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < -0.05) p.x = 1.05;
      if (p.x > 1.05)  p.x = -0.05;
      if (p.y < -0.05) p.y = 1.05;
      if (p.y > 1.05)  p.y = -0.05;

      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.font        = `800 ${p.size}px "Pretendard", system-ui, sans-serif`;
      ctx.fillStyle   = p.isName ? '#7c3aed' : '#059669';
      ctx.translate(p.x * W, p.y * H);
      ctx.rotate(p.angle);
      ctx.fillText(p.text, 0, 0);
      ctx.restore();
    }
    introRAF = requestAnimationFrame(draw);
  }
  draw();
}

startIntroCanvas();
</script>

<script src="../config.js"></script>
<script type="module">
import { initializeApp }          from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/12.4.0/firebase-firestore.js";

const cfg = window.APP_CONFIG || {};
const app = initializeApp({
  apiKey:            cfg.FIREBASE_API_KEY,
  authDomain:        cfg.FIREBASE_AUTH_DOMAIN,
  projectId:         cfg.FIREBASE_PROJECT_ID,
  storageBucket:     cfg.FIREBASE_STORAGE_BUCKET,
  messagingSenderId: cfg.FIREBASE_MESSAGING_SENDER_ID,
  appId:             cfg.FIREBASE_APP_ID,
});

const auth = getAuth(app);
const db   = getFirestore(app);

window._fbDb              = db;
window._fbDoc             = doc;
window._fbGetDoc          = getDoc;
window._fbSetDoc          = setDoc;
window._fbServerTimestamp = serverTimestamp;

onAuthStateChanged(auth, user => { window._fbUser = user || null; });
</script>
</body>
