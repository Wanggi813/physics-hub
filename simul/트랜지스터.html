<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https: wss:; media-src 'self' https: blob: data:; worker-src 'self' blob:; frame-src 'self' https:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self';">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>트랜지스터 스위칭과 증폭</title>
  <meta name="description" content="트랜지스터의 베이스 전류가 없으면 컬렉터-이미터 전류가 흐르지 않고, 베이스 전류가 흐르면 전류가 흐르는 스위칭과 증폭 작용을 보여주는 시뮬레이션입니다." />
  <style>
    :root {
      --bg: #101419;
      --panel: #181d24;
      --panel-2: #202832;
      --line: #303946;
      --text: #edf3f8;
      --muted: #a8b4c0;
      --accent: #46a3ff;
      --good: #7fe3a1;
      --warn: #ffd36b;
      --off: #647180;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      overscroll-behavior: none;
    }

    .wrap {
      display: flex;
      height: 100%;
      min-height: 540px;
    }

    aside {
      width: 330px;
      padding: 18px;
      background: var(--panel);
      border-right: 1px solid var(--line);
      overflow-y: auto;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .lead {
      margin: 8px 0 18px;
      color: var(--muted);
      font-size: 13px;
    }

    label {
      display: block;
      color: var(--muted);
      margin: 14px 0 7px;
      font-size: 13px;
    }

    input,
    button {
      font: inherit;
    }

    input[type=range] {
      width: 100%;
      accent-color: var(--accent);
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .value {
      min-width: 70px;
      text-align: right;
      color: var(--accent);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      margin-top: 8px;
    }

    .segmented button,
    .icon-button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111820;
      color: var(--text);
      cursor: pointer;
    }

    .segmented button:hover,
    .icon-button:hover {
      border-color: #4c5d70;
    }

    .segmented button.active {
      background: #163456;
      border-color: var(--accent);
      color: #dceeff;
    }

    .metrics {
      display: grid;
      gap: 8px;
      margin-top: 16px;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 9px 10px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .metric span:first-child {
      color: var(--muted);
    }

    .metric span:last-child {
      text-align: right;
      font-weight: 700;
    }

    .note {
      min-height: 94px;
      margin-top: 16px;
      padding: 12px;
      background: #111820;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
    }

    .note strong {
      display: block;
      margin-bottom: 5px;
      color: var(--text);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
    }

    .view {
      position: relative;
      flex: 1;
      min-width: 0;
      background: radial-gradient(circle at 50% 0%, #1b2632 0%, #101419 45%);
    }

    #canvasRoot {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 540px;
    }

    @media (max-width: 768px) {
      .wrap {
        flex-direction: column-reverse;
        min-height: 100%;
      }

      .view {
        flex: none;
        width: 100%;
        height: 48vh;
        border-bottom: 1px solid var(--line);
      }

      #canvasRoot {
        height: 100% !important;
        min-height: 0 !important;
      }

      aside {
        width: 100%;
        height: 52vh;
        border-right: none;
        border-top: 1px solid var(--line);
        padding-bottom: 28px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <aside>
      <h1>트랜지스터</h1>
      <p class="lead">작은 베이스 전류가 컬렉터-이미터 전류를 켜고, 더 크게 만들 수 있음을 보여줍니다.</p>

      <label>모드</label>
      <div class="segmented" aria-label="모드 선택">
        <button id="switchBtn" type="button" class="active">스위칭</button>
        <button id="ampBtn" type="button">증폭</button>
      </div>

      <label for="baseInput">베이스 입력</label>
      <div class="row">
        <input id="baseInput" type="range" min="0" max="1" step="0.01" value="0" />
        <div id="baseVal" class="value">0%</div>
      </div>

      <div class="segmented" aria-label="베이스 입력 빠른 선택">
        <button id="offBtn" type="button">B 없음</button>
        <button id="onBtn" type="button">B 입력</button>
      </div>

      <div class="metrics">
        <div class="metric"><span>상태</span><span id="stateMetric">꺼짐</span></div>
        <div class="metric"><span>베이스 전류 IB</span><span id="baseMetric">없음</span></div>
        <div class="metric"><span>컬렉터 전류 IC</span><span id="collectorMetric">차단</span></div>
        <div class="metric"><span>관계식</span><span id="actionMetric">IC ≈ βIB</span></div>
      </div>

      <div id="stateNote" class="note" aria-live="polite"></div>

      <div class="toolbar">
        <button id="pauseBtn" class="icon-button" type="button" aria-pressed="false">일시정지</button>
        <span class="hint">전하 흐름과 회로 경로를 함께 보여줍니다.</span>
      </div>
    </aside>

    <main class="view">
      <div id="canvasRoot"></div>
    </main>
  </div>

  <script src="./libs/p5.min.js"></script>
  <script>
    const root = document.getElementById('canvasRoot');
    const switchBtn = document.getElementById('switchBtn');
    const ampBtn = document.getElementById('ampBtn');
    const baseInput = document.getElementById('baseInput');
    const baseVal = document.getElementById('baseVal');
    const offBtn = document.getElementById('offBtn');
    const onBtn = document.getElementById('onBtn');
    const stateMetric = document.getElementById('stateMetric');
    const baseMetric = document.getElementById('baseMetric');
    const collectorMetric = document.getElementById('collectorMetric');
    const actionMetric = document.getElementById('actionMetric');
    const stateNote = document.getElementById('stateNote');
    const pauseBtn = document.getElementById('pauseBtn');

    const st = {
      mode: 'switch',
      base: 0,
      paused: false
    };

    const BETA = 100;

    switchBtn.addEventListener('click', () => {
      st.mode = 'switch';
      st.base = st.base >= 0.5 ? 1 : 0;
      updateUI();
    });

    ampBtn.addEventListener('click', () => {
      st.mode = 'amp';
      if (st.base === 0) st.base = 0.35;
      updateUI();
    });

    offBtn.addEventListener('click', () => {
      st.base = 0;
      updateUI();
    });

    onBtn.addEventListener('click', () => {
      st.base = st.mode === 'switch' ? 1 : 0.65;
      updateUI();
    });

    baseInput.addEventListener('input', () => {
      st.base = parseFloat(baseInput.value) || 0;
      updateUI();
    });

    pauseBtn.addEventListener('click', () => {
      st.paused = !st.paused;
      pauseBtn.textContent = st.paused ? '재생' : '일시정지';
      pauseBtn.setAttribute('aria-pressed', String(st.paused));
    });

    function collectorLevel() {
      if (st.mode === 'switch') return st.base >= 0.5 ? 1 : 0;
      return Math.max(0, Math.min(1, st.base * 1.25));
    }

    function baseCurrentMicroAmp() {
      return Math.round(st.base * 50);
    }

    function collectorCurrentMilliAmp() {
      if (st.mode === 'switch') return collectorLevel() > 0 ? BETA * 0.05 : 0;
      return baseCurrentMicroAmp() * BETA / 1000;
    }

    function levelName(v) {
      if (v <= 0.02) return '없음';
      if (v < 0.35) return '작음';
      if (v < 0.72) return '중간';
      return '큼';
    }

    function updateUI() {
      switchBtn.classList.toggle('active', st.mode === 'switch');
      ampBtn.classList.toggle('active', st.mode === 'amp');
      baseInput.value = st.base.toFixed(2);
      baseVal.textContent = `${Math.round(st.base * 100)}%`;

      const out = collectorLevel();
      const on = out > 0.02;
      stateMetric.textContent = on ? '켜짐' : '꺼짐';
      baseMetric.textContent = `${baseCurrentMicroAmp()} µA`;
      collectorMetric.textContent = on ? `${collectorCurrentMilliAmp().toFixed(1)} mA` : '차단';
      actionMetric.textContent = st.mode === 'switch'
        ? (on ? '포화 스위치' : '차단')
        : `β = ${BETA}`;

      if (st.mode === 'switch') {
        stateNote.innerHTML = on
          ? '<strong>스위칭 작용</strong>베이스 전류가 충분히 들어오면 트랜지스터를 포화 스위치처럼 보아 C-E 사이가 도통 상태가 됩니다. 이때 IC는 부하가 정하는 전류로 설명합니다.'
          : '<strong>스위칭 작용</strong>베이스 전류가 없으면 BE 접합이 충분히 열리지 않아 이미터 전자가 베이스로 주입되지 못합니다. 그래서 컬렉터 전류가 차단됩니다.';
      } else {
        stateNote.innerHTML = `<strong>증폭 작용</strong>증폭계수 β를 ${BETA}으로 두면 IC ≈ ${BETA}IB 입니다. 예를 들어 IB가 10 µA 증가하면 IC는 약 1.0 mA 증가합니다.`;
      }
    }

    new p5((p) => {
      const particles = [];
      const baseParticles = [];

      function ensureParticles() {
        while (particles.length < 36) {
          particles.push({
            t: p.random(),
            lane: p.random(-1, 1),
            speed: p.random(0.25, 0.55)
          });
        }

        while (baseParticles.length < 12) {
          baseParticles.push({
            t: p.random(),
            lane: p.random(-1, 1),
            speed: p.random(0.25, 0.55)
          });
        }
      }

      function drawTag(text, x, y, align = p.CENTER) {
        p.textSize(12);
        const tw = p.textWidth(text) + 16;
        const bx = align === p.CENTER ? x - tw / 2 : align === p.RIGHT ? x - tw : x;
        p.noStroke();
        p.fill(12, 16, 20, 205);
        p.rect(bx, y - 12, tw, 24, 6);
        p.fill(237, 243, 248);
        p.textAlign(align, p.CENTER);
        p.text(text, x, y);
      }

      function drawArrow(x0, y0, x1, y1, active, label) {
        p.stroke(active ? p.color(127, 227, 161) : p.color(100, 113, 128));
        p.strokeWeight(active ? 4 : 2.4);
        p.line(x0, y0, x1, y1);
        const a = Math.atan2(y1 - y0, x1 - x0);
        p.line(x1, y1, x1 - Math.cos(a - 0.55) * 11, y1 - Math.sin(a - 0.55) * 11);
        p.line(x1, y1, x1 - Math.cos(a + 0.55) * 11, y1 - Math.sin(a + 0.55) * 11);
        if (label) drawTag(label, (x0 + x1) / 2, (y0 + y1) / 2 - 22);
      }

      function drawTransistor(x0, x1, y0, h, output, compact) {
        const w = x1 - x0;
        const scale = Math.min(1, w / 640, h / 180);
        const emitterW = w * 0.38;
        const baseW = Math.max(48, w * 0.12);
        const collectorW = w - emitterW - baseW;
        const eL = x0;
        const eR = x0 + emitterW;
        const bL = eR;
        const bR = bL + baseW;
        const cL = bR;
        const cR = x1;
        const cy = y0 + h / 2;
        const active = output > 0.02;

        p.noStroke();
        p.fill(70, 105, 138);
        p.rect(eL, y0, emitterW, h, 10, 0, 0, 10);
        p.fill(118, 78, 93);
        p.rect(bL, y0, baseW, h);
        p.fill(70, 105, 138);
        p.rect(cL, y0, collectorW, h, 0, 10, 10, 0);

        p.fill(215, 236, 255, active ? 90 : 190);
        p.rect(bL - 16 * scale, y0, 32 * scale, h, 5);
        p.rect(bR - 16 * scale, y0, 32 * scale, h, 5);

        if (active) {
          p.noStroke();
          p.fill(127, 227, 161, 45);
          p.rect(bL - 10, y0 + 12, cR - bL - 12, h - 24, 8);
        }

        p.stroke(230, 244, 255);
        p.strokeWeight(1.5);
        p.drawingContext.setLineDash([6, 5]);
        p.line(bL, y0, bL, y0 + h);
        p.line(bR, y0, bR, y0 + h);
        p.drawingContext.setLineDash([]);

        p.noStroke();
        p.fill(12, 16, 20, 190);
        p.rect(eL + 14, y0 + 14, 42, 25, 6);
        p.rect(bL + baseW / 2 - 17, y0 + 14, 34, 25, 6);
        p.rect(cR - 56, y0 + 14, 42, 25, 6);
        p.fill(245);
        p.textAlign(p.CENTER, p.CENTER);
        p.textSize(13);
        p.textStyle(p.BOLD);
        p.text('n+', eL + 35, y0 + 26);
        p.text('p', bL + baseW / 2, y0 + 26);
        p.text('n', cR - 35, y0 + 26);
        p.textStyle(p.NORMAL);

        const baseActive = st.base > 0.02;
        drawArrow(bL + baseW / 2, y0 + h + (compact ? 52 : 72), bL + baseW / 2, y0 + h + 10, baseActive, '');
        drawArrow(cR + (compact ? 54 : 80), cy, cR + 12, cy, active, '');

        p.stroke(237, 243, 248);
        p.strokeWeight(3);
        p.line(eL - (compact ? 44 : 70), cy, eL, cy);
        p.line(cR, cy, cR + (compact ? 64 : 92), cy);

        p.noStroke();
        p.fill(237, 243, 248);
        p.textSize(14);
        p.textAlign(p.CENTER, p.CENTER);
        p.text('E', eL - (compact ? 60 : 92), cy);
        p.text('C', cR + (compact ? 78 : 112), cy);
        p.text('B', bL + baseW / 2, y0 + h + (compact ? 68 : 88));

        if (!active) {
          p.stroke(255, 211, 107);
          p.strokeWeight(4);
          p.line(bL - 24, cy - 36, bL + 24, cy + 36);
          p.line(bL - 24, cy + 36, bL + 24, cy - 36);
          p.noStroke();
          p.fill(255, 211, 107);
          p.circle(bL + baseW / 2, y0 - 18, 12);
        } else {
          p.noStroke();
          p.fill(127, 227, 161);
          p.circle(bL + baseW / 2, y0 - 18, 12);
        }

        return {
          x0: eL + 20,
          x1: cR - 20,
          y: cy,
          h,
          baseL: bL,
          baseR: bR,
          baseX: bL + baseW / 2,
          baseInY: y0 + h + (compact ? 52 : 72),
          baseY: y0 + h + 10,
          eL,
          cR
        };
      }

      function drawParticles(path, output) {
        ensureParticles();
        const count = output <= 0.02 ? 0 : Math.round(p.lerp(8, 32, output));

        for (let i = 0; i < count; i++) {
          const pt = particles[i];
          if (!st.paused) {
            pt.t = (pt.t + pt.speed * (0.006 + output * 0.012)) % 1;
          }

          const x = p.lerp(path.x0, path.x1, pt.t);
          const y = path.y + pt.lane * path.h * 0.28;
          p.fill(104, 165, 255, 230);
          p.circle(x, y, 10);
          p.stroke(18, 26, 36);
          p.strokeWeight(1.5);
          p.line(x - 3, y, x + 3, y);
          p.noStroke();
        }

        const baseCount = st.base <= 0.02 ? 0 : Math.round(p.lerp(3, 10, st.base));
        for (let i = 0; i < baseCount; i++) {
          const pt = baseParticles[i];
          if (!st.paused) {
            pt.t = (pt.t + pt.speed * 0.01) % 1;
          }

          const y = p.lerp(path.baseInY, path.baseY, pt.t);
          const x = path.baseX + pt.lane * 9;
          p.noFill();
          p.stroke(255, 123, 117, 230);
          p.strokeWeight(2.4);
          p.circle(x, y, 10);
          p.strokeWeight(1.5);
          p.line(x - 3, y, x + 3, y);
          p.line(x, y - 3, x, y + 3);
        }
      }

      function drawAmplifierGraph(x, y, w, h, output) {
        const ib = baseCurrentMicroAmp();
        const ic = collectorCurrentMilliAmp();
        p.noStroke();
        p.fill(32, 40, 50);
        p.rect(x, y, w, h, 8);
        p.stroke(72, 86, 101);
        p.strokeWeight(1);
        p.line(x + 28, y + h - 24, x + w - 16, y + h - 24);
        p.line(x + 28, y + 16, x + 28, y + h - 24);

        const inH = p.map(st.base, 0, 1, 0, h - 54);
        const outH = p.map(output, 0, 1, 0, h - 54);
        p.noStroke();
        p.fill(70, 163, 255);
        p.rect(x + w * 0.36, y + h - 24 - inH, 34, inH, 5, 5, 0, 0);
        p.fill(127, 227, 161);
        p.rect(x + w * 0.62, y + h - 24 - outH, 34, outH, 5, 5, 0, 0);

        p.fill(237, 243, 248);
        p.textSize(12);
        p.textAlign(p.CENTER, p.TOP);
        p.text('IB', x + w * 0.36 + 17, y + h - 18);
        p.text('IC', x + w * 0.62 + 17, y + h - 18);
        p.textAlign(p.LEFT, p.TOP);
        p.text(`β = ${BETA}: IC ≈ ${BETA}IB`, x + 14, y + 12);
        p.fill(168, 180, 192);
        p.text(`${ib} µA → ${ic.toFixed(1)} mA`, x + 14, y + 32);
      }

      function drawSwitchLamp(x, y, output) {
        p.noStroke();
        p.fill(32, 40, 50);
        p.rect(x - 80, y - 68, 160, 136, 8);

        p.stroke(output > 0.02 ? p.color(127, 227, 161) : p.color(100, 113, 128));
        p.strokeWeight(3);
        p.noFill();
        p.circle(x, y - 16, 54);
        p.line(x - 20, y + 4, x + 20, y - 36);
        p.line(x - 20, y - 36, x + 20, y + 4);

        if (output > 0.02) {
          p.noStroke();
          p.fill(255, 211, 107, 70);
          p.circle(x, y - 16, 92);
          p.fill(255, 211, 107);
          p.circle(x, y - 16, 42);
        }

        p.noStroke();
        p.fill(237, 243, 248);
        p.textSize(12);
        p.textAlign(p.CENTER, p.TOP);
        p.text(output > 0.02 ? '부하 전류 흐름' : '부하 전류 없음', x, y + 42);
      }

      function pointOnPolyline(points, t) {
        const segs = [];
        let total = 0;
        for (let i = 0; i < points.length - 1; i++) {
          const a = points[i];
          const b = points[i + 1];
          const len = Math.hypot(b.x - a.x, b.y - a.y);
          segs.push({ a, b, len });
          total += len;
        }

        let d = (t % 1) * total;
        for (const seg of segs) {
          if (d <= seg.len) {
            const u = d / seg.len;
            return {
              x: p.lerp(seg.a.x, seg.b.x, u),
              y: p.lerp(seg.a.y, seg.b.y, u)
            };
          }
          d -= seg.len;
        }

        return points[points.length - 1];
      }

      function drawCircuit(x, y, w, h, output) {
        const active = output > 0.02;
        const wire = active ? p.color(127, 227, 161) : p.color(100, 113, 128);
        const baseActive = st.base > 0.02;
        const cx = x + w * 0.62;
        const top = y + 24;
        const bottom = y + h - 28;
        const left = x + 26;
        const right = x + w - 26;
        const loadY = y + 70;
        const trY = y + h * 0.62;

        p.noStroke();
        p.fill(32, 40, 50);
        p.rect(x, y, w, h, 8);

        p.stroke(wire);
        p.strokeWeight(active ? 4 : 2.4);
        p.noFill();
        p.line(cx, top, cx, loadY - 24);
        p.rect(cx - 18, loadY - 24, 36, 48, 4);
        p.line(cx, loadY + 24, cx, trY - 34);
        p.circle(cx, trY, 64);
        p.line(cx, trY + 32, cx, bottom);
        p.line(cx - 34, bottom, cx + 34, bottom);
        p.line(cx - 22, bottom + 10, cx + 22, bottom + 10);
        p.line(cx - 10, bottom + 20, cx + 10, bottom + 20);

        p.stroke(237, 243, 248);
        p.strokeWeight(2.2);
        p.line(cx - 12, trY - 22, cx - 12, trY + 22);
        p.line(cx - 12, trY - 12, cx + 20, trY - 28);
        p.line(cx - 12, trY + 12, cx + 20, trY + 28);
        p.line(cx + 20, trY + 28, cx + 9, trY + 25);
        p.line(cx + 20, trY + 28, cx + 14, trY + 16);

        p.stroke(baseActive ? p.color(255, 123, 117) : p.color(100, 113, 128));
        p.strokeWeight(baseActive ? 3.4 : 2.2);
        p.line(left, trY, cx - 12, trY);
        p.circle(left, trY, 22);

        p.noStroke();
        p.fill(237, 243, 248);
        p.textAlign(p.CENTER, p.CENTER);
        p.textSize(12);
        p.text('V+', cx, top - 14);
        p.text('R', cx, loadY);
        p.text('B', left - 22, trY);

        if (active) {
          const mainPath = [
            { x: cx, y: top },
            { x: cx, y: loadY + 24 },
            { x: cx, y: trY - 32 },
            { x: cx + 20, y: trY - 28 },
            { x: cx + 20, y: trY + 28 },
            { x: cx, y: trY + 32 },
            { x: cx, y: bottom }
          ];
          const count = Math.round(p.lerp(5, 18, output));
          for (let i = 0; i < count; i++) {
            const pt = particles[i];
            if (!st.paused) pt.t = (pt.t + 0.006 + output * 0.012) % 1;
            const q = pointOnPolyline(mainPath, pt.t + i / count);
            p.noStroke();
            p.fill(104, 165, 255, 230);
            p.circle(q.x, q.y, 8);
            p.stroke(18, 26, 36);
            p.strokeWeight(1.3);
            p.line(q.x - 2.5, q.y, q.x + 2.5, q.y);
          }
        }

        if (baseActive) {
          for (let i = 0; i < 6; i++) {
            const pt = baseParticles[i];
            if (!st.paused) pt.t = (pt.t + 0.012) % 1;
            const qx = p.lerp(left, cx - 12, (pt.t + i / 6) % 1);
            p.noFill();
            p.stroke(255, 123, 117, 230);
            p.strokeWeight(2);
            p.circle(qx, trY, 8);
            p.line(qx - 2.5, trY, qx + 2.5, trY);
            p.line(qx, trY - 2.5, qx, trY + 2.5);
          }
        }
      }

      p.setup = () => {
        const box = root.getBoundingClientRect();
        p.createCanvas(box.width || window.innerWidth, box.height || window.innerHeight).parent(root);
        p.textFont('system-ui, Noto Sans KR, sans-serif');
        updateUI();
      };

      p.windowResized = () => {
        const box = root.getBoundingClientRect();
        p.resizeCanvas(box.width || window.innerWidth, box.height || window.innerHeight);
      };

      p.draw = () => {
        p.background(16, 20, 25);
        const output = collectorLevel();
        const compact = p.width < 680 || p.height < 500;
        const pad = compact ? 74 : 118;
        const x0 = pad;
        const x1 = p.width - pad;
        const topY = compact ? 82 : 86;
        const deviceH = compact
          ? p.constrain(p.height * 0.28, 108, 138)
          : p.constrain(p.height * 0.28, 145, 180);
        const cy = topY + deviceH / 2;

        p.noStroke();
        p.fill(st.base > 0.02 ? p.color(255, 123, 117) : p.color(100, 113, 128));
        p.circle(32, 30, 14);
        p.fill(output > 0.02 ? p.color(127, 227, 161) : p.color(100, 113, 128));
        p.circle(54, 30, 14);

        const path = drawTransistor(x0, x1, topY, deviceH, output, compact);
        drawParticles(path, output);

        if (compact) {
          drawCircuit(24, p.height - 150, p.width - 48, 126, output);
        } else {
          const lowerY = topY + deviceH + 76;
          const lowerH = Math.max(150, p.height - lowerY - 28);
          drawCircuit(x0, lowerY, (x1 - x0) * 0.56, lowerH, output);
          if (st.mode === 'amp') {
            drawAmplifierGraph(x0 + (x1 - x0) * 0.62, lowerY, (x1 - x0) * 0.38, lowerH, output);
          } else {
            drawSwitchLamp(x0 + (x1 - x0) * 0.8, lowerY + lowerH * 0.55, output);
          }
        }
      };
    });
  </script>
</body>
