<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#edf7ff"/>
      <stop offset="0.55" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f0eeff"/>
    </linearGradient>
    <linearGradient id="northPole" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#991b1b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="southPole" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <marker id="arrowR" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#ef4444" opacity="0.8"/>
    </marker>
    <marker id="arrowB" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#3b82f6" opacity="0.8"/>
    </marker>
    <marker id="arrowP" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#7c3aed" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="640" height="360" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.18" stroke="#94a3b8" stroke-width="0.8">
    <path d="M0 72H640M0 144H640M0 216H640M0 288H640"/>
    <path d="M80 0V360M160 0V360M240 0V360M320 0V360M400 0V360M480 0V360M560 0V360"/>
  </g>

  <!-- ─── Left Magnet (N pole top, S pole bottom) ─── -->
  <rect x="52" y="80" width="36" height="90" rx="8" fill="url(#northPole)" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="70" y="133" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="900" fill="#fff">N</text>
  <rect x="52" y="175" width="36" height="90" rx="8" fill="url(#southPole)" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="70" y="228" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="900" fill="#fff">S</text>

  <!-- ─── Magnetic field lines (arcs from N to S on right side) ─── -->
  <g fill="none" stroke-linecap="round">
    <path d="M88 110 C140 90, 200 90, 248 125" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="4,3" opacity="0.5"/>
    <path d="M88 125 C150 105, 210 105, 248 140" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="4,3" opacity="0.5"/>
    <path d="M88 218 C150 238, 210 238, 248 215" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="4,3" opacity="0.5"/>
    <path d="M88 233 C140 253, 200 253, 248 230" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="4,3" opacity="0.5"/>
  </g>

  <!-- ─── 강자성체 block ─── -->
  <rect x="248" y="80" width="110" height="185" rx="14" fill="#fff5f5" stroke="#ef4444" stroke-width="2"/>
  <text x="303" y="105" text-anchor="middle" font-family="Pretendard,Arial,sans-serif" font-size="11" font-weight="700" fill="#ef4444">강자성체</text>
  <!-- dipoles aligned upward (same direction) -->
  <g stroke="#ef4444" stroke-width="1.8" opacity="0.9">
    <line x1="275" y1="165" x2="275" y2="125" marker-end="url(#arrowR)"/>
    <line x1="295" y1="165" x2="295" y2="125" marker-end="url(#arrowR)"/>
    <line x1="315" y1="165" x2="315" y2="125" marker-end="url(#arrowR)"/>
    <line x1="335" y1="165" x2="335" y2="125" marker-end="url(#arrowR)"/>
    <line x1="275" y1="225" x2="275" y2="185" marker-end="url(#arrowR)"/>
    <line x1="295" y1="225" x2="295" y2="185" marker-end="url(#arrowR)"/>
    <line x1="315" y1="225" x2="315" y2="185" marker-end="url(#arrowR)"/>
    <line x1="335" y1="225" x2="335" y2="185" marker-end="url(#arrowR)"/>
  </g>
  <!-- domain boundary -->
  <line x1="249" y1="175" x2="357" y2="175" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>

  <!-- ─── 상자성체 block ─── -->
  <rect x="378" y="80" width="110" height="185" rx="14" fill="#f0f8ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="433" y="105" text-anchor="middle" font-family="Pretendard,Arial,sans-serif" font-size="11" font-weight="700" fill="#1d4ed8">상자성체</text>
  <!-- dipoles weakly aligned -->
  <g stroke="#3b82f6" stroke-width="1.8" opacity="0.85">
    <line x1="403" y1="160" x2="403" y2="120" marker-end="url(#arrowB)"/>
    <line x1="423" y1="168" x2="427" y2="126" marker-end="url(#arrowB)"/>
    <line x1="443" y1="162" x2="441" y2="122" marker-end="url(#arrowB)"/>
    <line x1="463" y1="165" x2="465" y2="125" marker-end="url(#arrowB)"/>
    <line x1="403" y1="228" x2="405" y2="188" marker-end="url(#arrowB)"/>
    <line x1="423" y1="225" x2="420" y2="186" marker-end="url(#arrowB)"/>
    <line x1="443" y1="230" x2="445" y2="190" marker-end="url(#arrowB)"/>
    <line x1="463" y1="226" x2="461" y2="186" marker-end="url(#arrowB)"/>
  </g>

  <!-- ─── 반자성체 block (right) ─── -->
  <rect x="508" y="80" width="110" height="185" rx="14" fill="#f5f0ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="563" y="105" text-anchor="middle" font-family="Pretendard,Arial,sans-serif" font-size="11" font-weight="700" fill="#7c3aed">반자성체</text>
  <!-- dipoles opposing field (downward) -->
  <g stroke="#7c3aed" stroke-width="1.8" opacity="0.85">
    <line x1="533" y1="125" x2="533" y2="165" marker-end="url(#arrowP)"/>
    <line x1="553" y1="125" x2="553" y2="165" marker-end="url(#arrowP)"/>
    <line x1="573" y1="125" x2="573" y2="165" marker-end="url(#arrowP)"/>
    <line x1="593" y1="125" x2="593" y2="165" marker-end="url(#arrowP)"/>
    <line x1="533" y1="185" x2="533" y2="225" marker-end="url(#arrowP)"/>
    <line x1="553" y1="185" x2="553" y2="225" marker-end="url(#arrowP)"/>
    <line x1="573" y1="185" x2="573" y2="225" marker-end="url(#arrowP)"/>
    <line x1="593" y1="185" x2="593" y2="225" marker-end="url(#arrowP)"/>
  </g>

  <!-- ─── Legend dots ─── -->
  <circle cx="256" cy="282" r="6" fill="#ef4444"/>
  <text x="266" y="287" font-family="Pretendard,Arial,sans-serif" font-size="12" font-weight="600" fill="#991b1b">철 · 니켈 · 코발트</text>
  <circle cx="386" cy="282" r="6" fill="#3b82f6"/>
  <text x="396" y="287" font-family="Pretendard,Arial,sans-serif" font-size="12" font-weight="600" fill="#1d4ed8">알루미늄 · 산소</text>
  <circle cx="514" cy="282" r="6" fill="#7c3aed"/>
  <text x="524" y="287" font-family="Pretendard,Arial,sans-serif" font-size="12" font-weight="600" fill="#5b21b6">구리 · 물 · 비스무트</text>

  <!-- ─── Title ─── -->
  <text x="320" y="324" text-anchor="middle" font-family="Pretendard,Arial,sans-serif" font-size="30" font-weight="900" fill="#102033">자성체</text>
  <text x="320" y="348" text-anchor="middle" font-family="Pretendard,Arial,sans-serif" font-size="15" font-weight="700" fill="#475569">강자성 · 상자성 · 반자성 비교</text>
</svg>
